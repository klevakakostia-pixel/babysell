<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - BUTTERFLY EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #0b0b0f; --accent: #ff2d55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 70px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a;
        }
        .user-block { display: flex; align-items: center; gap: 12px; }
        #u-pic { width: 35px; height: 35px; border-radius: 4px; border: 1px solid var(--main); }

        /* EVENT BANNER */
        .event-hero {
            position: relative; width: 100%; height: 550px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover no-repeat;
            display: flex; align-items: center; padding-left: 8%;
        }
        .event-hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 10%, transparent 70%);
        }
        .event-content { position: relative; z-index: 5; width: 350px; }
        .event-title { font-family: 'Orbitron'; font-size: 32px; color: #fff; margin-bottom: 10px; }

        /* REAL-TIME LIST */
        .leaderboard { 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }
        .leader-row { 
            display: flex; justify-content: space-between; padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03); font-family: 'Orbitron'; font-size: 10px;
        }
        .leader-name { color: var(--main); }

        .btn-join { 
            background: var(--accent); color: #fff; padding: 12px; border-radius: 5px;
            font-family: 'Orbitron'; border: none; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s;
        }
        .btn-join:disabled { background: #222; color: #555; cursor: default; }

        /* CASE SECTION */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .case-card {
            display: inline-block; background: rgba(255,255,255,0.02); border: 1px solid #1a1a1a;
            border-radius: 20px; padding: 40px; transition: 0.3s; cursor: pointer;
        }
        .case-card:hover { border-color: var(--main); background: rgba(0,255,170,0.02); }
        .case-card img { width: 250px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); }

        /* MODAL ROULETTE (ЗАМІСТЬ ALERT) */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-box {
            background: #08080a; border: 1px solid #222; padding: 40px; border-radius: 20px;
            width: 90%; max-width: 600px; text-align: center;
        }
        .roulette-win {
            position: relative; width: 100%; height: 120px; background: #000;
            margin: 20px 0; overflow: hidden; border-radius: 10px; border: 1px solid #111;
        }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 10; box-shadow: 0 0 10px var(--main); }
        .strip { display: flex; position: absolute; left: 0; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #0a0a0a; }
        .item img { width: 80px; }

        .btn-spin { background: var(--main); color: #000; padding: 12px 30px; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header class="header">
    <h2 style="font-family:'Orbitron'; color:var(--main); font-size:18px;">BABYSELL</h2>
    <div class="user-block">
        <div style="text-align:right">
            <div id="u-name" style="font-family:'Orbitron'; font-size:10px;">GUEST</div>
            <div id="u-bal" style="color:var(--main); font-weight:bold;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <button id="l-btn" onclick="login()" style="background:var(--main); border:none; padding:3px 7px; border-radius:3px; cursor:pointer; font-size:9px;">LOGIN</button>
    </div>
</header>

<section class="event-hero">
    <div class="event-content">
        <h1 class="event-title">EMERALD SKIES</h1>
        <div class="leaderboard">
            <div style="font-size: 9px; color: #444; margin-bottom: 8px;">ACTIVE PARTICIPANTS:</div>
            <div id="participants-list">
                <div class="leader-row"><span style="color:#333">Wait for users...</span></div>
            </div>
        </div>
        <button class="btn-join" id="j-btn" onclick="joinEvent()">JOIN EVENT ★</button>
    </div>
</section>

<div class="container">
    <h2 style="font-family:'Orbitron'; margin-bottom:30px; font-size:16px; color:#444;">EXCLUSIVE DROP</h2>
    <div class="case-card" onclick="openCase()">
        <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
        <div style="font-family:'Orbitron'; margin-top:20px; font-size:18px;">BUTTERFLY CASE</div>
        <div style="color:var(--main); font-weight:bold; font-size:22px;">1,500 B</div>
    </div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box">
        <h2 id="m-status" style="font-family:'Orbitron'; color:#fff;">EXTRACTING DATA...</h2>
        <div class="roulette-win">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button class="btn-spin" id="spin-btn" onclick="startSpin()">START SPIN</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#444; margin-left:15px; cursor:pointer; font-family:'Orbitron';">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let user = null, balance = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('u-name').innerText = u.displayName.toUpperCase();
            document.getElementById('u-pic').src = u.photoURL;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            // Check event status
            db.ref('events/emerald/users/'+u.uid).on('value', s => {
                if(s.exists()){
                    document.getElementById('j-btn').innerText = "JOINED";
                    document.getElementById('j-btn').disabled = true;
                }
            });
        }
    });

    // REAL-TIME LIST LOGIC
    db.ref('events/emerald/users').limitToLast(5).on('value', s => {
        const list = document.getElementById('participants-list');
        list.innerHTML = "";
        if(s.exists()){
            Object.values(s.val()).reverse().forEach(v => {
                list.innerHTML += `<div class="leader-row"><span class="leader-name">${v.name}</span><span>Joined</span></div>`;
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function joinEvent() {
        if(!user) return alert("Login first!");
        db.ref('events/emerald/users/'+user.uid).set({ name: user.displayName });
    }

    function openCase() {
        if(!user) return alert("Login first!");
        if(balance < 1500) return alert("Not enough balance!");
        document.getElementById('case-modal').style.display = 'flex';
        prepareRoulette();
    }

    function prepareRoulette() {
        const strip = document.getElementById('strip');
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<60; i++) {
            // Butterfly ACR Image
            strip.innerHTML += `<div class="item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>`;
        }
    }

    function startSpin() {
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1500);

        const strip = document.getElementById('strip');
        const move = (50 * 121) - (600/2) + Math.random()*100;
        strip.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            document.getElementById('m-status').innerText = "YOU WON: BUTTERFLY ACR!";
            document.getElementById('m-status').style.color = "var(--main)";
            btn.style.display = "none";
        }, 5200);
    }

    function closeModal() {
        document.getElementById('case-modal').style.display = 'none';
        document.getElementById('spin-btn').style.display = 'inline-block';
        document.getElementById('spin-btn').disabled = false;
        document.getElementById('m-status').innerText = "EXTRACTING DATA...";
        document.getElementById('m-status').style.color = "#fff";
    }
</script>
</body>
</html>
