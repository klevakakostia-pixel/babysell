<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - ULTRA EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; 
            --bg: #08080a; 
            --accent: #ff2d55; 
            --panel: #0c0c0f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden;
            opacity: 0;
            animation: fadeInPage 0.8s forwards;
        }

        /* ANIMATIONS */
        @keyframes fadeInPage { to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes modalShow { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px var(--main); } 50% { box-shadow: 0 0 15px var(--main); } 100% { box-shadow: 0 0 5px var(--main); } }

        /* HEADER & USER PROF */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; height: 70px; background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .user-zone { display: flex; align-items: center; gap: 15px; }
        .user-profile { 
            display: none; align-items: center; gap: 10px; 
            background: rgba(255,255,255,0.05); padding: 5px 12px; 
            border-radius: 30px; border: 1px solid #333;
        }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--main); }
        .user-nick { font-family: 'Orbitron'; font-size: 12px; color: var(--main); }

        .btn-nav { 
            background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #888; 
            padding: 8px 16px; border-radius: 5px; font-family: 'Orbitron'; font-size: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); transform: translateY(-2px); }

        /* MARKET & EVENT */
        .page { display: none; padding: 25px; animation: slideUp 0.5s ease-out; }
        .page.active { display: block; }

        .event-mini-banner { 
            max-width: 1000px; margin: 0 auto 30px; border-radius: 15px; height: 200px;
            background: linear-gradient(90deg, #000 40%, transparent), url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            border: 1px solid #1a1a1a; overflow: hidden;
        }

        /* ADMIN ACCESS UI (Replacing Prompt) */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .modal-box { 
            background: var(--panel); border: 1px solid #222; padding: 35px; 
            border-radius: 20px; width: 90%; max-width: 400px; text-align: center;
            animation: modalShow 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .admin-input { 
            background: #000; border: 1px solid #333; color: var(--main); 
            padding: 12px; width: 100%; margin-bottom: 15px; text-align: center; 
            font-family: 'Orbitron'; border-radius: 8px; outline: none; transition: 0.3s;
        }
        .admin-input:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(0,255,170,0.2); }

        /* INVENTORY */
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .inv-item { 
            background: var(--panel); border: 1px solid #1a1a1a; padding: 20px; 
            border-radius: 15px; text-align: center; transition: 0.4s;
        }
        .inv-item:hover { border-color: var(--main); transform: translateY(-5px); }
        .inv-item img { width: 100px; cursor: pointer; transition: 0.3s; }
        .inv-item img:hover { transform: scale(1.1) rotate(5deg); }

        /* TOAST */
        #notif { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { 
            background: #000; border: 1px solid var(--main); padding: 12px 25px; 
            margin-top: 10px; font-size: 11px; font-family: 'Orbitron'; 
            animation: slideUp 0.3s forwards; border-left: 4px solid var(--main);
        }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:10px;">
        <button class="btn-nav active" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
        <button class="btn-nav" onclick="showPage('settings')">SETTINGS</button>
    </div>

    <div class="user-zone">
        <div class="balance-card" id="u-bal">0 B</div>
        
        <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000; font-weight:bold;">LOGIN</button>
        
        <div id="u-prof" class="user-profile">
            <span id="u-nick-display" class="user-nick">PLAYER</span>
            <img id="u-avatar-img" src="" class="user-avatar">
        </div>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-mini-banner">
        <div>
            <h1 style="font-family:'Orbitron'; color:var(--main); font-size:28px;">EMERALD SKIES</h1>
            <button id="join-btn" class="btn-nav" style="background:var(--main); color:#000; margin-top:15px; font-weight:bold; padding:10px 25px;" onclick="joinEvent()">JOIN EVENT</button>
        </div>
        <div id="event-feed" style="background:rgba(0,0,0,0.6); padding:15px; border-radius:10px; width:250px; font-size:11px; border-left:2px solid var(--main); height:120px;">
            <div style="color:#555; font-style:italic;">Scanning network...</div>
        </div>
    </div>

    <div style="text-align:center;">
        <div style="display:inline-block; background:var(--panel); padding:40px; border-radius:20px; border:1px solid #1a1a1a; cursor:pointer;" onclick="openCaseModal()">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width:180px;">
            <h3 style="font-family:'Orbitron'; margin-top:15px;">HARDCORE CASE</h3>
            <span style="color:var(--main); font-size:24px; font-weight:bold;">1,000 B</span>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <div id="inv-grid" class="inv-grid"></div>
</div>

<div id="page-settings" class="page">
    <div style="max-width:400px; margin:0 auto; background:var(--panel); padding:30px; border-radius:20px;">
        <h2 style="font-family:'Orbitron'; color:var(--main);">SETTINGS</h2>
        <div style="margin-top:20px;">
            <p style="font-size:12px; color:#666; margin-bottom:10px;">CHANGE NICKNAME</p>
            <input type="text" id="nick-input" class="admin-input" placeholder="Unique nickname...">
            <button class="btn-nav" style="width:100%; background:var(--main); color:#000;" onclick="saveNick()">UPDATE PROFILE</button>
        </div>
    </div>
</div>

<div id="admin-auth-modal" class="modal">
    <div class="modal-box" style="border-color:var(--accent);">
        <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">TERMINAL LOGIN</h2>
        <input type="password" id="admin-pw-input" class="admin-input" placeholder="ENTER ACCESS CODE">
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" style="flex:1; background:var(--accent); color:#fff;" onclick="verifyAdmin()">ACCESS</button>
            <button class="btn-nav" style="flex:1;" onclick="closeModals()">EXIT</button>
        </div>
    </div>
</div>

<div id="admin-panel-modal" class="modal">
    <div class="modal-box" style="border-color:var(--main); max-width:450px;">
        <h2 style="font-family:'Orbitron'; color:var(--main);">CORE ADMIN PANEL</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn-nav" onclick="giveMoney(10000)">+10,000 B</button>
            <button class="btn-nav" onclick="giveMoney(100000)">+100,000 B</button>
            <button class="btn-nav" style="grid-column: span 2; background:var(--accent); color:#fff;" onclick="terminateEvent()">END EVENT & PAY 6666 B</button>
        </div>
        <button class="btn-nav" style="width:100%; margin-top:15px;" onclick="closeModals()">CLOSE</button>
    </div>
</div>

<footer style="text-align:center; padding:60px;">
    <img src="https://i.postimg.cc/pLrKrWW0/fyvfyv.png" style="width:120px; opacity:0.1; cursor:pointer; transition:0.3s;" onclick="openAdminAuth()" onmouseover="this.style.opacity='0.5'" onmouseout="this.style.opacity='0.1'">
</footer>

<script>
    // Firebase Config
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let user = null, balance = 0, currentNick = "", lastWinnerUID = "";

    // Auth & Profile Logic
    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('u-prof').style.display = 'flex';
            document.getElementById('u-avatar-img').src = u.photoURL;

            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });

            db.ref('users/'+u.uid+'/nick').on('value', s => {
                currentNick = s.val() || u.displayName.split(' ')[0];
                document.getElementById('u-nick-display').innerText = currentNick.toUpperCase();
            });

            db.ref('users/'+u.uid+'/inventory').on('value', s => renderInventory(s.val() || {}));
            
            // Sync Event
            db.ref('event_active').on('value', s => {
                if(s.val() === false) {
                    const btn = document.getElementById('join-btn');
                    btn.innerText = "EVENT ENDED";
                    btn.disabled = true;
                    btn.style.opacity = "0.4";
                }
            });

            db.ref('global_feed').limitToLast(6).on('value', s => {
                const f = document.getElementById('event-feed');
                f.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    f.innerHTML = `<div style="margin-bottom:5px; border-bottom:1px solid #111; padding-bottom:2px;"><b>${d.nick}</b> ${d.msg}</div>` + f.innerHTML;
                    if(d.uid) lastWinnerUID = d.uid;
                });
            });
        }
    });

    // ADMIN FUNCTIONS (Custom UI)
    function openAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'flex'; }
    function verifyAdmin() {
        const pw = document.getElementById('admin-pw-input').value;
        if(pw === "kov6alex666") {
            document.getElementById('admin-auth-modal').style.display = 'none';
            document.getElementById('admin-panel-modal').style.display = 'flex';
            toast("ACCESS GRANTED");
        } else {
            toast("ACCESS DENIED");
        }
    }

    function giveMoney(amt) {
        if(user) db.ref('users/'+user.uid+'/balance').set(balance + amt);
        toast(`RECEIVED ${amt} B`);
    }

    function terminateEvent() {
        if(!lastWinnerUID) return toast("NO TARGET FOUND");
        db.ref('users/'+lastWinnerUID+'/balance').transaction(c => (c || 0) + 6666);
        db.ref('event_active').set(false);
        db.ref('global_feed').push({ nick: "SYSTEM", msg: "TERMINATED EVENT. PRIZE SENT." });
        toast("EVENT TERMINATED");
        closeModals();
    }

    // GENERAL
    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
    }

    async function saveNick() {
        const n = document.getElementById('nick-input').value.trim();
        if(n.length < 3) return toast("MIN 3 SYMBOLS");
        const snap = await db.ref('nicks').child(n).get();
        if(snap.exists()) return toast("NICK TAKEN");
        
        db.ref('users/'+user.uid+'/nick').set(n);
        db.ref('nicks').child(n).set(user.uid);
        toast("PROFILE UPDATED");
    }

    function joinEvent() {
        if(!user) return login();
        db.ref('global_feed').push({ nick: currentNick, msg: "connected to event", uid: user.uid });
        toast("JOINED SUCCESS");
    }

    function renderInventory(inv) {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(inv).forEach(k => {
            const i = inv[k];
            g.innerHTML += `
                <div class="inv-item">
                    <img src="${i.img}" onclick="toast('ITEM INSPECTED')">
                    <p style="font-size:10px; margin:10px 0; font-family:'Orbitron';">${i.name}</p>
                    <button class="btn-nav" style="width:100%; border-color:var(--accent); color:var(--accent);" onclick="sellItem('${k}', ${i.price})">SELL ${i.price}B</button>
                </div>`;
        });
    }

    function sellItem(id, pr) {
        db.ref('users/'+user.uid+'/inventory/'+id).remove();
        db.ref('users/'+user.uid+'/balance').set(balance + pr);
        toast(`SOLD FOR ${pr} B`);
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = "> " + m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
