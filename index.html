<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - EMERALD SKIES</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #0b0b0f; --glass: rgba(255, 255, 255, 0.03); 
            --accent-pink: #ff2d55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* LIVE DROPS STRIP (TOP) */
        .live-drops {
            display: flex; gap: 5px; background: #000; padding: 5px; 
            border-bottom: 1px solid #1a1a1a; overflow: hidden; height: 60px;
        }
        .drop-item {
            min-width: 80px; height: 50px; background: rgba(255,255,255,0.05);
            border-bottom: 2px solid var(--main); display: flex; align-items: center; justify-content: center;
        }
        .drop-item img { height: 35px; }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 70px; background: rgba(11, 11, 15, 0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .user-block { display: flex; align-items: center; gap: 15px; }
        #u-pic { width: 40px; height: 40px; border-radius: 5px; border: 1px solid var(--main); }

        /* EVENT BANNER (SECTION 1) */
        .event-hero {
            position: relative; width: 100%; height: 550px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover no-repeat;
            display: flex; align-items: center; justify-content: flex-start; padding-left: 10%;
        }
        .event-hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 30%, transparent, rgba(0,0,0,0.8));
            box-shadow: inset 0 0 150px 50px rgba(0,0,0,0.9);
        }
        .event-content { position: relative; z-index: 5; max-width: 400px; }
        .event-title { font-family: 'Orbitron'; font-size: 42px; color: #fff; text-shadow: 0 0 20px rgba(0,255,170,0.5); margin-bottom: 10px; }
        .leaderboard-mini { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border-left: 3px solid var(--main); margin-bottom: 20px; font-family: 'Orbitron'; font-size: 12px; }
        .leader-row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }

        /* BUTTONS */
        .btn-event { 
            background: var(--accent-pink); color: #fff; padding: 15px 40px; border-radius: 8px;
            font-family: 'Orbitron'; border: none; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.3s; box-shadow: 0 0 20px rgba(255, 45, 85, 0.3);
        }
        .btn-event:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 45, 85, 0.5); }

        /* NAVIGATION TABS (BELOW EVENT) */
        .sub-nav {
            display: flex; justify-content: center; gap: 30px; padding: 20px;
            background: #0d0d12; border-bottom: 1px solid #1a1a1a;
        }
        .tab-link { 
            color: #666; font-family: 'Orbitron'; font-size: 13px; text-decoration: none; 
            transition: 0.3s; cursor: pointer; 
        }
        .tab-link:hover, .tab-link.active { color: var(--main); text-shadow: 0 0 10px var(--main); }

        /* CASES SECTION (SECTION 2) */
        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .case-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; margin-top: 20px;
        }
        .case-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 25px;
            text-align: center; transition: 0.3s; cursor: pointer;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-5px); background: rgba(0,255,170,0.03); }
        .case-card img { width: 100%; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }
        .case-name { font-family: 'Orbitron'; font-size: 13px; margin: 15px 0 5px; }
        .case-price { color: var(--main); font-weight: bold; font-size: 18px; font-family: 'Orbitron'; }

        /* FOOTER / OTHER MENUS */
        .page-section { display: none; animation: fadeIn 0.4s; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="live-drops">
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
    <div class="drop-item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>
</div>

<header class="header">
    <h2 style="font-family:'Orbitron'; color:var(--main); letter-spacing:2px;">BABYSELL</h2>
    <div class="user-block">
        <div style="text-align:right;">
            <div id="u-name" style="font-family:'Orbitron'; font-size:12px;">GUEST_LOGIN</div>
            <div id="u-bal" style="color:var(--main); font-weight:bold;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <button onclick="login()" id="login-btn" style="background:var(--main); border:none; padding:5px 10px; border-radius:3px; font-family:'Orbitron'; font-size:10px; cursor:pointer;">LOGIN</button>
    </div>
</header>

<div id="home-page">
    <section class="event-hero">
        <div class="event-content">
            <h1 class="event-title">EMERALD SKIES</h1>
            <div class="leaderboard-mini">
                <div class="leader-row"><span>1. Pro_Player</span> <span>798 624</span></div>
                <div class="leader-row"><span>2. Cat_Lover</span> <span>666 499</span></div>
                <div class="leader-row"><span>3. Mystery_X</span> <span>433 482</span></div>
            </div>
            <button class="btn-event" onclick="joinEvent()">TO EVENT ★</button>
        </div>
    </section>

    <nav class="sub-nav">
        <a class="tab-link active" onclick="switchSubTab('all')">ALL CASES</a>
        <a class="tab-link" onclick="switchSubTab('neural')">NEURAL CAT</a>
        <a class="tab-link" onclick="switchSubTab('upgrades')">UPGRADES</a>
        <a class="tab-link" onclick="switchSubTab('contracts')">CONTRACTS</a>
    </nav>

    <div class="main-container">
        <div id="cases-area" class="page-section active">
            <h2 style="font-family:'Orbitron'; font-size:16px; margin-bottom:20px; border-left:3px solid var(--main); padding-left:15px;">MYSTERY BOXES</h2>
            <div class="case-grid">
                <div class="case-card" onclick="alert('Opening Case...')">
                    <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                    <div class="case-name">STREET NIGHTMARE</div>
                    <div class="case-price">500 B</div>
                </div>
                <div class="case-card" onclick="alert('Opening Case...')">
                    <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                    <div class="case-name">EMERALD BOX</div>
                    <div class="case-price">1,200 B</div>
                </div>
                <div class="case-card" onclick="alert('Opening Case...')">
                    <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                    <div class="case-name">CYBER CRATE</div>
                    <div class="case-price">2,500 B</div>
                </div>
            </div>
        </div>

        <div id="cat-area" class="page-section" style="text-align:center;">
            <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" style="width:250px; border-radius:20px; cursor:pointer;" onclick="alert('Meow!')">
            <h2 style="font-family:'Orbitron'; margin-top:20px;">NEURAL CAT MINER</h2>
            <p>Click to earn bonus points!</p>
        </div>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('u-name').innerText = user.displayName.split(' ')[0].toUpperCase();
            document.getElementById('u-pic').src = user.photoURL;
            document.getElementById('login-btn').style.display = 'none';
            db.ref('users/'+user.uid+'/balance').on('value', s => {
                document.getElementById('u-bal').innerText = (s.val() || 0).toLocaleString() + " B";
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function switchSubTab(tab) {
        // Reset active links
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        
        // Target specific section
        if(tab === 'all') {
            document.getElementById('cases-area').classList.add('active');
        } else if(tab === 'neural') {
            document.getElementById('cat-area').classList.add('active');
        }
        event.currentTarget.classList.add('active');
    }

    function joinEvent() {
        alert("Joining EMERALD SKIES event!");
        // Scroll to cases as an example
        document.querySelector('.sub-nav').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
