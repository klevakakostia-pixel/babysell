<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - TRADE & SELL</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #08080a; --accent: #ff2d55;
            --rarity-knife: #eb4b4b; --rarity-ak: #d32ee6; --rarity-usp: #00ffaa; --rarity-glock: #4b69ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 75px; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111;
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .btn-nav { 
            background: rgba(255,255,255,0.05); border: 1px solid #222; color: #fff; 
            padding: 8px 15px; border-radius: 5px; font-family: 'Orbitron'; font-size: 11px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover { border-color: var(--main); color: var(--main); }

        .user-block { display: flex; align-items: center; gap: 12px; }
        .balance-card { background: #000; border: 1px solid var(--main); padding: 5px 12px; border-radius: 5px; text-align: right; }

        /* INVENTORY */
        #inventory-page { display: none; padding: 40px; animation: fadeIn 0.4s; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .inv-item {
            background: #0c0c0f; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px;
            text-align: center; position: relative; transition: 0.3s; overflow: hidden;
        }
        .inv-item:hover { border-color: var(--main); transform: translateY(-5px); }
        .inv-item img { width: 100px; margin-bottom: 10px; }
        .inv-item .name { font-size: 11px; font-family: 'Orbitron'; color: #eee; margin-bottom: 10px; }
        
        .btn-sell {
            background: var(--accent); color: #fff; border: none; padding: 5px 10px;
            border-radius: 4px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
            width: 100%; transition: 0.3s;
        }
        .btn-sell:hover { background: #ff4d6d; box-shadow: 0 0 10px var(--accent); }

        /* MODALS & CASE (Existing Styles) */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .case-card { display: inline-block; background: #0c0c0f; border: 1px solid #1a1a1a; border-radius: 20px; padding: 40px; cursor: pointer; transition: 0.3s; }
        .case-card:hover { border-color: var(--main); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #050507; border: 1px solid #222; padding: 40px; border-radius: 20px; width: 90%; max-width: 600px; text-align: center; }
        
        .roulette-win { position: relative; width: 100%; height: 160px; background: #000; margin: 30px 0; overflow: hidden; border: 1px solid #111; }
        .strip { display: flex; position: absolute; left: 0; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 150px; height: 160px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #0a0a0a; }
        .item img { width: 100px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header class="header">
    <div class="nav-left">
        <h2 style="font-family:'Orbitron'; color:var(--main);">BABYSELL</h2>
        <button class="btn-nav" onclick="showPage('home')">MARKET</button>
        <button class="btn-nav" onclick="showPage('inventory')">INVENTORY (<span id="inv-count">0</span>)</button>
    </div>
    <div class="user-block">
        <div class="balance-card">
            <div id="u-name" style="font-family:'Orbitron'; font-size:9px; color:#555;">GUEST</div>
            <div id="u-bal" style="color:var(--main); font-weight:bold;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <button id="l-btn" onclick="login()" style="background:var(--main); border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:9px;">LOGIN</button>
    </div>
</header>

<div id="home-page">
    <div class="container">
        <div class="case-card" onclick="openCase()">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <div style="font-family:'Orbitron'; margin-top:20px; font-size:18px;">HARDCORE CASE</div>
            <div style="color:var(--main); font-weight:bold; font-size:22px;">1,000 B</div>
        </div>
    </div>
</div>

<div id="inventory-page">
    <h2 style="font-family:'Orbitron'; text-align: center; letter-spacing: 2px;">YOUR COLLECTION</h2>
    <div class="inv-grid" id="inv-grid"></div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box">
        <h2 id="m-status" style="font-family:'Orbitron';">ROLLING...</h2>
        <div class="roulette-win">
            <div style="position:absolute; left:50%; top:0; width:2px; height:100%; background:var(--main); z-index:10;"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button class="btn-nav" style="background:var(--main); color:#000;" id="spin-btn" onclick="startSpin()">SPIN</button>
        <button onclick="closeModal()" style="display:block; margin:20px auto 0; background:none; border:none; color:#444; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { id: 'knife', name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", color: "#eb4b4b", price: 15000 },
        { id: 'ak', name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", color: "#d32ee6", price: 1200 },
        { id: 'usp', name: "USP-S Cyber", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", color: "#00ffaa", price: 400 },
        { id: 'glock', name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", color: "#4b69ff", price: 150 }
    ];

    let user = null, balance = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('u-name').innerText = u.displayName.split(' ')[0].toUpperCase();
            document.getElementById('u-pic').src = u.photoURL;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                const inv = s.val() || {};
                document.getElementById('inv-count').innerText = Object.keys(inv).length;
                renderInventory(inv);
            });
        }
    });

    function showPage(p) {
        document.getElementById('home-page').style.display = p === 'home' ? 'block' : 'none';
        document.getElementById('inventory-page').style.display = p === 'inventory' ? 'block' : 'none';
    }

    function renderInventory(inv) {
        const grid = document.getElementById('inv-grid');
        grid.innerHTML = "";
        Object.keys(inv).forEach(key => {
            const item = inv[key];
            grid.innerHTML += `
                <div class="inv-item">
                    <img src="${item.img}">
                    <div class="name">${item.name}</div>
                    <button class="btn-sell" onclick="sellItem('${key}', ${item.price})">SELL: ${item.price} B</button>
                    <div style="position:absolute; bottom:0; left:0; width:100%; height:3px; background:${item.color}"></div>
                </div>
            `;
        });
    }

    function sellItem(key, price) {
        if(!confirm(`Sell this item for ${price} B?`)) return;
        db.ref('users/'+user.uid+'/inventory/'+key).remove();
        db.ref('users/'+user.uid+'/balance').set(balance + price);
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function openCase() {
        if(!user) return alert("Login first!");
        if(balance < 1000) return alert("Need 1,000 B");
        document.getElementById('case-modal').style.display = 'flex';
        prepareRoulette();
    }

    function prepareRoulette() {
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<80; i++) {
            const skin = SKINS[Math.floor(Math.random() * SKINS.length)];
            strip.innerHTML += `<div class="item"><img src="${skin.img}"></div>`;
        }
    }

    function startSpin() {
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        let rand = Math.random() * 100;
        let winSkin;
        if (rand <= 0.01) winSkin = SKINS[0];
        else if (rand <= 1.01) winSkin = SKINS[1];
        else if (rand <= 31.01) winSkin = SKINS[2];
        else winSkin = SKINS[3];

        const strip = document.getElementById('strip');
        const winIndex = 70;
        strip.getElementsByClassName('item')[winIndex].innerHTML = `<img src="${winSkin.img}">`;

        const targetPos = (winIndex * 150) - (document.querySelector('.roulette-win').offsetWidth / 2) + 75;
        strip.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${targetPos}px)`;

        setTimeout(() => {
            document.getElementById('m-status').innerText = "WIN: " + winSkin.name;
            db.ref('users/'+user.uid+'/inventory').push(winSkin);
        }, 6200);
    }

    function closeModal() {
        document.getElementById('case-modal').style.display = 'none';
        document.getElementById('spin-btn').disabled = false;
        document.getElementById('m-status').innerText = "ROLLING...";
    }
</script>
</body>
</html>
