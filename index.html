<style>
    /* Стилі для адмін-панелі */
    .admin-footer {
        margin-top: 50px;
        padding: 20px;
        text-align: center;
        border-top: 1px solid #111;
    }
    .btn-admin-open {
        background: none;
        border: 1px dashed #333;
        color: #333;
        padding: 5px 15px;
        font-family: 'Orbitron';
        font-size: 10px;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-admin-open:hover {
        border-color: var(--accent);
        color: var(--accent);
    }
    .admin-input {
        background: #000;
        border: 1px solid #222;
        color: var(--main);
        padding: 10px;
        margin-bottom: 10px;
        width: 100%;
        font-family: 'Orbitron';
        outline: none;
    }
</style>

<footer class="admin-footer">
    <button class="btn-admin-open" onclick="openAdminAuth()">ADMIN ACCESS</button>
</footer>

<div id="admin-auth-modal" class="modal">
    <div class="modal-box" style="max-width: 300px;">
        <h3 style="font-family:'Orbitron'; color:var(--accent); margin-bottom: 15px;">TERMINAL LOGIN</h3>
        <input type="text" id="adm-login" class="admin-input" placeholder="LOGIN">
        <input type="password" id="adm-pass" class="admin-input" placeholder="PASSWORD">
        <button class="btn-nav" style="width:100%; background:var(--accent); color:#fff;" onclick="checkAdminAuth()">ACCESS</button>
        <button onclick="closeAdminAuth()" style="margin-top:10px; background:none; border:none; color:#444; cursor:pointer;">EXIT</button>
    </div>
</div>

<div id="admin-panel" class="modal">
    <div class="modal-box">
        <h2 style="font-family:'Orbitron'; color:var(--main); margin-bottom: 20px;">CORE ADMIN PANEL</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-nav" onclick="addMoney(10000)">+10,000 B</button>
            <button class="btn-nav" onclick="addMoney(100000)">+100,000 B</button>
            <button class="btn-nav" style="background:var(--accent); color:#fff;" onclick="resetBalance()">RESET BAL</button>
            <button class="btn-nav" onclick="closeAdminPanel()">CLOSE</button>
        </div>
        <p style="margin-top:15px; font-size:10px; color:#555;">Target: Current Authenticated User</p>
    </div>
</div>

<script>
    // --- ADMIN LOGIC ---
    function openAdminAuth() {
        document.getElementById('admin-auth-modal').style.display = 'flex';
    }

    function closeAdminAuth() {
        document.getElementById('admin-auth-modal').style.display = 'none';
        document.getElementById('adm-login').value = "";
        document.getElementById('adm-pass').value = "";
    }

    function checkAdminAuth() {
        const l = document.getElementById('adm-login').value;
        const p = document.getElementById('adm-pass').value;

        if(l === "BabyIceFace666" && p === "kov6alex666") {
            closeAdminAuth();
            document.getElementById('admin-panel').style.display = 'flex';
            toast("ACCESS GRANTED. WELCOME ADM.");
        } else {
            const err = new Audio('https://files.catbox.moe/czo3o9.mp3');
            err.play();
            toast("ACCESS DENIED.");
        }
    }

    function closeAdminPanel() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    function addMoney(amount) {
        if(!user) return toast("Login as user first!");
        db.ref('users/'+user.uid+'/balance').set(balance + amount);
        toast("Injected " + amount + " B");
    }

    function resetBalance() {
        if(!user) return;
        db.ref('users/'+user.uid+'/balance').set(0);
        toast("Balance cleared.");
    }

    // Не забудь додати ці функції до свого основного <script>
</script>
