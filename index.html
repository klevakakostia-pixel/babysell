<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - 360HZ ULTRA SMOOTH EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; 
            --bg: #010102; 
            --glass: rgba(255, 255, 255, 0.03);
            /* УЛЬТРА ПЛАВНА КРИВА (360Hz Feel) */
            --ease-ultra: cubic-bezier(0.22, 1, 0.36, 1); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 170, 0.05) 0%, transparent 60%);
        }

        /* --- WELCOME (ULTRA SMOOTH FADE) --- */
        #welcome-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 2s var(--ease-ultra), visibility 2s;
        }
        .welcome-logo {
            font-family: 'Orbitron'; font-size: 50px; font-weight: 900; letter-spacing: 15px;
            color: #fff; text-shadow: 0 0 30px var(--main); margin-bottom: 30px;
            animation: logoGlow 3s infinite alternate var(--ease-ultra);
        }
        @keyframes logoGlow { from { opacity: 0.4; } to { opacity: 1; } }
        
        .enter-btn {
            background: none; border: 1px solid var(--main); color: var(--main);
            padding: 15px 40px; font-family: 'Orbitron'; cursor: pointer;
            letter-spacing: 3px; transition: all 0.6s var(--ease-ultra);
        }
        .enter-btn:hover { background: var(--main); color: #000; box-shadow: 0 0 30px var(--main); }

        /* --- APP CONTENT (ULTRA SMOOTH FADE IN) --- */
        .app-content { 
            opacity: 0; transform: translateY(15px); filter: blur(10px); 
            transition: opacity 1.8s var(--ease-ultra), transform 1.8s var(--ease-ultra), filter 1.8s var(--ease-ultra); 
        }
        .app-loaded .app-content { opacity: 1; transform: translateY(0); filter: blur(0); }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 80px; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,170,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        /* NAVIGATION BUTTONS */
        .btn-nav { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 10px 18px; border-radius: 8px; font-family: 'Orbitron'; 
            font-size: 11px; cursor: pointer; transition: all 0.5s var(--ease-ultra);
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: #fff; box-shadow: 0 0 15px rgba(0,255,170,0.3); }

        /* CASE CARDS (SMOOTH POP) */
        .case-card {
            background: rgba(15, 15, 20, 0.7); padding: 40px; border-radius: 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            transition: all 0.8s var(--ease-ultra);
            animation: cardAppear 1s var(--ease-ultra) backwards;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0,255,170,0.15); }
        .case-card img { width: 100%; max-width: 200px; animation: float 6s ease-in-out infinite var(--ease-ultra); }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ROULETTE MODAL (SMOOTH ZOOM IN) */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px);
            transition: opacity 0.8s var(--ease-ultra);
        }
        .modal-content {
            width: 90%; max-width: 800px; background: #08080a; padding: 50px; 
            border-radius: 30px; border: 1px solid #222; text-align: center;
            animation: modalZoom 0.8s var(--ease-ultra);
        }
        @keyframes modalZoom { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* ROULETTE STRIP (NO MOTION BLUR, VERY SMOOTH) */
        .view-window { position: relative; width: 100%; height: 160px; background: #000; margin: 25px 0; overflow: hidden; border: 1px solid #222; border-radius: 15px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 20px var(--main); }
        
        .strip { 
            display: flex; position: absolute; left: 0; height: 100%; 
            /* НАДПЛАВНА ПРОКРУТКА - 9 СЕКУНД */
            transition: transform 9s cubic-bezier(0.1, 0, 0.1, 1); 
            will-change: transform;
        }
        
        .item { min-width: 160px; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.01); }
        .item img { transition: opacity 1s var(--ease-ultra); }

        /* INVENTORY ITEM (SMOOTH POP) */
        .inv-item {
            background: var(--glass); padding: 20px; border-radius: 20px; text-align: center;
            transition: all 0.6s var(--ease-ultra);
            animation: invAppear 0.6s var(--ease-ultra) backwards;
        }
        .inv-item:hover { transform: scale(1.03); background: rgba(255,255,255,0.05); }
        @keyframes invAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        #snd-tick, #case-open-sound, #bg-music { display: none; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-logo">BABYSELL</div>
    <button class="enter-btn" onclick="initApp()">INITIALIZE SYSTEM</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3" type="audio/mpeg"></audio>
<audio id="case-open-sound"><source src="https://files.catbox.moe/7f3jzq.mp3" type="audio/mpeg"></audio>
<audio id="snd-tick"><source src="https://www.soundjay.com/buttons/sounds/button-50.mp3" type="audio/mpeg"></audio>

<div class="app-content">
    <header class="header">
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" id="tab-market" onclick="showPage('market')">MARKET</button>
            <button class="btn-nav" id="tab-inventory" onclick="showPage('inventory')">INVENTORY</button>
        </div>
        <div class="logo-center">BABYSELL</div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="u-bal" style="color:var(--main); font-family:'Orbitron'; font-size:20px; font-weight:900; letter-spacing:1px;">0 B</div>
            <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000; font-weight:900; border:none;">LOGIN</button>
            <div id="l-prof" style="display:none; align-items:center; gap:10px;">
                <img id="l-ava" src="" style="width:38px; border-radius:50%; border:2px solid var(--main); transition: transform 0.6s var(--ease-ultra);">
            </div>
        </div>
    </header>

    <div id="page-market" class="page active" style="padding:60px 20px;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:30px; max-width:1000px; margin:0 auto;">
            <div class="case-card" onclick="openCaseModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <h2 style="font-family:'Orbitron'; margin-top:20px; font-size:16px;">MYSTERIOUS NIGHTS</h2>
                <div style="color:var(--main); font-family:'Orbitron'; font-size:24px; margin-top:10px; font-weight:bold;">1,000 B</div>
            </div>
        </div>
    </div>

    <div id="page-inventory" class="page" style="padding:50px;">
        <h2 style="font-family:'Orbitron'; color:var(--main); margin-bottom:30px;">MY COLLECTION</h2>
        <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
    </div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-content">
        <h2 id="win-status" style="font-family:'Orbitron'; color:var(--main); letter-spacing:5px;">LUCK IS NEAR...</h2>
        <div class="view-window">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:100%; height:55px; background:var(--main); color:#000; font-weight:900; font-size:16px;" onclick="startSpin()">OPEN CASE</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#333; margin-top:15px; cursor:pointer; font-family:Orbitron; letter-spacing:1px; font-size:10px; transition: 0.4s var(--ease-ultra);">CLOSE</button>
    </div>
</div>

<div id="notif" style="position:fixed; bottom:30px; right:30px; z-index:9999;"></div>

<script>
    const music = document.getElementById('bg-music');
    const caseSound = document.getElementById('case-open-sound');
    const tickSound = document.getElementById('snd-tick');
    tickSound.volume = 0.05; // Зробив "тік-тік" надтихим для плавності

    function initApp() {
        music.volume = 0.2; music.play();
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.visibility = 'hidden';
            document.body.classList.add('app-loaded');
        }, 1500);
    }

    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const HARDCORE_SKINS = [
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff" },
        { name: "Desert Eagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, chance: 20, color: "#8847ff" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, chance: 8, color: "#d32ee6" },
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, chance: 2, color: "#ebca42" }
    ];

    let user = null, balance = 0, userInv = {};

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'flex';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                userInv = s.val() || {};
                renderInventory();
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function openCaseModal() {
        if(!user) return login();
        document.getElementById('case-modal').style.display = 'flex';
        document.getElementById('win-status').innerText = "LUCK IS NEAR...";
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<100; i++) {
            let s = HARDCORE_SKINS[Math.floor(Math.random()*HARDCORE_SKINS.length)];
            strip.innerHTML += `<div class="item"><img src="${s.img}" width="90" style="opacity:0.4"></div>`;
        }
    }

    function startSpin() {
        if(balance < 1000) return alert("NOT ENOUGH BALANCE");
        const spinBtn = document.getElementById('spin-btn');
        spinBtn.disabled = true;

        // Плавний Audio Ducking (1 секунда)
        fadeVolume(music, 0.03, 1000);

        caseSound.currentTime = 0;
        caseSound.volume = 0.4;
        caseSound.play();

        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        const win = getWin();
        const strip = document.getElementById('strip');
        
        // Підставляємо виграш (і робимо його чітким)
        strip.children[80].innerHTML = `<img src="${win.img}" width="120" style="filter:drop-shadow(0 0 20px ${win.color})">`;
        strip.children[80].firstChild.style.opacity = '1';
        
        const move = (80 * 160) - (document.querySelector('.view-window').offsetWidth / 2) + 80;
        
        // НАДПЛАВНА АНІМАЦІЯ (9 Секунд)
        strip.style.transition = 'transform 9s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        // Дуже тихий тик звуки (під новий темп)
        for(let i=0; i<60; i++) {
            setTimeout(() => { 
                if(document.getElementById('case-modal').style.display === 'flex') 
                    tickSound.cloneNode().play(); 
            }, i * i * 2.5);
        }

        setTimeout(() => {
            db.ref('users/'+u.uid+'/inventory').push(win);
            document.getElementById('win-status').innerText = "CONGRATS: " + win.name.toUpperCase();
            document.getElementById('win-status').style.color = win.color;
            spinBtn.disabled = false;
            
            // Плавне повернення музики (2 секунди)
            fadeVolume(music, 0.2, 2000);
        }, 9200);
    }

    function getWin() {
        let r = Math.random() * 100, c = 0;
        for(let s of HARDCORE_SKINS) {
            c += s.chance; if(r <= c) return s;
        }
        return HARDCORE_SKINS[0];
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).reverse().forEach(id => {
            const i = userInv[id];
            g.innerHTML += `<div class="inv-item" style="border-bottom:3px solid ${i.color};">
                <img src="${i.img}" width="110"><br><b style="font-family:Orbitron; font-size:11px;">${i.name}</b><br>
                <button class="btn-nav" style="width:100%; margin-top:10px; font-size:10px;" onclick="sell('${id}',${i.price})">SELL ${i.price} B</button>
            </div>`;
        });
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function showPage(p) {
        document.getElementById('page-market').style.display = (p==='market') ? 'block' : 'none';
        document.getElementById('page-inventory').style.display = (p==='inventory') ? 'block' : 'none';
    }
    function closeModals() { 
        document.getElementById('case-modal').style.display = 'none'; 
        caseSound.pause();
        fadeVolume(music, 0.2, 500); // Швидке повернення музики
    }

    // Допоміжна функція для плавного затухання звуку
    function fadeVolume(audio, targetVolume, duration) {
        const startVolume = audio.volume;
        const startTime = Date.now();

        const timer = setInterval(() => {
            const currentTime = Date.now();
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Плавна крива для звуку (ease-out)
            const easeProgress = 1 - Math.pow(1 - progress, 2); 

            audio.volume = startVolume + (targetVolume - startVolume) * easeProgress;

            if (progress === 1) clearInterval(timer);
        }, 50); // Оновлюємо кожні 50мс
    }
</script>
</body>
</html>
