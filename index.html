<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - CASE OPENING</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #050508; --border: rgba(0, 255, 170, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        #particles-js { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .app { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Orbitron'; font-size: 24px; letter-spacing: 3px; cursor: pointer; color: #fff; text-decoration: none; }
        .logo span { color: var(--main); text-shadow: 0 0 15px var(--main); }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .bal-box { 
            background: rgba(0,255,170,0.08); border: 1px solid var(--main); 
            padding: 8px 20px; border-radius: 10px; color: var(--main); 
            font-family: 'Orbitron'; min-width: 120px; text-align: center;
        }

        /* SETTINGS */
        .settings-panel {
            position: absolute; top: 60px; right: 40px; width: 250px;
            background: rgba(10, 10, 15, 0.98); border: 1px solid var(--main);
            border-radius: 15px; padding: 20px; display: none; flex-direction: column; gap: 15px;
            backdrop-filter: blur(15px); z-index: 1000;
        }
        .settings-panel.active { display: flex; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* CASES */
        .cases-grid { display: flex; gap: 50px; justify-content: center; padding-top: 50px; flex-wrap: wrap; }
        .case-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 30px; border-radius: 25px; width: 280px; text-align: center; cursor: pointer; transition: 0.5s; position: relative; }
        .case-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .case-img { width: 100%; border-radius: 15px; }
        
        /* LOCKED STATE */
        .case-card.locked { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }
        .case-card.locked:hover { transform: none; border-color: var(--border); }
        .lock-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); border-radius: 25px; }
        .timer-text { font-family: 'Orbitron'; color: var(--main); font-size: 18px; margin-top: 10px; text-shadow: 0 0 10px var(--main); }

        .btn { background: transparent; color: var(--main); border: 2px solid var(--main); padding: 14px 40px; border-radius: 12px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover:not(:disabled) { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ROULETTE */
        .roulette-wrapper { 
            position: relative; width: 800px; height: 200px; 
            background: rgba(0,0,0,0.9); border: 2px solid var(--main); 
            overflow: hidden; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 255, 170, 0.1);
        }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--main); z-index: 20; transform: translateX(-50%); box-shadow: 0 0 15px var(--main); }
        .track { display: flex; align-items: center; position: absolute; height: 100%; left: 0; will-change: transform; }
        .track div { min-width: 160px; height: 200px; display: flex; justify-content: center; align-items: center; padding: 10px; border-right: 1px solid rgba(255,255,255,0.05); }
        .track div img { max-width: 120px; max-height: 120px; object-fit: contain; }
        .track div.active { background: rgba(0,255,170,0.1); transform: scale(1.1); transition: 0.5s; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-cnt { background: #08080a; padding: 50px; border: 1px solid var(--main); border-radius: 30px; text-align: center; }
        #win-res img { width: 200px; height: 200px; object-fit: contain; margin-bottom: 20px; }
    </style>
</head>
<body>

    <audio id="bg-music"></audio>
    <div id="particles-js"></div>

    <div class="app">
        <header class="header">
            <div class="logo" onclick="showScreen('screen-cases')">BABY<span>SELL</span></div>
            <div class="header-right">
                <div style="display:flex; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; overflow:hidden;">
                    <input type="text" id="promo-input" placeholder="ПРОМО" style="background:none; border:none; color:#fff; padding:5px 10px; width:80px; font-family:'Rajdhani';">
                    <button onclick="usePromo()" style="background:var(--main); border:none; padding:0 10px; font-family:'Orbitron'; font-size:10px; cursor:pointer;">OK</button>
                </div>
                <div class="bal-box"><span id="u-balance">0</span> B</div>
                <button id="login-btn" class="btn" style="padding: 8px 15px; font-size: 11px;" onclick="googleAuth()">LOGIN</button>
                
                <div class="user-menu-container" id="user-info" style="display:none">
                    <img src="" id="u-pic" onclick="toggleSettings()" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--main); cursor: pointer;">
                    <div class="settings-panel" id="settings-panel">
                        <h4 style="font-family:'Orbitron'; font-size:11px; color:#fff; margin-bottom:10px; text-align:center;">SETTINGS</h4>
                        <div style="display:flex; flex-direction:column; gap:10px;">
                            <label style="font-size:10px; color:var(--main);">MUSIC</label>
                            <select id="music-state" onchange="handleMusic()" style="background:#111; color:#fff; border:1px solid var(--border); padding:5px;">
                                <option value="off">OFF</option>
                                <option value="on">ON</option>
                            </select>
                            <label style="font-size:10px; color:var(--main);">VOLUME</label>
                            <input type="range" id="volume-range" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume()">
                        </div>
                        <div class="logout-btn" style="color:#ff4444; cursor:pointer; font-size:12px; text-align:center; margin-top:10px;" onclick="auth.signOut()">LOGOUT</div>
                    </div>
                </div>
            </div>
        </header>

        <main style="flex:1; display:flex; justify-content:center; align-items:center;">
            <section id="screen-cases" class="screen" style="display:flex;">
                <div class="cases-grid">
                    <div class="case-card" onclick="openPreview('УЛИЧНЫЕ КОШМАРЫ', 'https://i.postimg.cc/ZnHQ1pwz/AAA.png', false)">
                        <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" class="case-img">
                        <h3 style="font-family:'Orbitron'; margin-top:20px; font-size:14px;">УЛИЧНЫЕ КОШМАРЫ</h3>
                    </div>
                    <div id="case-lucky" class="case-card locked">
                        <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png" class="case-img">
                        <h3 style="font-family:'Orbitron'; margin-top:20px; font-size:14px;">НАВЕРНОЕ ПОВЕЗЕТ</h3>
                        <div class="lock-overlay">
                            <span style="font-size: 30px;">🔒</span>
                            <div id="timer" class="timer-text">00:00:00</div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="screen-preview" class="screen" style="display:none; flex-direction:column; align-items:center;">
                <img id="preview-img" src="" width="250">
                <h2 id="preview-name" style="font-family:'Orbitron'; margin: 25px 0;"></h2>
                <button id="spin-btn" class="btn" onclick="startSpin()">ОТКРЫТЬ ЗА 500 B</button>
                <p onclick="showScreen('screen-cases')" style="cursor:pointer; margin-top:30px; color:#666;">← НАЗАД</p>
            </section>

            <section id="screen-roulette" class="screen" style="display:none; flex-direction:column; align-items:center;">
                <div class="roulette-wrapper">
                    <div class="pointer"></div>
                    <div id="track" class="track"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-cnt">
            <h2 style="font-family:'Orbitron'; color:var(--main); margin-bottom:20px;">ВЫПАЛО!</h2>
            <div id="win-res"></div>
            <button class="btn" onclick="closeWin()" style="margin-top:20px;">ЗАБРАТЬ</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const LOOT = [
            { n: "ГЛОК КАРАМЕЛЬНОЕ ЯБЛОКО", p: 350, img: "https://i.postimg.cc/Hk5Jznr2/Glock.png" },
            { n: "USP-S ИЗВИЛИНЫ", p: 500, img: "https://i.postimg.cc/HL5phv0W/aaaaa.png" },
            { n: "АКР ТУННЕЛЬНЫЕ ТВАРИ", p: 2000, img: "https://i.postimg.cc/3NW96mG1/AK.png" },
            { n: "BUTTERFLY | EMERALD", p: 5000, img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png" }
        ];

        // --- TIMER LOGIC ---
        function initTimer() {
            let unlockTime = localStorage.getItem('unlockTime');
            if (!unlockTime) {
                // Устанавливаем время: сейчас + 13ч 19мин
                unlockTime = Date.now() + (13 * 60 * 60 * 1000) + (19 * 60 * 1000);
                localStorage.setItem('unlockTime', unlockTime);
            }

            const timerDisplay = document.getElementById('timer');
            const caseLucky = document.getElementById('case-lucky');

            const x = setInterval(function() {
                const now = Date.now();
                const distance = unlockTime - now;

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                timerDisplay.innerHTML = hours + "h " + minutes + "m " + seconds + "s ";

                if (distance < 0) {
                    clearInterval(x);
                    timerDisplay.innerHTML = "OPEN NOW!";
                    caseLucky.classList.remove('locked');
                    caseLucky.onclick = () => openPreview('НАВЕРНОЕ ПОВЕЗЕТ', 'https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png', false);
                    document.querySelector('.lock-overlay').style.display = 'none';
                }
            }, 1000);
        }
        initTimer();

        // --- MUSIC ---
        const playlist = ["https://files.catbox.moe/sv6xxw.mp3", "https://files.catbox.moe/zjpbt5.mp3", "https://files.catbox.moe/957yym.mp3"];
        let currentTrackIdx = 0;
        const audio = document.getElementById('bg-music');
        function handleMusic() {
            if (document.getElementById('music-state').value === "on") playNext();
            else audio.pause();
        }
        function playNext() {
            audio.src = playlist[currentTrackIdx];
            audio.play().catch(() => {});
            currentTrackIdx = (currentTrackIdx + 1) % playlist.length;
        }
        audio.onended = playNext;
        function changeVolume() { audio.volume = document.getElementById('volume-range').value; }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }

        // --- FIREBASE ---
        const firebaseConfig = { 
            apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
            authDomain: "babysell-8b37b.firebaseapp.com", 
            projectId: "babysell-8b37b", 
            databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
            appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        let bal = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid + '/balance').on('value', s => {
                    bal = s.val() || 0;
                    document.getElementById('u-balance').innerText = bal.toLocaleString();
                });
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('u-pic').src = user.photoURL;
            } else {
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-info').style.display = 'none';
            }
        });

        window.googleAuth = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        
        window.usePromo = () => {
            const input = document.getElementById('promo-input').value.trim().toUpperCase();
            if (input === "ADMIN2027" && auth.currentUser) {
                db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => (c || 0) + 50000);
            }
            document.getElementById('promo-input').value = '';
        };

        // --- CORE ---
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        };

        window.openPreview = (name, img, isLocked) => {
            if(isLocked) return;
            document.getElementById('preview-name').innerText = name;
            document.getElementById('preview-img').src = img;
            showScreen('screen-preview');
        };

        window.startSpin = () => {
            if (!auth.currentUser) { alert("Сначала залогинься!"); return; }
            if (bal < 500) { alert("Недостаточно баланса!"); return; }
            
            const uId = auth.currentUser.uid;
            const spinBtn = document.getElementById('spin-btn');
            spinBtn.disabled = true;

            db.ref(`users/${uId}/balance`).transaction(c => (c || 0) - 500);
            showScreen('screen-roulette');
            
            const winIndex = 35;
            const winItem = LOOT[Math.floor(Math.random() * LOOT.length)];
            const track = document.getElementById('track');
            
            track.innerHTML = '';
            track.style.transition = 'none';
            track.style.transform = `translateX(0px)`;

            for (let i = 0; i < 45; i++) {
                const item = (i === winIndex) ? winItem : LOOT[Math.floor(Math.random() * LOOT.length)];
                const div = document.createElement('div');
                div.innerHTML = `<img src="${item.img}">`;
                track.appendChild(div);
            }

            setTimeout(() => {
                track.style.transition = 'transform 7s cubic-bezier(0.15, 0, 0.05, 1)';
                const itemWidth = 160;
                const wrapperWidth = 800;
                const shift = (winIndex * itemWidth) - (wrapperWidth / 2) + (itemWidth / 2);
                track.style.transform = `translateX(-${shift}px)`;
            }, 50);

            setTimeout(() => {
                track.querySelectorAll('div')[winIndex].classList.add('active');
                db.ref(`users/${uId}/balance`).transaction(c => (c || 0) + winItem.p);
                document.getElementById('win-res').innerHTML = `<img src="${winItem.img}"><h3>${winItem.n}</h3><p style="color:var(--main); font-size:20px;">+${winItem.p} B</p>`;
                document.getElementById('win-modal').style.display = 'flex';
                spinBtn.disabled = false;
            }, 7500);
        };

        window.closeWin = () => { document.getElementById('win-modal').style.display = 'none'; showScreen('screen-cases'); };
        particlesJS("particles-js", { particles: { number: { value: 40 }, color: { value: "#00ffaa" }, opacity: { value: 0.2 }, size: { value: 2 }, move: { speed: 1, direction: "top" } } });
    </script>
</body>
</html>
