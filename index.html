<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL 1.0 BETA</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root { 
            --main: #ff9d00; /* Теплий неоновий захід сонця */
            --bg: #050212; /* Глибокий вечірній фіолетово-чорний */
            --ease-hyper: cubic-bezier(0.15, 0.85, 0.25, 1);
            --wave-color: rgba(255, 157, 0, 0.02);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; position: relative; min-height: 100vh; }

        /* ======== НОВИЙ АНІМОВАНИЙ ФОН: СТАВОК, СОНЦЕ, КУРОЧКА ======== */
        .pond-bg-container {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background: linear-gradient(to bottom, #040110 0%, #110624 40%, #220b29 75%, #05141c 100%);
            overflow: hidden;
        }
        
        /* Гарне неонове сонце */
        .pond-sun {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px;
            background: radial-gradient(circle, #ffb700 10%, #ff4500 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(2ff, 69, 0, 0.5), 0 0 140px rgba(255, 183, 0, 0.2);
            animation: sunPulse 8s ease-in-out infinite alternate;
        }
        @keyframes sunPulse { 
            from { transform: translate(-50%, -50%) scale(0.96); opacity: 0.85; } 
            to { transform: translate(-50%, -50%) scale(1.04); opacity: 1; } 
        }
        
        /* Вода ставка та її блики */
        .pond-water-layer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 32vh;
            background: linear-gradient(to bottom, rgba(255, 157, 0, 0.05) 0%, rgba(3, 15, 24, 0.95) 100%);
            border-top: 1px solid rgba(255, 157, 0, 0.2);
            backdrop-filter: blur(1px);
        }
        .pond-wave {
            position: absolute; bottom: -50vw; left: -50vw; width: 200vw; height: 200vw;
            background: var(--wave-color); border-radius: 44%;
            animation: waveSpin 35s linear infinite;
        }
        .pond-wave:nth-child(2) {
            bottom: -53vh; left: -45vw; background: rgba(255, 69, 0, 0.015); border-radius: 41%;
            animation: waveSpin 50s linear infinite reverse;
        }
        @keyframes waveSpin { 100% { transform: rotate(360deg); } }

        /* Векторна графіка пляжу та курочки */
        .beach-vector-scene {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2;
        }

        /* WELCOME SCREEN */
        #welcome-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 2.5s var(--ease-hyper), visibility 2.5s;
        }
        .welcome-logo {
            font-family: 'Orbitron'; font-size: 60px; font-weight: 900; letter-spacing: 20px;
            text-shadow: 0 0 50px var(--main); animation: softGlow 4s infinite alternate;
        }
        @keyframes softGlow { from { opacity: 0.3; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* CONTENT APPEARANCE */
        .app-content { 
            opacity: 0; filter: blur(20px); transform: scale(1.05);
            transition: all 2.5s var(--ease-hyper); z-index: 10; position: relative;
        }
        .app-loaded .app-content { opacity: 1; filter: blur(0); transform: scale(1); }

        /* HEADER & NAV */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 60px; height: 100px; background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,157,0,0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        .btn-nav { 
            position: relative; overflow: hidden; background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.08); color: #ccc; padding: 12px 25px; 
            border-radius: 30px; 
            font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px; cursor: pointer; transition: 0.5s var(--ease-hyper);
        }
        .btn-nav::before {
            content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 100%;
            background: var(--main); border-radius: 50%; transition: top 0.5s var(--ease-hyper); z-index: -1;
        }
        .btn-nav:hover:not(:disabled) { color: #000; border-color: var(--main); box-shadow: 0 0 20px rgba(255,157,0,0.4); }
        .btn-nav:hover:not(:disabled)::before { top: 0; border-radius: 0; }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* CASE CARDS */
        .case-card {
            background: rgba(4,3,10,0.85); padding: 60px; border-radius: 40px; text-align: center;
            border: 1px solid rgba(255,157,0,0.1); transition: 1s var(--ease-hyper);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9), 0 20px 40px rgba(0,0,0,0.5); 
            cursor: pointer; position: relative; overflow: hidden; backdrop-filter: blur(10px);
        }
        .case-card::before {
            content: ''; position: absolute; bottom: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,157,0,0.05) 0%, transparent 70%);
            opacity: 0; transition: 1s var(--ease-hyper); pointer-events: none;
        }
        .case-card:hover { transform: translateY(-15px); border-color: var(--main); box-shadow: 0 30px 60px rgba(255,157,0,0.15); }
        .case-card:hover::before { opacity: 1; transform: scale(1.2); }
        .case-card img { width: 100%; max-width: 240px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); transition: 0.5s; }
        .case-card:hover img { transform: scale(1.05); }

        /* CASE ROULETTE STYLES */
        #case-modal { 
            display: none; position: fixed; inset: 0; 
            background: radial-gradient(circle at center, rgba(8,4,15,0.96) 0%, rgba(0,0,0,1) 100%);
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(25px);
        }
        .view-window { 
            position: relative; width: 100%; height: 280px; 
            background: rgba(0,0,0,0.7); margin: 40px 0; overflow: hidden; border-radius: 30px; 
            border: 1px solid rgba(255,157,0,0.15);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), 0 0 60px rgba(255, 157, 0, 0.08);
        }
        .view-window::before, .view-window::after {
            content: ''; position: absolute; top: 0; bottom: 0; width: 200px; z-index: 50; pointer-events: none;
        }
        .view-window::before { left: 0; background: linear-gradient(90deg, #000 0%, transparent 100%); }
        .view-window::after { right: 0; background: linear-gradient(-90deg, #000 0%, transparent 100%); }

        .strip { display: flex; position: absolute; left: 0; height: 100%; align-items: center; transition: transform 9s cubic-bezier(0.05, 0.7, 0.1, 1.0); will-change: transform; }
        
        .pointer { 
            position: absolute; left: 50%; top: -10px; bottom: -10px; width: 4px; 
            background: linear-gradient(180deg, transparent, var(--main), transparent); 
            z-index: 100; box-shadow: 0 0 30px var(--main); transform: translateX(-50%); border-radius: 5px;
        }
        .pointer::before {
            content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid var(--main);
            filter: drop-shadow(0 0 10px var(--main));
        }
        .pointer::after {
            content: ''; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 20px solid var(--main);
            filter: drop-shadow(0 0 10px var(--main));
        }

        .case-strip-item {
            min-width: 220px; height: 220px; margin: 0 10px;
            background: linear-gradient(180deg, rgba(18,12,28,0.7), rgba(4,2,8,0.9));
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s var(--ease-hyper); position: relative;
        }
        .case-strip-item img { max-width: 160px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8)); transition: 0.3s; }
        .case-item-name { font-family: 'Orbitron'; font-size: 13px; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }

        #win-status { font-family: 'Orbitron'; letter-spacing: 15px; margin-bottom: 30px; font-size: 35px; color: #fff; text-shadow: 0 0 20px rgba(255,157,0,0.5); transition: all 0.5s; }
        .exit-btn { margin-top: 30px; color: #555; cursor: pointer; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 5px; transition: 0.3s; }
        .exit-btn:hover { color: var(--main); text-shadow: 0 0 15px var(--main); }

        /* UPGRADE ELEMENTS */
        .upgrade-container { display: flex; justify-content: space-around; align-items: center; gap: 40px; padding: 40px; }
        .upgrade-slot { 
            width: 300px; height: 350px; background: rgba(5,3,12,0.6); 
            border: 2px dashed rgba(255,157,0,0.3); border-radius: 40px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.5s var(--ease-hyper); cursor: pointer; backdrop-filter: blur(10px);
        }
        .upgrade-slot.active { border-style: solid; border-color: var(--main); box-shadow: 0 0 40px rgba(255,157,0,0.15); background: rgba(255,157,0,0.05); }
        
        .upgrader-roulette { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(0,0,0,0.85); border: 2px solid rgba(255,157,0,0.2); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
        .upgrader-track { position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(var(--main) 0deg, transparent 0deg); transition: background 0.8s ease; }
        .upgrader-inner { position: absolute; inset: 15px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 2; border: 2px solid #111; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        .water-wave { position: absolute; width: 400px; height: 400px; background: rgba(255, 157, 0, 0.35); border-radius: 38%; top: 100%; left: 50%; margin-left: -200px; animation: spinWave 6s linear infinite; transition: top 1s var(--ease-hyper); z-index: 1; }
        .water-wave::before { content: ''; position: absolute; width: 400px; height: 400px; background: rgba(255, 69, 0, 0.2); border-radius: 42%; top: -15px; left: 0; animation: spinWave 8s linear infinite reverse; }
        @keyframes spinWave { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .upgrader-arrow-container { position: absolute; inset: -15px; z-index: 5; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); will-change: transform; }
        .upgrader-arrow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #fff; filter: drop-shadow(0 0 10px #fff); }
        .chance-text { position: relative; z-index: 4; font-family: 'Orbitron'; font-size: 45px; color: #fff; text-shadow: 0 0 15px rgba(0,0,0,0.8); font-weight: 900; }

        /* INVENTORY & PRODUCTS */
        .product-item { 
            background: rgba(5,3,12,0.6); padding: 50px; border-radius: 40px; 
            border: 1px solid rgba(255,157,0,0.1); cursor: pointer; transition: 0.5s var(--ease-hyper); 
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .product-item::before {
            content: ''; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,157,0,0.05) 0%, transparent 60%);
            opacity: 0; transition: 1s var(--ease-hyper); pointer-events: none;
        }
        .product-item:hover { border-color: var(--main); box-shadow: 0 20px 40px rgba(255,157,0,0.1); transform: translateY(-10px); }
        .product-item:hover::before { opacity: 1; }

        /* PRODUCT MODAL */
        #product-modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.85); 
            z-index: 3000; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(15px); 
        }
        #product-modal-content { 
            background: #0d0914; border: 1px solid var(--main); padding: 60px; 
            border-radius: 40px; max-width: 500px; width: 90%; text-align: center; 
            box-shadow: 0 0 80px rgba(255,157,0,0.15); animation: modalScale 0.5s var(--ease-hyper); 
            position: relative; overflow: hidden;
        }
        #product-modal-content::before {
            content: ''; position: absolute; bottom: -100px; left: -50px; width: 200%; height: 200px;
            background: rgba(255,157,0,0.03); border-radius: 50%;
            animation: spinWave 15s linear infinite; pointer-events: none;
        }
        .install-btn { 
            display: inline-block; background: var(--main); color: #000; padding: 20px 60px; 
            border-radius: 30px; font-family: 'Orbitron'; font-weight: 900; text-decoration: none; 
            margin-top: 40px; transition: 0.5s; letter-spacing: 3px; position: relative; z-index: 2;
        }
        .install-btn:hover { box-shadow: 0 0 40px var(--main); transform: scale(1.05); }

        .inv-item { 
            background: rgba(5,3,12,0.6); padding: 30px; border-radius: 35px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.04); transition: 0.8s var(--ease-hyper); 
            animation: slideUp 1s var(--ease-hyper) backwards; backdrop-filter: blur(5px);
        }
        .inv-item:hover { transform: translateY(-10px); background: rgba(18,12,25,0.8); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalScale { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<!-- ОБНОВЛЕНИЙ ФОН З СУПЕР СТИЛЬНИМ СТАВКОМ ТА КУРОЧКОЮ -->
<div class="pond-bg-container">
    <div class="pond-sun"></div>
    <div class="pond-water-layer">
        <div class="pond-wave"></div>
        <div class="pond-wave"></div>
    </div>
    
    <!-- Векторна графіка пляжу, милої курочки та її вудки -->
    <svg class="beach-vector-scene" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <!-- Берег / Піщаний пляж ставка в тіні заходу -->
        <path d="M 1050 900 Q 1180 730 1440 680 L 1440 900 Z" fill="#090514" />
        <path d="M 1050 900 Q 1180 730 1440 680" stroke="var(--main)" stroke-width="2" fill="none" style="opacity: 0.3; filter: blur(3px);" />
        
        <!-- ДУЖЕ МИЛА КУРОЧКА, ЯКА РИБАЛИТЬ -->
        <g transform="translate(1240, 580) scale(0.9)">
            <!-- Тіло курочки -->
            <ellipse cx="60" cy="65" rx="36" ry="30" fill="#ffffff" filter="drop-shadow(0 0 12px rgba(255,255,255,0.25))"/>
            <!-- Голова -->
            <circle cx="82" cy="42" r="21" fill="#ffffff" />
            <!-- Милий червоний гребінець -->
            <path d="M 72 24 Q 76 10 82 20 Q 89 10 93 23" fill="#ff3855" />
            <!-- Дзьобик -->
            <polygon points="101,40 114,45 101,50" fill="#ffa200" />
            <!-- Очко крапочка -->
            <circle cx="87" cy="38" r="2.5" fill="#111111" />
            <!-- Крильце -->
            <path d="M 45 64 Q 60 54 72 69 Q 56 79 45 64" fill="#f4f4f4" />
            <!-- Хвостик -->
            <path d="M 24 60 Q 8 48 18 70" fill="#ffffff" />
            
            <!-- ВУДКА -->
            <!-- Вудилище -->
            <line x1="75" y1="55" x2="175" y2="-15" stroke="#d48800" stroke-width="3.5" stroke-linecap="round" />
            <!-- Леска, що йде глибоко в ставок -->
            <line x1="175" y1="-15" x2="175" y2="210" stroke="rgba(255,255,255,0.5)" stroke-width="1" />
            <!-- Поплавок, який гойдається на воді -->
            <circle cx="175" cy="210" r="5" fill="#ff3855" filter="drop-shadow(0 0 5px #ff3855)" />
            <circle cx="175" cy="214" r="2.5" fill="#ffffff" />
        </g>
    </svg>
</div>

<div id="welcome-screen">
    <div class="welcome-logo">BABYSELL</div>
    <button class="btn-nav" style="margin-top:50px; padding:20px 60px;" onclick="initApp()">go to site</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3"></audio>
<audio id="case-open-sound"><source src="https://files.catbox.moe/7f3jzq.mp3"></audio>
<audio id="snd-tick"><source src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

<div class="app-content">
    <header class="header">
        <div style="display:flex; gap:20px;">
            <button class="btn-nav" onclick="showPage('market')">MARKET</button>
            <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
            <button class="btn-nav" onclick="showPage('upgrade')">UPGRADE</button>
            <button class="btn-nav" style="border-color:var(--main); color:#fff;" onclick="showPage('products')">BEYSELL PRODUCTS</button>
        </div>
        <div style="font-family:Orbitron; letter-spacing:10px; font-weight:900; cursor:pointer;" onclick="showPage('market')">BABYSELL</div>
        <div style="display:flex; align-items:center; gap:30px;">
            <div id="u-bal" style="color:var(--main); font-family:Orbitron; font-size:22px; font-weight:900; text-shadow: 0 0 10px rgba(255,157,0,0.5);">0 B</div>
            <button id="l-btn" class="btn-nav" onclick="login()">LOGIN</button>
            <div id="l-prof" style="display:none;"><img id="l-ava" src="" style="width:45px; border-radius:50%; border:2px solid var(--main); box-shadow: 0 0 15px var(--main);"></div>
        </div>
    </header>

    <div id="page-market" style="padding:100px 40px;">
        <center>
            <div class="case-card" style="max-width:400px;" onclick="openCaseModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <h2 style="font-family:Orbitron; margin-top:30px; letter-spacing:5px;">SUPREME CASE</h2>
                <div style="color:var(--main); font-size:30px; font-weight:900; margin-top:15px; text-shadow: 0 0 10px rgba(255,157,0,0.3);">1,000 B</div>
            </div>
        </center>
    </div>

    <div id="page-inventory" style="display:none; padding:80px;">
        <h1 style="font-family:Orbitron; margin-bottom:50px; letter-spacing:5px; color:var(--main); text-shadow: 0 0 20px rgba(255,157,0,0.4);">COLLECTION</h1>
        <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:30px;"></div>
    </div>

    <div id="page-upgrade" style="display:none; padding:80px;">
        <h1 style="font-family:Orbitron; margin-bottom:40px; text-align:center; letter-spacing:5px; color:var(--main); text-shadow: 0 0 20px rgba(255,157,0,0.4);">UPGRADER</h1>
        <div class="upgrade-container">
            <div id="slot-input" class="upgrade-slot" onclick="showPage('inventory')">
                <p style="color:#555; font-family:Orbitron; font-size:12px; letter-spacing:2px;">SELECT SKIN</p>
            </div>
            
            <div style="text-align:center; position:relative;">
                <div class="upgrader-roulette" id="upg-roulette">
                    <div class="upgrader-track" id="upg-track"></div>
                    <div class="upgrader-arrow-container" id="upg-arrow">
                        <div class="upgrader-arrow"></div>
                    </div>
                    <div class="upgrader-inner">
                        <div class="water-wave" id="water-fill"></div>
                        <div id="chance-display" class="chance-text">0%</div>
                    </div>
                </div>
                <button id="upg-btn" class="btn-nav" style="margin-top:50px; width:220px; font-size: 14px; padding: 15px;" onclick="attemptUpgrade()" disabled>INITIATE UPGRADE</button>
            </div>

            <div id="slot-output" class="upgrade-slot">
                <select id="target-select" onchange="updateUpgradeChance()" style="background: rgba(0,0,0,0.85); color:#fff; border:1px solid rgba(255,157,0,0.3); padding:12px; font-family:Orbitron; outline: none; cursor: pointer; border-radius: 10px;">
                    <option value="">TARGET SKIN</option>
                </select>
                <div id="target-img-preview" style="margin-top: 30px;"></div>
            </div>
        </div>
    </div>

    <div id="page-products" style="display:none; padding:100px 80px;">
        <h1 style="font-family:Orbitron; margin-bottom:50px; letter-spacing:10px; text-align:center; color:var(--main); text-shadow: 0 0 20px rgba(255,157,0,0.4);">BEYSELL</h1>
        <div style="display:flex; justify-content:center;">
            <div class="product-item" onclick="openProductInfo()">
                <h2 style="font-family:Orbitron; color:var(--main); font-size:24px; letter-spacing:3px;">BEYSELL-LAUNCHER</h2>
                <p style="margin-top:15px; color:#777; letter-spacing:1px;">Gaming Platform v1.0</p>
            </div>
        </div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div id="product-modal-content">
        <h1 style="font-family:Orbitron; color:var(--main); letter-spacing:5px; position:relative; z-index:2;">BEYSELL-LAUNCHER</h1>
        <p style="color:#888; margin-top:10px; letter-spacing:2px; position:relative; z-index:2;">OFFICIAL GAMING CLIENT</p>
        <a href="https://www.dropbox.com/scl/fi/33u95qm2g9tj0ltaohz5m/BEYSELL_Setup.exe?rlkey=ygvjgyx6vtroxxt5adlc81c1o&st=77dypihf&dl=1" class="install-btn">INSTALL</a>
        <p class="exit-btn" style="position:relative; z-index:2; margin-top:40px;" onclick="closeProductModal()">CLOSE</p>
    </div>
</div>

<div id="case-modal" class="modal">
    <div style="width:95%; max-width:1200px; text-align:center;">
        <h1 id="win-status">FATE DECIDING...</h1>
        <div class="view-window">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:300px; height:70px; font-size: 14px; letter-spacing: 5px; margin-top: 20px;" onclick="startSpin()">OPEN FOR 1,000 B</button>
        <div class="exit-btn" onclick="closeModals()">[ EXIT MODULE ]</div>
    </div>
</div>

<script>
    const music = document.getElementById('bg-music'), caseSound = document.getElementById('case-open-sound'), tick = document.getElementById('snd-tick');
    tick.volume = 0.03;

    function initApp() {
        music.volume = 0.2; music.play();
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.visibility = 'hidden';
            document.body.classList.add('app-loaded');
        }, 1500);
    }

    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { name: "Glock Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff" },
        { name: "Deagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, chance: 20, color: "#8847ff" },
        { name: "AK Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, chance: 8, color: "#d32ee6" },
        { name: "Butterfly", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, chance: 2, color: "#ebca42" }
    ];

    let user = null, balance = 0, userInv = {}, selectedUpgradeId = null;
    let currentSpinAngle = 0; 

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'block';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => { balance = s.val() || 0; document.getElementById('u-bal').innerText = balance.toLocaleString() + " B"; });
            db.ref('users/'+u.uid+'/inventory').on('value', s => { userInv = s.val() || {}; renderInventory(); populateTargetSkins(); });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function showPage(p) {
        ['page-market', 'page-inventory', 'page-products', 'page-upgrade'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('page-' + p).style.display = 'block';
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).reverse().forEach(id => {
            const i = userInv[id];
            g.innerHTML += `<div class="inv-item" style="border-bottom:4px solid ${i.color}">
                <img src="${i.img}" width="130"><br><br><b style="font-family:Orbitron">${i.name}</b><br><br>
                <button class="btn-nav" style="width:100%; border-color:var(--main); margin-bottom:10px;" onclick="selectForUpgrade('${id}')">UPGRADE</button>
                <button class="btn-nav" style="width:100%;" onclick="sell('${id}',${i.price})">SELL ${i.price}B</button>
            </div>`;
        });
    }

    function selectForUpgrade(id) {
        selectedUpgradeId = id; const skin = userInv[id];
        const slot = document.getElementById('slot-input');
        slot.innerHTML = `<img src="${skin.img}" width="150" style="filter: drop-shadow(0 10px 20px ${skin.color})"><p style="margin-top:15px; font-family:Orbitron; font-weight:bold;">${skin.name}</p><p style="color:var(--main);">${skin.price} B</p>`;
        slot.classList.add('active'); 
        showPage('upgrade'); updateUpgradeChance();
    }

    function populateTargetSkins() {
        const sel = document.getElementById('target-select'); 
        const currentVal = sel.value; 
        sel.innerHTML = '<option value="">TARGET SKIN</option>';
        SKINS.forEach((s, i) => sel.innerHTML += `<option value="${i}">${s.name} (${s.price}B)</option>`);
        if(currentVal) sel.value = currentVal;
    }

    function updateUpgradeChance() {
        if(!selectedUpgradeId) return;
        const targetIdx = document.getElementById('target-select').value;
        const btn = document.getElementById('upg-btn');
        const track = document.getElementById('upg-track');
        const water = document.getElementById('water-fill');
        const chanceDisplay = document.getElementById('chance-display');
        const preview = document.getElementById('target-img-preview');

        if(targetIdx === "") { 
            chanceDisplay.innerText = "0%"; btn.disabled = true; 
            track.style.background = `conic-gradient(var(--main) 0deg, transparent 0deg)`;
            water.style.top = `100%`; preview.innerHTML = ""; return; 
        }

        const chance = Math.min(95, Math.floor((userInv[selectedUpgradeId].price / SKINS[targetIdx].price) * 100));
        chanceDisplay.innerText = chance + "%"; btn.disabled = false;
        preview.innerHTML = `<img src="${SKINS[targetIdx].img}" width="150" style="filter: drop-shadow(0 10px 20px ${SKINS[targetIdx].color})">`;

        const angle = (chance / 100) * 360;
        track.style.background = `conic-gradient(var(--main) ${angle}deg, transparent ${angle}deg)`;
        water.style.top = `${100 - chance}%`;
    }

    function attemptUpgrade() {
        const targetIdx = document.getElementById('target-select').value;
        const chance = parseInt(document.getElementById('chance-display').innerText);
        const btn = document.getElementById('upg-btn');
        const arrowCont = document.getElementById('upg-arrow');

        btn.disabled = true; document.getElementById('target-select').disabled = true;
        const resultAngle = Math.random() * 360;
        const winAngleLimit = (chance / 100) * 360;
        const isWin = resultAngle <= winAngleLimit;

        const spins = 5 * 360;
        currentSpinAngle += spins + (resultAngle - (currentSpinAngle % 360));
        arrowCont.style.transform = `rotate(${currentSpinAngle}deg)`;

        setTimeout(() => {
            if(isWin) {
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove();
                db.ref('users/'+user.uid+'/inventory').push(SKINS[targetIdx]);
                alert("SUCCESS! +1 " + SKINS[targetIdx].name);
            } else {
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove();
                alert("FAILED! SKIN DESTROYED");
            }
            selectedUpgradeId = null; 
            document.getElementById('slot-input').innerHTML = "<p style='color:#555; font-family:Orbitron; font-size:12px; letter-spacing:2px;'>SELECT SKIN</p>";
            document.getElementById('slot-input').classList.remove('active');
            document.getElementById('target-select').disabled = false;
            updateUpgradeChance(); showPage('inventory'); 
        }, 4100); 
    }

    function getSkinByChance() {
        let rand = Math.random() * 100;
        let sum = 0;
        for (let i = 0; i < SKINS.length; i++) {
            sum += SKINS[i].chance;
            if (rand <= sum) return SKINS[i];
        }
        return SKINS[0];
    }

    function startSpin() {
        if(balance < 1000) return alert("LOW BALANCE");
        const btn = document.getElementById('spin-btn'); btn.disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        const statusText = document.getElementById('win-status');
        statusText.innerText = 'FATE DECIDING...';
        statusText.style.color = '#fff';
        statusText.style.textShadow = '0 0 20px rgba(255,157,0,0.5)';

        const win = getSkinByChance();
        const strip = document.getElementById('strip');
        strip.innerHTML = ""; 

        const cardWidth = 240;
        const targetIndex = 100;

        for(let i=0; i<120; i++) {
            let randomSkin = getSkinByChance(); 
            if (i === targetIndex) randomSkin = win; 
            
            strip.innerHTML += `
            <div class="case-strip-item" id="item-${i}" style="border-bottom: 4px solid ${randomSkin.color};">
                <img src="${randomSkin.img}">
                <div class="case-item-name" style="color: ${randomSkin.color}">${randomSkin.name}</div>
            </div>`;
        }
        
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        
        const randomOffset = Math.floor(Math.random() * (cardWidth - 40)) - ((cardWidth - 40) / 2); 
        const viewWindowWidth = document.querySelector('.view-window').offsetWidth;
        const centerOffset = viewWindowWidth / 2;
        
        const stopPos = (targetIndex * cardWidth) - centerOffset + (cardWidth / 2) + randomOffset;

        setTimeout(() => {
            strip.style.transition = 'transform 9s cubic-bezier(0.05, 0.7, 0.1, 1.0)';
            strip.style.transform = `translateX(-${stopPos}px)`;
        }, 50);

        setTimeout(() => { 
            db.ref('users/'+user.uid+'/inventory').push(win); 
            btn.disabled = false; 
            
            for(let i=0; i<120; i++) {
                if(i !== targetIndex) {
                    document.getElementById(`item-${i}`).style.opacity = '0.1';
                    document.getElementById(`item-${i}`).style.filter = 'grayscale(100%)';
                }
            }
            
            const winCard = document.getElementById(`item-${targetIndex}`);
            winCard.style.transform = 'scale(1.15)';
            winCard.style.boxShadow = `0 0 50px ${win.color}`;
            winCard.style.zIndex = '100';

            statusText.innerText = `YOU GOT: ${win.name.toUpperCase()}!`;
            statusText.style.color = win.color;
            statusText.style.textShadow = `0 0 30px ${win.color}`;
        }, 9000);
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function openCaseModal() { if(!user) return login(); document.getElementById('case-modal').style.display='flex'; }
    function closeModals() { document.getElementById('case-modal').style.display='none'; }
    function openProductInfo() { document.getElementById('product-modal').style.display = 'flex'; }
    function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }
</script>
</body>
</html>
