<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - LEGENDARY EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');
        
        :root { 
            --main: #00ffaa; 
            --bg: #050508; 
            --card: rgba(255, 255, 255, 0.03); 
            --error: #ff4444; 
            --panel: rgba(0, 0, 0, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            background-image: radial-gradient(circle at 50% -20%, #1a3a2f 0%, var(--bg) 80%);
            min-height: 100vh; overflow-x: hidden;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; background: var(--panel);
            border-bottom: 2px solid var(--main); box-shadow: 0 5px 20px rgba(0,255,170,0.2);
            position: sticky; top: 0; z-index: 1000; height: 80px;
        }

        .user-block { display: flex; align-items: center; gap: 15px; }
        .avatar-wrapper {
            width: 50px; height: 50px; border: 2px solid var(--main); 
            border-radius: 10px; padding: 2px; background: #000;
        }
        #u-pic { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; gap: 2px; }
        #u-name { font-family: 'Orbitron'; font-size: 13px; color: #fff; }
        #logout-btn { color: var(--error); font-size: 10px; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; display: none; }

        .promo-panel {
            display: flex; background: #111; border: 1px solid #333;
            border-radius: 8px; overflow: hidden; height: 38px;
        }
        .promo-panel input {
            background: none; border: none; color: #fff; padding: 0 12px;
            font-family: 'Orbitron'; font-size: 11px; outline: none; width: 130px;
        }
        .promo-btn {
            background: var(--main); color: #000; border: none; padding: 0 15px;
            font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer;
        }

        .balance-box {
            border: 1px solid var(--main); padding: 5px 15px; border-radius: 8px;
            font-family: 'Orbitron'; text-align: center; background: #000; min-width: 100px;
        }
        #balance { color: #fff; font-size: 16px; }

        /* MAIN CONTENT */
        .container { max-width: 1200px; margin: 40px auto; text-align: center; padding: 0 20px; }
        .cases-row { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-bottom: 50px; }

        .case-card { 
            width: 280px; padding: 25px; background: var(--card); 
            border: 1px solid #222; border-radius: 20px; cursor: pointer; 
            transition: 0.3s ease; position: relative;
        }
        .case-card:hover:not(.locked) { border-color: var(--main); transform: translateY(-8px); }

        .case-card.locked { cursor: not-allowed; filter: grayscale(0.8); opacity: 0.6; }
        .lock-label {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg);
            background: var(--error); color: #fff; padding: 10px 30px;
            font-family: 'Orbitron'; font-size: 20px; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5); border: 2px solid #fff;
            z-index: 10; pointer-events: none;
        }

        /* ROULETTE */
        .roulette-container { position: relative; width: 100%; max-width: 800px; height: 160px; margin: 30px auto; background: #0a0a0c; border: 2px solid #222; overflow: hidden; border-radius: 15px; display: none; }
        .track { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        .track div { min-width: 140px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #111; }
        .track div img { width: 100px; }

        /* GRID FOR TOP & INV */
        .grid-layout { display: flex; gap: 30px; margin-top: 40px; text-align: left; flex-wrap: wrap; }
        .section-box { background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid #111; padding: 25px; flex: 1; min-width: 300px; }
        .section-title { font-family: 'Orbitron'; font-size: 14px; color: var(--main); margin-bottom: 20px; display: block; border-bottom: 1px solid #222; padding-bottom: 10px; text-transform: uppercase; }

        /* LEADERBOARD */
        .top-table { width: 100%; border-collapse: collapse; font-family: 'Orbitron'; font-size: 12px; }
        .top-table tr { border-bottom: 1px solid #111; }
        .top-table td { padding: 12px 5px; }
        .rank { color: var(--main); font-weight: bold; width: 40px; }
        .t-name { color: #fff; }
        .t-bal { text-align: right; color: var(--main); }

        /* NOTIFICATIONS */
        #notify-box { position: fixed; top: 90px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .notify { background: rgba(0,0,0,0.95); border: 1px solid var(--main); padding: 12px 20px; border-radius: 5px; font-family: 'Orbitron'; color: var(--main); font-size: 11px; animation: slideIn 0.3s ease; }
        .notify.error { border-color: var(--error); color: var(--error); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .btn { background: var(--main); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<div id="notify-box"></div>
<audio id="bg-music" loop src="https://files.catbox.moe/sv6xxw.mp3"></audio>
<audio id="sound-success" src="https://files.catbox.moe/mr870z.mp3"></audio>
<audio id="sound-fail" src="https://files.catbox.moe/ztzyet.mp3"></audio>

<header class="header">
    <div class="user-block">
        <div class="avatar-wrapper">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        </div>
        <div class="user-info">
            <span id="u-name">GUEST_PLAYER</span>
            <span id="logout-btn" onclick="googleLogout()">Logout</span>
        </div>
    </div>

    <div style="display: flex; gap: 15px; align-items: center;">
        <div class="promo-panel">
            <input type="text" id="promo-in" placeholder="PROMO CODE">
            <button class="promo-btn" onclick="applyPromo()">OK</button>
        </div>
        <div class="balance-box">
            <span id="balance">0</span> <span style="color:var(--main); font-size: 10px;">B</span>
        </div>
        <button id="login" class="btn" onclick="googleLogin()">LOGIN</button>
    </div>
</header>

<div class="container">
    <div id="case-selection" class="cases-row">
        <div class="case-card" onclick="selectCase('УЛИЧНЫЕ КОШМАРЫ')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width: 100%;">
            <h3 style="font-family:'Orbitron'; margin-top:15px; font-size: 16px;">УЛИЧНЫЕ КОШМАРЫ</h3>
            <p style="color:var(--main); font-family:'Orbitron';">500 B</p>
        </div>

        <div class="case-card locked">
            <div class="lock-label">LOCKED</div>
            <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png" style="width: 100%;">
            <h3 style="font-family:'Orbitron'; margin-top:15px; font-size: 16px;">НАВЕРНОЕ ПОВЕЗЕТ</h3>
            <p id="timer" style="color:var(--error); font-family:'Orbitron';">LOCKED</p>
        </div>
    </div>

    <div id="roulette-screen" style="display:none; flex-direction:column; align-items:center;">
        <h2 id="case-title" style="font-family:'Orbitron'; margin-bottom:20px;"></h2>
        <div class="roulette-container" id="roulette" style="display:block;">
            <div class="track" id="track"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="spin()" style="padding: 15px 40px; font-size: 14px;">ОТКРЫТЬ КЕЙС</button>
        <p onclick="location.reload()" style="margin-top:20px; cursor:pointer; color:#555; font-size: 12px; font-family:'Orbitron';">← НАЗАД</p>
    </div>

    <div class="grid-layout">
        <div class="section-box">
            <span class="section-title">🏆 TOP BALANCE</span>
            <table class="top-table" id="leaderboard"></table>
        </div>

        <div class="section-box">
            <span class="section-title">🎒 INVENTORY</span>
            <div id="inv-grid" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE CONFIG ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let balance = 0;

    const LOOT = [
        { n: "GLOCK-18", p: 100, img: "https://i.postimg.cc/Hk5Jznr2/Glock.png", w: 60 },
        { n: "USP-S", p: 666, img: "https://i.postimg.cc/HL5phv0W/aaaaa.png", w: 30 },
        { n: "AK-47", p: 9999, img: "https://i.postimg.cc/3NW96mG1/AK.png", w: 8 },
        { n: "BUTTERFLY", p: 50000, img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", w: 2 }
    ];

    // --- AUTH LOGIC ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('u-pic').src = user.photoURL;
            document.getElementById('u-name').innerText = user.displayName.split(' ')[0].toUpperCase();
            
            db.ref('users/' + user.uid).update({ name: user.displayName.split(' ')[0] });
            db.ref('users/' + user.uid + '/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('balance').innerText = balance.toLocaleString();
            });
            updateInventoryUI();
            updateLeaderboard();
            document.body.onclick = () => { document.getElementById('bg-music').volume = 0.1; document.getElementById('bg-music').play().catch(()=>{}); };
        } else {
            document.getElementById('login').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('u-pic').src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('u-name').innerText = "GUEST_PLAYER";
            document.getElementById('balance').innerText = "0";
            document.getElementById('inv-grid').innerHTML = "";
        }
    });

    function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function googleLogout() { auth.signOut().then(() => location.reload()); }

    function showNotify(text, isError = false) {
        const box = document.getElementById('notify-box');
        const n = document.createElement('div');
        n.className = 'notify' + (isError ? ' error' : '');
        n.innerText = text;
        box.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    // --- PROMO LOGIC ---
    function applyPromo() {
        if(!auth.currentUser) return showNotify("LOGIN REQUIRED", true);
        const code = document.getElementById('promo-in').value.trim().toUpperCase();
        const sndS = document.getElementById('sound-success');
        const sndF = document.getElementById('sound-fail');

        if(code === "START2026") {
            db.ref(`users/${auth.currentUser.uid}/promos/START2026`).once('value', s => {
                if(s.exists()) { sndF.play(); showNotify("ALREADY USED", true); }
                else { 
                    db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => (c || 0) + 100);
                    db.ref(`users/${auth.currentUser.uid}/promos/START2026`).set(true);
                    sndS.play(); showNotify("PROMO OK! +100 B"); 
                }
            });
        } 
        else if(code === "ADMIN2027") {
            sndS.play();
            db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => (c || 0) + 50000);
            showNotify("ADMIN ACTIVE: +50,000 B");
        }
        else { sndF.play(); showNotify("WRONG CODE", true); }
        document.getElementById('promo-in').value = '';
    }

    // --- GAME LOGIC ---
    function selectCase(name) {
        document.getElementById('case-selection').style.display = 'none';
        document.getElementById('roulette-screen').style.display = 'flex';
        document.getElementById('case-title').innerText = name;
    }

    function spin() {
        if (balance < 500) return showNotify("NO MONEY", true);
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c - 500);

        const track = document.getElementById('track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        track.innerHTML = '';

        const r = Math.random() * 100;
        let winItem = LOOT[0];
        if(r > 98) winItem = LOOT[3];
        else if(r > 90) winItem = LOOT[2];
        else if(r > 60) winItem = LOOT[1];

        for(let i=0; i<60; i++) {
            const item = (i === 50) ? winItem : LOOT[Math.floor(Math.random()*LOOT.length)];
            const d = document.createElement('div');
            d.innerHTML = `<img src="${item.img}">`;
            track.appendChild(d);
        }

        setTimeout(() => {
            track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
            const x = (50 * 140) - (document.getElementById('roulette').offsetWidth / 2) + 70;
            track.style.transform = `translateX(-${x}px)`;
        }, 50);

        setTimeout(() => {
            db.ref(`users/${auth.currentUser.uid}/inventory`).push(winItem);
            showNotify("WIN: " + winItem.n);
            btn.disabled = false;
        }, 7200);
    }

    function updateInventoryUI() {
        db.ref(`users/${auth.currentUser.uid}/inventory`).on('value', s => {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            s.forEach(child => {
                const item = child.val();
                grid.innerHTML += `<div style="background:#111; padding:10px; border-radius:10px; border:1px solid #222; text-align:center; width:100px;">
                    <img src="${item.img}" width="60"><br><small style="font-size:8px; display:block; margin:5px 0;">${item.n}</small>
                    <button onclick="sellItem('${child.key}', ${item.p})" style="background:var(--main); border:none; padding:3px 8px; border-radius:3px; font-weight:bold; cursor:pointer; font-size:8px;">SELL ${item.p}</button>
                </div>`;
            });
        });
    }

    function sellItem(key, price) {
        db.ref(`users/${auth.currentUser.uid}/inventory/${key}`).remove();
        db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c + price);
        showNotify("SOLD!");
    }

    function updateLeaderboard() {
        db.ref('users').orderByChild('balance').limitToLast(5).on('value', s => {
            const list = [];
            s.forEach(u => { list.push(u.val()); });
            list.reverse();
            const table = document.getElementById('leaderboard');
            table.innerHTML = '';
            list.forEach((u, i) => {
                table.innerHTML += `<tr>
                    <td class="rank">#${i+1}</td>
                    <td class="t-name">${u.name || 'USER'}</td>
                    <td class="t-bal">${(u.balance || 0).toLocaleString()} B</td>
                </tr>`;
            });
        });
    }

    // Timer for Locked Case
    const unlockDate = Date.now() + (13*3600 + 19*60)*1000;
    setInterval(() => {
        let diff = unlockDate - Date.now();
        if(diff < 0) { document.getElementById('timer').innerText = "AVAILABLE"; return; }
        let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('timer').innerText = `LOCKED ${h}:${m}:${s}`;
    }, 1000);
</script>
</body>
</html>
