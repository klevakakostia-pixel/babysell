<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - CLASSIC REBORN</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); 
            --error: #ff3366; --rare: #4b69ff; --mythical: #8847ff; --legendary: #eb4b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* --- UI ELEMENTS --- */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 80px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .balance-card { background: #000; border: 1px solid var(--main); padding: 8px 20px; border-radius: 8px; font-family: 'Orbitron'; box-shadow: 0 0 15px rgba(0,255,170,0.1); }
        .btn { background: var(--main); color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover:not(:disabled) { box-shadow: 0 0 15px var(--main); transform: translateY(-2px); }
        .btn:disabled { background: #222; color: #444; cursor: not-allowed; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 220px 1fr; gap: 30px; }
        .sidebar { display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); color: #777; padding: 15px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; text-align: left; transition: 0.3s; }
        .nav-btn.active { background: var(--main); color: #000; font-weight: bold; }

        .page { display: none; animation: fadeIn 0.3s forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CASES (MAIN MENU) --- */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .case-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .case-card:hover { border-color: var(--main); transform: scale(1.02); background: rgba(0,255,170,0.03); }
        .case-card img { width: 100%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        /* --- CAT MENU + UPGRADES --- */
        .cat-layout { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .cat-img { width: 220px; cursor: pointer; transition: 0.05s; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        .cat-img:active { transform: scale(0.9); }
        .energy-box { width: 300px; height: 15px; background: #111; border: 1px solid var(--main); border-radius: 10px; overflow: hidden; position: relative; }
        #energy-fill { width: 100%; height: 100%; background: var(--main); transition: 0.2s; }
        .upgrade-shelf { display: flex; gap: 15px; margin-top: 20px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .upgrade-item { text-align: center; padding: 10px; }

        /* --- ROULETTE --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .roulette-wrapper { position: relative; width: 100%; max-width: 700px; height: 150px; background: #080808; border: 2px solid #222; margin: 30px 0; overflow: hidden; border-radius: 10px; }
        .roulette-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 10; }
        .strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .item-box { min-width: 130px; height: 100%; border-right: 1px solid #111; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0c0c0e; }
        .item-box img { width: 70px; }

        #notif-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 3000; }
        .notif { background: #000; border: 1px solid var(--main); padding: 12px 20px; margin-top: 10px; font-family: 'Orbitron'; font-size: 11px; }
    </style>
</head>
<body>

<div id="notif-wrap"></div>

<header class="header">
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic" style="width:40px; border-radius:5px; border:1px solid var(--main);">
        <div style="line-height:1;">
            <span id="u-name" style="font-family:'Orbitron'; font-size:12px; display:block;">GUEST_USER</span>
            <button onclick="logout()" style="background:none; border:none; color:var(--error); cursor:pointer; font-size:9px;">[ LOGOUT ]</button>
        </div>
    </div>
    <div class="balance-card"><span id="balance">0</span> <span style="color:var(--main); font-size:10px;">B</span></div>
</header>

<div class="container">
    <aside class="sidebar">
        <button class="nav-btn active" onclick="nav('cases')">MARKET (CASES)</button>
        <button class="nav-btn" onclick="nav('cat')">NEURAL CAT</button>
        <button class="nav-btn" onclick="nav('promo')">DATA CODES</button>
        <button class="nav-btn" onclick="googleLogin()" id="login-btn">LOGIN SYSTEM</button>
    </aside>

    <main>
        <section id="p-cases" class="page active">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px; font-size:18px; color:var(--main);">OPERATIONAL CASES</h2>
            <div class="case-grid">
                <div class="case-card" onclick="openCaseModal()">
                    <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                    <h3 style="font-family:'Orbitron'; font-size:14px; margin-top:10px;">STREET NIGHTMARE</h3>
                    <p style="color:var(--main); font-size:14px;">500 B</p>
                </div>
            </div>
        </section>

        <section id="p-cat" class="page">
            <div class="cat-layout">
                <h2 style="font-family:'Orbitron'; color:var(--main);">CAT FARMER CORE</h2>
                <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" class="cat-img" onclick="mine(event)">
                
                <div class="energy-box"><div id="energy-fill"></div></div>
                <div style="font-family:'Orbitron'; font-size:12px;">ENERGY: <span id="e-val">100</span>%</div>

                <div class="upgrade-shelf">
                    <div class="upgrade-item">
                        <div style="font-family:'Orbitron'; font-size:11px; margin-bottom:5px;">ENERGY REGEN X2</div>
                        <button class="btn" id="buy-x2" onclick="buyBoost()" style="font-size:10px; padding:8px 15px;">5,000 B</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="p-promo" class="page">
            <h2 style="font-family:'Orbitron'; margin-bottom:15px;">ENTER VOUCHER</h2>
            <input type="text" id="promo-in" placeholder="CODE..." style="background:#000; border:1px solid #333; color:#fff; padding:12px; font-family:'Orbitron'; outline:none; border-radius:5px;">
            <button class="btn" onclick="redeem()">REDEEM</button>
        </section>
    </main>
</div>

<div id="case-modal" class="modal">
    <div style="width:100%; text-align:center;">
        <h2 style="font-family:'Orbitron';">STREET NIGHTMARE</h2>
        <div class="roulette-wrapper">
            <div class="roulette-line"></div>
            <div id="strip" class="strip"></div>
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn" id="spin-btn" onclick="startSpin()">OPEN CASE</button>
            <button class="btn" style="background:#222; color:#fff;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let balance = 0, energy = 100, hasX2 = false;

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('u-name').innerText = user.displayName.toUpperCase();
            document.getElementById('u-pic').src = user.photoURL;
            document.getElementById('login-btn').style.display = 'none';
            db.ref('users/'+user.uid).on('value', s => {
                const d = s.val() || {};
                balance = d.balance || 0;
                hasX2 = d.boosts?.energy_x2 || false;
                document.getElementById('balance').innerText = balance.toLocaleString();
                updateUpgrades();
            });
        }
    });

    function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- CAT LOGIC ---
    function mine(e) {
        if(!auth.currentUser) return notify("PLEASE LOGIN");
        if(energy < 1) return notify("OUT OF ENERGY", true);
        energy--;
        updateEnergyUI();
        notify("MEOW!");
    }

    function updateEnergyUI() {
        document.getElementById('energy-fill').style.width = energy + "%";
        document.getElementById('e-val').innerText = Math.floor(energy);
    }

    setInterval(() => {
        if(energy < 100) {
            energy = Math.min(100, energy + (hasX2 ? 1.0 : 0.5));
            updateEnergyUI();
        }
    }, 1000);

    function buyBoost() {
        if(balance < 5000) return notify("NOT ENOUGH BALANCE", true);
        db.ref('users/'+auth.currentUser.uid).update({ balance: balance - 5000, "boosts/energy_x2": true });
    }

    function updateUpgrades() {
        const b = document.getElementById('buy-x2');
        if(hasX2) { b.innerText = "OWNED"; b.disabled = true; }
    }

    // --- ROULETTE LOGIC ---
    function openCaseModal() {
        document.getElementById('case-modal').style.display = 'flex';
        const strip = document.getElementById('strip');
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<60; i++) {
            strip.innerHTML += `<div class="item-box"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>`;
        }
    }

    function closeModal() { document.getElementById('case-modal').style.display = 'none'; }

    function startSpin() {
        if(balance < 500) return notify("NOT ENOUGH B", true);
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        
        db.ref('users/'+auth.currentUser.uid+'/balance').set(balance - 500);

        const strip = document.getElementById('strip');
        const targetX = (50 * 131) - (700 / 2) + Math.random() * 100;
        strip.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${targetX}px)`;

        setTimeout(() => {
            notify("ITEM RECEIVED!");
            btn.disabled = false;
        }, 6500);
    }

    function redeem() {
        const c = document.getElementById('promo-in').value.toUpperCase();
        if(c === "WELCOME") {
            db.ref('users/'+auth.currentUser.uid+'/balance').set(balance + 1000);
            notify("PROMO CLAIMED!");
            document.getElementById('promo-in').value = "";
        }
    }

    function notify(m, err=false) {
        const w = document.getElementById('notif-wrap');
        const n = document.createElement('div');
        n.className = 'notif';
        if(err) n.style.borderColor = 'var(--error)';
        n.innerText = m;
        w.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
</script>
</body>
</html>
