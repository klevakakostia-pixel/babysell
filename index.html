<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - REAL SKINS EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #010101; --prime-gold: linear-gradient(90deg, #ffd700, #fff3a0, #ffd700); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        #lizard-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; height: 75px; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,255,170,0.1); position: sticky; top: 0; z-index: 1000; 
        }

        .btn-prime {
            background: var(--prime-gold); background-size: 200% auto;
            color: #000; border: none; padding: 8px 18px; border-radius: 6px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 10px;
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            animation: shine 3s linear infinite; margin-right: 12px;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 24px; letter-spacing: 8px; position: absolute; left: 50%; transform: translateX(-50%); text-shadow: 0 0 20px var(--main); }

        .cases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .case { 
            background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(10px); padding: 25px; border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.03); text-align: center; cursor: pointer; transition: 0.3s; position: relative;
        }
        .case:hover { transform: translateY(-5px); border-color: var(--main); }
        .case img { width: 100%; max-width: 130px; }
        .price { color: var(--main); font-family: 'Orbitron'; font-size: 18px; margin-top: 10px; font-weight: bold; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .roulette-box { width: 90%; max-width: 800px; background: #08080a; padding: 40px; border-radius: 30px; border: 1px solid #222; text-align: center; }
        .window { position: relative; width: 100%; height: 150px; background: #000; margin: 20px 0; overflow: hidden; border-radius: 10px; border: 1px solid #222; }
        .line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 15px var(--main); transform: translateX(-50%); }
        .strip { display: flex; position: absolute; left: 0; height: 100%; transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1); }
        .item { min-width: 150px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .item img { max-width: 110px; }

        .btn { background: #111; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; }
        .btn-main { background: var(--main); color: #000; font-weight: 900; border: none; }
    </style>
</head>
<body>

<canvas id="lizard-bg"></canvas>
<div id="notif" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>

<header class="header">
    <div style="display:flex; gap:10px;">
        <button class="btn" onclick="showPage('market')">MARKET</button>
        <button class="btn" onclick="showPage('inventory')">INVENTORY</button>
    </div>
    <div class="logo">BABYSELL</div>
    <div style="display:flex; align-items:center;">
        <button class="btn-prime" onclick="openPrime()">BUY PRIME</button>
        <div id="u-bal" style="font-family:'Orbitron'; font-size:18px; color:var(--main); margin-right:15px; font-weight:bold;">0 B</div>
        <button id="l-btn" onclick="login()" class="btn btn-main">LOGIN</button>
        <img id="l-ava" src="" style="display:none; width:35px; border-radius:50%; border:2px solid var(--main);">
    </div>
</header>

<div id="page-market">
    <div class="cases-grid">
        <div class="case" onclick="openCaseModal('hand_drawn')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <h3>HAND DRAWN NIGHTS</h3>
            <div class="price">1,000 B</div>
        </div>
        <div class="case" onclick="openCaseModal('real_skins')">
            <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png">
            <h3>TARGETED REALITY</h3>
            <div class="price">5,000 B</div>
        </div>
    </div>
</div>

<div id="page-inventory" style="display:none; padding:40px;">
    <h2 style="font-family:Orbitron; margin-bottom:20px;">YOUR COLLECTION</h2>
    <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:20px;"></div>
</div>

<div id="case-modal" class="modal">
    <div class="roulette-box">
        <h2 id="win-status" style="font-family:'Orbitron'; letter-spacing:5px;">OPENING...</h2>
        <div class="window">
            <div class="line"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn btn-main" style="width:100%; height:60px; font-size:18px;" onclick="startSpin()">SPIN FOR BALANCE</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-family:Orbitron;">CLOSE</button>
    </div>
</div>

<div id="prime-modal" class="modal">
    <div class="prime-box" style="background: #0a0a0c; border: 2px solid #ffd700; padding: 35px; border-radius: 25px; text-align: center;">
        <h2 style="font-family:Orbitron; color:#ffd700;">PRIME STATUS</h2>
        <p style="margin:15px 0; color:#ccc;">To buy Prime and get x2 Luck, contact:</p>
        <a href="https://t.me/crypto_number" target="_blank" style="display:block; background:#0088cc; color:#fff; text-decoration:none; padding:15px; border-radius:10px; font-weight:bold;">@crypto_number</a>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<audio id="snd-tick" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

<script>
    // FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    // SKINS DATA
    const SKINS = {
        hand_drawn: [
            { name: "Butterfly | Hand Drawn", img: "https://i.ibb.co/3ykMv6j/butterfly-drawn.png", color: "#eb4b4b", price: 5000 },
            { name: "Karambit | Hand Drawn", img: "https://i.ibb.co/L5Z5v5n/karambit-drawn.png", color: "#d32ee6", price: 3500 },
            { name: "M9 | Hand Drawn", img: "https://i.ibb.co/WfM6m7n/m9-drawn.png", color: "#4b69ff", price: 1200 }
        ],
        real_skins: [
            { name: "AWP | Desert Hydra", img: "https://i.ibb.co/0V0z5mD/awp-hydra.png", color: "#eb4b4b", price: 12000 },
            { name: "AK-47 | Gold Arabesque", img: "https://i.ibb.co/Xz9z5mD/ak-gold.png", color: "#ebca42", price: 15000 },
            { name: "M4A1-S | Printstream", img: "https://i.ibb.co/Yy9z5mD/m4-print.png", color: "#d32ee6", price: 8000 }
        ]
    };

    let user = null, balance = 0, currentList = [], currentCost = 0;

    // LIZARD ENGINE
    const canvas = document.getElementById('lizard-bg');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    const totalNodes = 30, segmentDist = 12;
    let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    for (let i = 0; i < totalNodes; i++) nodes.push({ x: mouse.x, y: mouse.y });

    function updateLizard() {
        nodes[0].x += (mouse.x - nodes[0].x) * 0.1;
        nodes[0].y += (mouse.y - nodes[0].y) * 0.1;
        for (let i = 1; i < totalNodes; i++) {
            let dx = nodes[i-1].x - nodes[i].x, dy = nodes[i-1].y - nodes[i].y;
            let dist = Math.sqrt(dx*dx + dy*dy), angle = Math.atan2(dy, dx);
            if (dist > segmentDist) {
                nodes[i].x = nodes[i-1].x - Math.cos(angle) * segmentDist;
                nodes[i].y = nodes[i-1].y - Math.sin(angle) * segmentDist;
            }
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < nodes.length; i++) {
            ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 10;
            ctx.fillStyle = `rgba(0, 255, 255, ${0.4 - (i/30)*0.3})`;
            ctx.beginPath(); ctx.arc(nodes[i].x, nodes[i].y, 2, 0, Math.PI*2); ctx.fill();
        }
        requestAnimationFrame(updateLizard);
    }
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    updateLizard();

    // AUTH & DATA
    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-ava').style.display = 'block';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => renderInv(s.val()));
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function openCaseModal(type) {
        if(!user) return login();
        currentList = SKINS[type];
        currentCost = (type === 'hand_drawn') ? 1000 : 5000;
        
        document.getElementById('case-modal').style.display = 'flex';
        document.getElementById('win-status').innerText = "READY?";
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<70; i++) {
            let s = currentList[Math.floor(Math.random()*currentList.length)];
            strip.innerHTML += `<div class="item"><img src="${s.img}"></div>`;
        }
    }

    function startSpin() {
        if(balance < currentCost) return toast("NOT ENOUGH BALANCE!");
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - currentCost);

        const win = currentList[Math.floor(Math.random()*currentList.length)];
        const strip = document.getElementById('strip');
        strip.children[65].innerHTML = `<img src="${win.img}" style="filter:drop-shadow(0 0 20px ${win.color})">`;
        
        const move = (65 * 150) - (document.querySelector('.window').offsetWidth / 2) + 75;
        strip.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.05, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        for(let i=0; i<45; i++) setTimeout(() => { if(document.getElementById('case-modal').style.display === 'flex') document.getElementById('snd-tick').cloneNode().play(); }, i*i*3.5);

        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            document.getElementById('win-status').innerText = win.name;
            document.getElementById('spin-btn').disabled = false;
        }, 8200);
    }

    function renderInv(data) {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        if(!data) return;
        Object.keys(data).forEach(id => {
            const i = data[id];
            g.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; text-align:center; border-bottom:3px solid ${i.color}">
                <img src="${i.img}" width="100"><br><b style="font-size:12px;">${i.name}</b><br>
                <button class="btn" style="width:100%; margin-top:10px; font-size:11px;" onclick="sell('${id}',${i.price})">SELL ${i.price} B</button>
            </div>`;
        });
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function showPage(p) {
        document.getElementById('page-market').style.display = (p==='market') ? 'block' : 'none';
        document.getElementById('page-inventory').style.display = (p==='inventory') ? 'block' : 'none';
    }
    function openPrime() { document.getElementById('prime-modal').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.style = "background:#000; border:1px solid var(--main); padding:10px 20px; margin-top:5px; font-family:Orbitron;";
        t.innerText = m; n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
