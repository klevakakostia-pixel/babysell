<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - Vercel Hobby Plan Ready</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #030305; --accent: #ff2d55; 
            --mil-spec: #4b69ff; --restricted: #8847ff; --classified: #d32ee6; 
            --covert: #eb4b4b; --contraband: #e4ae39; --rare: #ebca42;
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 170, 0.05) 0%, transparent 50%);
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 90px; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,170,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-weight: 900; font-size: 28px;
            letter-spacing: 8px; color: #fff; text-shadow: 0 0 15px var(--main);
            animation: pulseLogo 3s infinite;
        }
        @keyframes pulseLogo { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        .btn-nav { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 10px 18px; border-radius: 8px; font-family: 'Orbitron'; 
            font-size: 11px; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); }

        .lang-btn { background: none; border: 1px solid #333; color: #666; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: 'Orbitron'; }
        .lang-btn.active { border-color: var(--main); color: var(--main); }

        .page { display: none; padding: 40px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .cases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1000px; margin: 0 auto; }
        .case-card {
            background: #0a0a0c; padding: 40px; border-radius: 30px; text-align: center;
            cursor: pointer; border: 1px solid #222; transition: 0.4s;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,255,170,0.1); }
        .case-card img { width: 100%; max-width: 220px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .view-window { position: relative; width: 100%; height: 160px; background: #000; margin: 25px 0; overflow: hidden; border: 1px solid #333; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 20px var(--main); }
        .strip { display: flex; position: absolute; left: 0; height: 100%; transition: transform 8s cubic-bezier(0.1, 0, 0, 1); }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .inv-card { background: var(--glass); border: 1px solid #222; border-radius: 20px; padding: 20px; text-align: center; animation: fadeIn 0.3s ease; }
        .inv-card img { width: 130px; margin-bottom: 10px; }

        #notif { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: #000; border: 1px solid var(--main); padding: 15px 30px; margin-top: 10px; font-family: 'Orbitron'; border-left: 5px solid var(--main); }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:10px; align-items:center;">
        <div id="admin-panel" style="display:none;"><button class="btn-nav" style="border-color:var(--accent); color:var(--accent);" onclick="addMoney()">+ ADMIN</button></div>
        <button class="btn-nav active" id="tab-market" onclick="showPage('market')" data-t="nav_market">МАРКЕТ</button>
        <button class="btn-nav" id="tab-inventory" onclick="showPage('inventory')" data-t="nav_inv">ІНВЕНТАР</button>
    </div>

    <div class="logo-center">BABYSELL</div>

    <div style="display:flex; align-items:center; gap:15px;">
        <div style="display:flex; gap:5px;">
            <button class="lang-btn" id="l-uk" onclick="setLang('uk')">UA</button>
            <button class="lang-btn" id="l-en" onclick="setLang('en')">EN</button>
        </div>
        <div id="u-bal" style="color:var(--main); font-family:'Orbitron'; font-size:18px;">0 B</div>
        <button id="l-btn" onclick="login()" class="btn-nav" data-t="btn_login">УВІЙТИ</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div style="max-width:1000px; margin: 0 auto 40px; border-radius: 20px; height: 120px; background: linear-gradient(90deg, #000, #0a2e23); display: flex; align-items: center; justify-content: center; border: 1px solid var(--main);">
        <div style="text-align:center;">
            <h1 data-t="ev_title" style="font-family:'Orbitron'; color:var(--main); font-size:32px;">EMERALD SKIES</h1>
            <p data-t="ev_desc" style="color:#ccc;">Відкривай кейси та отримуй унікальні призи!</p>
        </div>
    </div>
    
    <div class="cases-grid">
        <div class="case-card" onclick="openCaseModal('hardcore')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <h2 style="font-family:'Orbitron'; margin-top:15px;" data-t="case_1_name">HARDCORE CASE</h2>
            <p style="color:var(--main); font-size:24px; font-weight:bold;">1,000 B</p>
        </div>
        
        <div class="case-card" onclick="openCaseModal('ultra')">
            <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png">
            <h2 style="font-family:'Orbitron'; margin-top:15px;" data-t="case_2_name">ULTRA ELITE CASE</h2>
            <p style="color:var(--rare); font-size:24px; font-weight:bold;">5,000 B</p>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:35px;">
        <h2 style="font-family:'Orbitron'; color:var(--main);" data-t="inv_title">КОЛЕКЦІЯ</h2>
        <button class="btn-nav" style="background:var(--accent); color:white; border:none;" onclick="confirmSellAll()" data-t="btn_sellall">ПРОДАТИ ВСЕ</button>
    </div>
    <div id="inv-grid" class="inv-grid"></div>
</div>

<div id="case-modal" class="modal">
    <div style="width:90%; max-width:800px; text-align:center;">
        <h2 style="font-family:'Orbitron';" data-t="roulette_wait">ВІДКРИТТЯ...</h2>
        <div class="view-window">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:100%; height:50px; background:var(--main); color:#000; font-weight:bold; font-size:14px;" onclick="startSpin()" data-t="btn_spin">КРУТИТИ</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;" data-t="btn_close">ЗАКРИТИ</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const ADMIN_UID = "ВАШ_UID_ТУТ"; // Вставте свій UID

    const LANGS = {
        uk: {
            nav_market: "МАРКЕТ", nav_inv: "ІНВЕНТАР", btn_login: "УВІЙТИ",
            ev_title: "EMERALD SKIES", ev_desc: "Відкривай кейси та отримуй унікальні призи!",
            case_1_name: "HARDCORE CASE", case_2_name: "ULTRA ELITE CASE",
            inv_title: "КОЛЕКЦІЯ", btn_sellall: "ПРОДАТИ ВСЕ",
            roulette_wait: "ВІДКРИТТЯ...", btn_spin: "КРУТИТИ", btn_close: "ЗАКРИТИ",
            btn_inspect: "ОГЛЯНУТЬ", btn_sell: "ПРОДАТИ", toast_won: "ВИ ВИГРАЛИ: ", confirm_sell: "Продати цей скін?"
        },
        en: {
            nav_market: "MARKET", nav_inv: "INVENTORY", btn_login: "LOGIN",
            ev_title: "EMERALD SKIES", ev_desc: "Open cases and get prizes!",
            case_1_name: "HARDCORE CASE", case_2_name: "ULTRA ELITE CASE",
            inv_title: "COLLECTION", btn_sellall: "SELL ALL",
            roulette_wait: "OPENING...", btn_spin: "SPIN", btn_close: "CLOSE",
            btn_inspect: "INSPECT", btn_sell: "SELL", toast_won: "YOU WON: ", confirm_sell: "Sell this skin?"
        }
    };

    let currentLang = 'uk';
    
    // МАСИВ КЕЙСУ 1 (HARDCORE)
    const HARDCORE_SKINS = [
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff", rarity: "Common", inspect: "steam://run/730//+csgo_econ_action_preview%209282345D064028938A96B291BA91A296AA23083E7E91D24391FABAE296F9928CEC" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", price: 1200, chance: 25, color: "#d32ee6", rarity: "Classified", inspect: "steam://run/730//+csgo_econ_action_preview%20S76561198084057371A15357827299D7371585802521921350" },
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", price: 15000, chance: 5, color: "#ebca42", rarity: "Rare Special", inspect: "steam://run/730//+csgo_econ_action_preview%20D9C97F7B2E4C63D8C15ADDF91CDDF1DFE9DAE10423772BDA9945DCB1D0A9DDF65DAA5A" }
    ];
    
    // МАСИВ КЕЙСУ 2 (ULTRA ELITE) - ТВОЇ СКІНИ З ЦІНАМИ ТА ШАНСАМИ
    const ULTRA_SKINS = [
        { name: "AWP | Mil-Spec", img: "https://i.postimg.cc/1z1XbL2S/330x192-(1).png", price: 800, chance: 40, color: "#4b69ff", rarity: "Mil-Spec", inspect: "" },
        { name: "AWP | Restricted", img: "https://i.postimg.cc/LXNsYhXF/330x192.png", price: 1500, chance: 25, color: "#8847ff", rarity: "Restricted", inspect: "" },
        { name: "AWP | Classified", img: "https://i.postimg.cc/x8ZT57Mm/330x192-(2).png", price: 3000, chance: 15, color: "#d32ee6", rarity: "Classified", inspect: "" },
        { name: "AWP | Covert Blue", img: "https://i.postimg.cc/NfWjr3gq/330x192-(3).png", price: 6000, chance: 8, color: "#eb4b4b", rarity: "Covert", inspect: "" },
        { name: "AWP | Covert Red", img: "https://i.postimg.cc/yNK6L03Y/330x192-(4).png", price: 8000, chance: 5, color: "#eb4b4b", rarity: "Covert", inspect: "" },
        { name: "AWP | Covert Gold", img: "https://i.postimg.cc/RFVSB9T1/330x192-(5).png", price: 12000, chance: 3, color: "#eb4b4b", rarity: "Covert", inspect: "" },
        { name: "Desert Eagle | Contraband", img: "https://i.postimg.cc/1X8y8H2X/330x192-(6).png", price: 25000, chance: 1.5, color: "#e4ae39", rarity: "Contraband", inspect: "" },
        { name: "Butterfly Knife | Rare", img: "https://i.postimg.cc/yN0gdV9f/330x192-(7).png", price: 100000, chance: 0.5, color: "#ebca42", rarity: "Rare Special", inspect: "" }
    ];

    let user = null, balance = 0, userInv = {}, currentActiveCaseSkins = [], currentCaseCost = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            if(u.uid === ADMIN_UID) document.getElementById('admin-panel').style.display = 'block';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                userInv = s.val() || {};
                renderInventory();
            });
        }
    });

    function setLang(l) {
        currentLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('l-'+l).classList.add('active');
        document.querySelectorAll('[data-t]').forEach(el => { el.innerText = LANGS[l][el.getAttribute('data-t')]; });
        renderInventory();
    }

    // ЛОГІКА ВИБОРУ СКІНА ПО ШАНСАМ
    function getWeightedSkin(skinsArray) {
        let rand = Math.random() * 100;
        let cumulative = 0;
        for (let skin of skinsArray) {
            cumulative += skin.chance;
            if (rand <= cumulative) return skin;
        }
        return skinsArray[0]; // На всякий випадок
    }

    function openCaseModal(caseType) {
        if(!user) return login();
        
        // Визначаємо, який кейс відкриваємо
        if(caseType === 'hardcore') {
            currentActiveCaseSkins = HARDCORE_SKINS;
            currentCaseCost = 1000;
        } else if (caseType === 'ultra') {
            currentActiveCaseSkins = ULTRA_SKINS;
            currentCaseCost = 5000;
        }
        
        document.getElementById('case-modal').style.display = 'flex';
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        
        // Наповнюємо стрічку випадковими скінами З ЦЬОГО КЕЙСУ
        for(let i=0; i<100; i++) {
            let s = currentActiveCaseSkins[Math.floor(Math.random()*currentActiveCaseSkins.length)];
            strip.innerHTML += `<div style="min-width:160px; display:flex; align-items:center; justify-content:center;"><img src="${s.img}" width="100"></div>`;
        }
    }

    function startSpin() {
        if(balance < currentCaseCost) return toast("No balance");
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - currentCaseCost);
        
        // Отримуємо виграшний скін по шансам
        const win = getWeightedSkin(currentActiveCaseSkins);
        
        const strip = document.getElementById('strip');
        strip.children[80].innerHTML = `<img src="${win.img}" width="100">`;
        const move = (80 * 160) - (document.querySelector('.view-window').offsetWidth / 2) + 80;
        strip.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0, 1)';
        strip.style.transform = `translateX(-${move}px)`;
        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            toast(LANGS[currentLang].toast_won + win.name);
            document.getElementById('spin-btn').disabled = false;
        }, 8200);
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).forEach(id => {
            const i = userInv[id];
            g.innerHTML += `
                <div class="inv-card">
                    <span style="font-size:10px; font-family:Orbitron; color:${i.color};">${i.rarity}</span>
                    <img src="${i.img}" width="130">
                    <div style="font-family:Orbitron; font-size:12px; color:#fff">${i.name}</div>
                    <button class="btn-nav" style="width:100%; margin:10px 0; font-size:9px;" onclick="openSteam('${i.inspect}')">${LANGS[currentLang].btn_inspect}</button>
                    <button class="btn-nav" style="width:100%; border-color:var(--accent); font-size:9px;" onclick="sell('${id}',${i.price})">${LANGS[currentLang].btn_sell}</button>
                </div>`;
        });
    }

    function sell(id, p) {
        if(confirm(LANGS[currentLang].confirm_sell)) {
            db.ref('users/'+user.uid+'/inventory/'+id).remove();
            db.ref('users/'+user.uid+'/balance').set(balance + p);
        }
    }

    function confirmSellAll() {
        let total = 0; Object.values(userInv).forEach(i => total += i.price);
        if(total > 0 && confirm("Sell all items?")) {
            db.ref('users/'+user.uid+'/inventory').remove();
            db.ref('users/'+user.uid+'/balance').set(balance + total);
        }
    }

    function openSteam(link) {
        if(!link) return;
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none'; iframe.src = link;
        document.body.appendChild(iframe);
        setTimeout(() => document.body.removeChild(iframe), 500);
    }

    function addMoney() { db.ref('users/'+user.uid+'/balance').set(balance + 100000); }
    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+p).classList.add('active');
    }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeModals() { document.getElementById('case-modal').style.display = 'none'; }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
    setLang('uk');
</script>
</body>
</html>
