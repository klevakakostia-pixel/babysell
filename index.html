<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>BABYSELL CASE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #050508; --border: rgba(0, 255, 170, 0.2); }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        #particles-js { position: fixed; inset: 0; z-index: 0; background-color: var(--bg); }
        .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Orbitron'; font-size: 22px; letter-spacing: 3px; font-weight: 700; }
        .logo span { color: var(--main); text-shadow: 0 0 10px var(--main); }
        .header-right { display: flex; align-items: center; gap: 30px; }
        .bal-box { background: rgba(0,255,170,0.1); border: 1px solid var(--main); padding: 6px 15px; border-radius: 4px; color: var(--main); font-family: 'Orbitron'; }
        #u-pic { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--main); object-fit: cover; }
        .content { flex: 1; display: flex; justify-content: center; align-items: center; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .case-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.4s; }
        .case-card:hover { transform: translateY(-10px); border-color: var(--main); }
        .case-img { width: 220px; }
        .roulette-wrapper { position: relative; width: 800px; height: 180px; background: #000; border: 1px solid var(--main); overflow: hidden; border-radius: 15px; display: flex; align-items: center; }
        .pointer-arrow { position: absolute; left: 50%; top: 0; transform: translateX(-50%); color: var(--main); font-size: 30px; z-index: 20; }
        .track { display: flex; align-items: center; position: absolute; height: 100%; left: 0; }
        .track div { min-width: 160px; text-align: center; }
        .track img { width: 110px; }
        .btn-open-case { background: transparent; color: var(--main); border: 2px solid var(--main); padding: 12px 40px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; margin-top: 15px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-cnt { background: #0a0a0d; padding: 50px; border: 2px solid var(--main); border-radius: 30px; text-align: center; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="app">
        <header class="header">
            <div class="logo">BABY<span>SELL</span></div>
            <div class="header-right">
                <div class="bal-box"><span id="u-balance">0</span> B</div>
                <button id="login-btn" class="btn-open-case" style="padding: 5px 10px; font-size: 12px;" onclick="googleAuth()">LOGIN</button>
                <div id="user-info" style="display:none"><img src="" id="u-pic"></div>
            </div>
        </header>
        <main class="content">
            <section id="screen-cases" class="screen" style="display:flex">
                <div class="case-card" onclick="showScreen('screen-preview')">
                    <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" class="case-img">
                    <h2 style="font-family:'Orbitron';">ELITE CASE</h2>
                </div>
            </section>
            <section id="screen-preview" class="screen">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" width="240">
                <button class="btn-open-case" onclick="startSpin()">ОТКРЫТЬ [500 B]</button>
            </section>
            <section id="screen-roulette" class="screen">
                <div class="roulette-wrapper">
                    <div class="pointer-arrow">▼</div>
                    <div id="track" class="track"></div>
                </div>
            </section>
        </main>
        <div id="win-modal" class="modal">
            <div class="modal-cnt">
                <div id="win-res"></div>
                <button class="btn-open-case" onclick="location.reload()">ЗАБРАТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
            authDomain: "babysell-8b37b.firebaseapp.com", 
            projectId: "babysell-8b37b", 
            databaseURL: "https://babysell-8b37b-default-rtdb.firebaseio.com", 
            appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        let bal = 0;
        const LOOT = [
            { n: "АКР ТУНЕЛЬНІ ТВАРИ", p: 1400, img: "https://i.postimg.cc/3NW96mG1/AK.png" },
            { n: "ГЛОК КАРАМЕЛЬНЕ ЯБЛУКО", p: 450, img: "https://i.postimg.cc/Hk5Jznr2/Glock.png" }
        ];

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('u-pic').src = user.photoURL;
                db.ref('users/' + user.uid + '/balance').on('value', s => {
                    bal = s.val() || 0;
                    document.getElementById('u-balance').innerText = bal;
                });
            }
        });

        window.googleAuth = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        };

        window.startSpin = () => {
            if (bal < 500) return alert("Low balance!");
            db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => (c || 0) - 500);
            showScreen('screen-roulette');
            const winIndex = 30;
            const winItem = LOOT[Math.floor(Math.random() * LOOT.length)];
            const track = document.getElementById('track');
            let html = '';
            for (let i = 0; i < 40; i++) {
                const cur = (i === winIndex) ? winItem : LOOT[Math.floor(Math.random() * LOOT.length)];
                html += `<div><img src="${cur.img}"></div>`;
            }
            track.innerHTML = html;
            setTimeout(() => {
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.05, 1)';
                track.style.transform = `translateX(-${(winIndex * 160) - 320}px)`;
            }, 100);
            setTimeout(() => {
                db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => (c || 0) + winItem.p);
                document.getElementById('win-res').innerHTML = `<img src="${winItem.img}" width="150"><h3>${winItem.n}</h3>`;
                document.getElementById('win-modal').style.display = 'flex';
            }, 6500);
        };

        particlesJS("particles-js", { particles: { number: { value: 50 }, color: { value: "#00ffaa" }, opacity: { value: 0.2 }, size: { value: 2 }, line_linked: { enable: true, opacity: 0.1 }, move: { speed: 1 } } });
    </script>
</body>
</html>
