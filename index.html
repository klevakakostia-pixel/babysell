<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL 1.0 BETA</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #020204; 
            --ease-hyper: cubic-bezier(0.15, 0.85, 0.25, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* WELCOME SCREEN - LUXURY FADE */
        #welcome-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 2.5s var(--ease-hyper), visibility 2.5s;
        }
        .welcome-logo {
            font-family: 'Orbitron'; font-size: 60px; font-weight: 900; letter-spacing: 20px;
            text-shadow: 0 0 50px var(--main); animation: softGlow 4s infinite alternate;
        }
        @keyframes softGlow { from { opacity: 0.3; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* CONTENT APPEARANCE */
        .app-content { 
            opacity: 0; filter: blur(20px); transform: scale(1.05);
            transition: all 2.5s var(--ease-hyper); 
        }
        .app-loaded .app-content { opacity: 1; filter: blur(0); transform: scale(1); }

        /* HEADER & NAV */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 60px; height: 100px; background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(30px); border-bottom: 1px solid rgba(0,255,170,0.1);
        }
        .btn-nav { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); 
            color: #888; padding: 12px 25px; border-radius: 4px; font-family: 'Orbitron'; 
            font-size: 10px; letter-spacing: 2px; cursor: pointer; transition: 0.8s var(--ease-hyper);
        }
        .btn-nav:hover:not(:disabled) { background: var(--main); color: #000; box-shadow: 0 0 30px var(--main); border-color: var(--main); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* CASE CARDS */
        .case-card {
            background: linear-gradient(145deg, rgba(20,20,25,0.8), rgba(10,10,15,0.8));
            padding: 60px; border-radius: 40px; text-align: center;
            border: 1px solid rgba(255,255,255,0.03); transition: 1.2s var(--ease-hyper);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .case-card:hover { transform: translateY(-20px) scale(1.02); border-color: var(--main); box-shadow: 0 40px 80px rgba(0,255,170,0.1); }
        .case-card img { width: 100%; max-width: 240px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }

        /* ROULETTE (CASE) */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .view-window { 
            position: relative; width: 100%; height: 200px; background: #000; 
            margin: 40px 0; overflow: hidden; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .strip { display: flex; position: absolute; left: 0; height: 100%; transition: transform 9.5s cubic-bezier(0.05, 0.7, 0.1, 1.0); will-change: transform; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 30px var(--main); }

        /* UPGRADE ELEMENTS */
        .upgrade-container { display: flex; justify-content: space-around; align-items: center; gap: 40px; padding: 40px; }
        .upgrade-slot { width: 300px; height: 350px; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.1); border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; cursor: pointer; }
        .upgrade-slot.active { border: 2px solid var(--main); box-shadow: 0 0 30px rgba(0,255,170,0.1); }
        
        /* NEW UPGRADER ROULETTE & WATER WAVE */
        .upgrader-roulette {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            border: 2px solid #222;
        }
        .upgrader-track {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(var(--main) 0deg, transparent 0deg);
            transition: background 0.8s ease;
        }
        .upgrader-inner {
            position: absolute;
            inset: 15px; /* Товщина кільця */
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Обрізає воду по формі кола */
            z-index: 2;
            border: 2px solid #111;
        }
        /* Хвилі */
        .water-wave {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(0, 255, 170, 0.4);
            border-radius: 38%;
            top: 100%; /* Початково сховано (внизу) */
            left: 50%;
            margin-left: -200px;
            animation: spinWave 6s linear infinite;
            transition: top 1s var(--ease-hyper);
            z-index: 1;
        }
        .water-wave::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(0, 255, 170, 0.2);
            border-radius: 42%;
            top: -15px;
            left: 0;
            animation: spinWave 8s linear infinite reverse;
        }
        @keyframes spinWave {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Стрілочка */
        .upgrader-arrow-container {
            position: absolute;
            inset: -15px; /* Виступає за межі кола */
            z-index: 5;
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
            will-change: transform;
        }
        .upgrader-arrow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #fff;
            filter: drop-shadow(0 0 10px #fff);
        }
        .chance-text {
            position: relative;
            z-index: 4;
            font-family: 'Orbitron';
            font-size: 45px;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            font-weight: 900;
        }

        /* PRODUCT STYLES */
        .product-item { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(0,255,170,0.1); cursor: pointer; transition: 0.5s; }
        .product-item:hover { border-color: var(--main); background: rgba(0,255,170,0.05); }
        #product-modal-content { background: #0a0a0c; border: 1px solid var(--main); padding: 50px; border-radius: 30px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 0 100px rgba(0,255,170,0.2); animation: modalScale 0.5s var(--ease-hyper); }
        .install-btn { display: inline-block; background: var(--main); color: #000; padding: 20px 60px; border-radius: 4px; font-family: 'Orbitron'; font-weight: 900; text-decoration: none; margin-top: 30px; transition: 0.5s; letter-spacing: 3px; }
        .install-btn:hover { box-shadow: 0 0 50px var(--main); transform: scale(1.05); }

        .inv-item { background: rgba(255,255,255,0.02); padding: 30px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 1s var(--ease-hyper); animation: slideUp 1s var(--ease-hyper) backwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalScale { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-logo">BABYSELL</div>
    <button class="btn-nav" style="margin-top:50px; padding:20px 60px;" onclick="initApp()">go to site</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3"></audio>
<audio id="case-open-sound"><source src="https://files.catbox.moe/7f3jzq.mp3"></audio>
<audio id="snd-tick"><source src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

<div class="app-content">
    <header class="header">
        <div style="display:flex; gap:20px;">
            <button class="btn-nav" onclick="showPage('market')">MARKET</button>
            <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
            <button class="btn-nav" onclick="showPage('upgrade')">UPGRADE</button>
            <button class="btn-nav" style="border-color:var(--main); color:#fff;" onclick="showPage('products')">BEYSELL PRODUCTS</button>
        </div>
        <div style="font-family:Orbitron; letter-spacing:10px; font-weight:900; cursor:pointer;" onclick="showPage('market')">BABYSELL</div>
        <div style="display:flex; align-items:center; gap:30px;">
            <div id="u-bal" style="color:var(--main); font-family:Orbitron; font-size:22px; font-weight:900;">0 B</div>
            <button id="l-btn" class="btn-nav" onclick="login()">LOGIN</button>
            <div id="l-prof" style="display:none;"><img id="l-ava" src="" style="width:45px; border-radius:50%; border:2px solid var(--main);"></div>
        </div>
    </header>

    <div id="page-market" style="padding:100px 40px;">
        <center>
            <div class="case-card" style="max-width:400px;" onclick="openCaseModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <h2 style="font-family:Orbitron; margin-top:30px; letter-spacing:5px;">SUPREME CASE</h2>
                <div style="color:var(--main); font-size:30px; font-weight:900; margin-top:15px;">1,000 B</div>
            </div>
        </center>
    </div>

    <div id="page-inventory" style="display:none; padding:80px;">
        <h1 style="font-family:Orbitron; margin-bottom:50px; letter-spacing:5px; color:var(--main);">COLLECTION</h1>
        <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:30px;"></div>
    </div>

    <div id="page-upgrade" style="display:none; padding:80px;">
        <h1 style="font-family:Orbitron; margin-bottom:40px; text-align:center; letter-spacing:5px; color:var(--main);">UPGRADER</h1>
        <div class="upgrade-container">
            <div id="slot-input" class="upgrade-slot" onclick="showPage('inventory')">
                <p style="color:#444; font-family:Orbitron; font-size:12px;">SELECT SKIN</p>
            </div>
            
            <!-- ОНОВЛЕНА РУЛЕТКА ДЛЯ АПГРЕЙДУ -->
            <div style="text-align:center; position:relative;">
                <div class="upgrader-roulette" id="upg-roulette">
                    <div class="upgrader-track" id="upg-track"></div>
                    <div class="upgrader-arrow-container" id="upg-arrow">
                        <div class="upgrader-arrow"></div>
                    </div>
                    <div class="upgrader-inner">
                        <div class="water-wave" id="water-fill"></div>
                        <div id="chance-display" class="chance-text">0%</div>
                    </div>
                </div>
                <button id="upg-btn" class="btn-nav" style="margin-top:40px; width:200px; font-size: 14px; padding: 15px;" onclick="attemptUpgrade()" disabled>UPGRADE</button>
            </div>

            <div id="slot-output" class="upgrade-slot">
                <select id="target-select" onchange="updateUpgradeChance()" style="background:#000; color:#fff; border:1px solid #333; padding:10px; font-family:Orbitron; outline: none; cursor: pointer;">
                    <option value="">TARGET SKIN</option>
                </select>
                <div id="target-img-preview" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <div id="page-products" style="display:none; padding:100px 80px;">
        <h1 style="font-family:Orbitron; margin-bottom:50px; letter-spacing:10px; text-align:center;">BEYSELL</h1>
        <div style="display:flex; justify-content:center;">
            <div class="product-item" onclick="openProductInfo()">
                <h2 style="font-family:Orbitron; color:var(--main);">BEYSELL-LAUNCHER</h2>
                <p style="margin-top:10px; color:#666;">Gaming Platform v1.0</p>
            </div>
        </div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div id="product-modal-content">
        <h1 style="font-family:Orbitron; color:var(--main); letter-spacing:5px;">BEYSELL-LAUNCHER</h1>
        <p>OFFICIAL GAMING CLIENT</p>
        <a href="https://www.dropbox.com/scl/fi/33u95qm2g9tj0ltaohz5m/BEYSELL_Setup.exe?rlkey=ygvjgyx6vtroxxt5adlc81c1o&st=77dypihf&dl=1" class="install-btn">INSTALL</a>
        <p onclick="closeProductModal()" style="margin-top:30px; color:#333; cursor:pointer; font-family:Orbitron; font-size:10px;">CLOSE</p>
    </div>
</div>

<div id="case-modal" class="modal">
    <div style="width:95%; max-width:900px; text-align:center;">
        <h1 id="win-status" style="font-family:Orbitron; letter-spacing:10px; margin-bottom:40px; color:#333;">FATE DECIDING...</h1>
        <div class="view-window"><div class="pointer"></div><div id="strip" class="strip"></div></div>
        <button id="spin-btn" class="btn-nav" style="width:300px; height:70px;" onclick="startSpin()">OPEN FOR 1,000 B</button>
        <p onclick="closeModals()" style="margin-top:30px; color:#222; cursor:pointer; font-family:Orbitron; font-size:10px;">EXIT</p>
    </div>
</div>

<script>
    const music = document.getElementById('bg-music'), caseSound = document.getElementById('case-open-sound'), tick = document.getElementById('snd-tick');
    tick.volume = 0.03;

    function initApp() {
        music.volume = 0.2; music.play();
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.visibility = 'hidden';
            document.body.classList.add('app-loaded');
        }, 1500);
    }

    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { name: "Glock Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff" },
        { name: "Deagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, chance: 20, color: "#8847ff" },
        { name: "AK Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, chance: 8, color: "#d32ee6" },
        { name: "Butterfly", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, chance: 2, color: "#ebca42" }
    ];

    let user = null, balance = 0, userInv = {}, selectedUpgradeId = null;
    let currentSpinAngle = 0; // Зберігає кут стрілки для наступного крутіння

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'block';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => { balance = s.val() || 0; document.getElementById('u-bal').innerText = balance.toLocaleString() + " B"; });
            db.ref('users/'+u.uid+'/inventory').on('value', s => { userInv = s.val() || {}; renderInventory(); populateTargetSkins(); });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function showPage(p) {
        ['page-market', 'page-inventory', 'page-products', 'page-upgrade'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('page-' + p).style.display = 'block';
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).reverse().forEach(id => {
            const i = userInv[id];
            g.innerHTML += `<div class="inv-item" style="border-bottom:4px solid ${i.color}">
                <img src="${i.img}" width="130"><br><br><b>${i.name}</b><br><br>
                <button class="btn-nav" style="width:100%; border-color:var(--main);" onclick="selectForUpgrade('${id}')">UPGRADE</button>
                <button class="btn-nav" style="width:100%; margin-top:5px;" onclick="sell('${id}',${i.price})">SELL ${i.price}B</button>
            </div>`;
        });
    }

    function selectForUpgrade(id) {
        selectedUpgradeId = id; const skin = userInv[id];
        const slot = document.getElementById('slot-input');
        slot.innerHTML = `<img src="${skin.img}" width="150"><p style="margin-top:15px; font-family:Orbitron; font-weight:bold;">${skin.name}</p><p style="color:var(--main);">${skin.price} B</p>`;
        slot.classList.add('active'); 
        showPage('upgrade'); 
        updateUpgradeChance();
    }

    function populateTargetSkins() {
        const sel = document.getElementById('target-select'); 
        // Зберігаємо поточний вибір, щоб не скидалося при оновленні інвентаря
        const currentVal = sel.value; 
        sel.innerHTML = '<option value="">TARGET SKIN</option>';
        SKINS.forEach((s, i) => sel.innerHTML += `<option value="${i}">${s.name} (${s.price}B)</option>`);
        if(currentVal) sel.value = currentVal;
    }

    function updateUpgradeChance() {
        if(!selectedUpgradeId) return;
        const targetIdx = document.getElementById('target-select').value;
        const btn = document.getElementById('upg-btn');
        const track = document.getElementById('upg-track');
        const water = document.getElementById('water-fill');
        const chanceDisplay = document.getElementById('chance-display');
        const preview = document.getElementById('target-img-preview');

        if(targetIdx === "") { 
            chanceDisplay.innerText = "0%"; 
            btn.disabled = true; 
            track.style.background = `conic-gradient(var(--main) 0deg, transparent 0deg)`;
            water.style.top = `100%`;
            preview.innerHTML = "";
            return; 
        }

        const chance = Math.min(95, Math.floor((userInv[selectedUpgradeId].price / SKINS[targetIdx].price) * 100));
        chanceDisplay.innerText = chance + "%"; 
        btn.disabled = false;

        // Показуємо картинку таргет-скіна
        preview.innerHTML = `<img src="${SKINS[targetIdx].img}" width="150" style="filter: drop-shadow(0 10px 20px ${SKINS[targetIdx].color})">`;

        // Малюємо кільце виграшу (conic-gradient від 0 до кута шансу)
        const angle = (chance / 100) * 360;
        track.style.background = `conic-gradient(var(--main) ${angle}deg, transparent ${angle}deg)`;

        // Піднімаємо воду в залежності від відсотків 
        // (100% шанс = top: 0% тобто повне коло, 0% = top: 100% схована внизу)
        water.style.top = `${100 - chance}%`;
    }

    function attemptUpgrade() {
        const targetIdx = document.getElementById('target-select').value;
        const chance = parseInt(document.getElementById('chance-display').innerText);
        const btn = document.getElementById('upg-btn');
        const arrowCont = document.getElementById('upg-arrow');

        btn.disabled = true;
        document.getElementById('target-select').disabled = true;

        // Логіка: генеруємо рандомний кут від 0 до 360
        const resultAngle = Math.random() * 360;
        const winAngleLimit = (chance / 100) * 360;
        
        // Стрілочка виграє, якщо кут влучає в заповнену зону (від 0 до winAngleLimit)
        const isWin = resultAngle <= winAngleLimit;

        // Анімація: додаємо 5 повних обертів + результат, до поточного кута
        const spins = 5 * 360;
        currentSpinAngle += spins + (resultAngle - (currentSpinAngle % 360));
        
        // Якщо треба зробити так щоб стрілочка крутилася плавно завжди вперед:
        arrowCont.style.transform = `rotate(${currentSpinAngle}deg)`;

        setTimeout(() => {
            if(isWin) {
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove();
                db.ref('users/'+user.uid+'/inventory').push(SKINS[targetIdx]);
                alert("SUCCESS! +1 " + SKINS[targetIdx].name);
            } else {
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove();
                alert("FAILED! SKIN DESTROYED");
            }
            
            // Скидання після результату
            selectedUpgradeId = null; 
            document.getElementById('slot-input').innerHTML = "<p style='color:#444; font-family:Orbitron; font-size:12px;'>SELECT SKIN</p>";
            document.getElementById('slot-input').classList.remove('active');
            document.getElementById('target-select').disabled = false;
            updateUpgradeChance(); 
            showPage('inventory'); 
            
        }, 4100); // Чекаємо 4 секунди поки закінчиться CSS анімація
    }

    function startSpin() {
        if(balance < 1000) return alert("LOW BALANCE");
        const btn = document.getElementById('spin-btn'); btn.disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);
        const win = SKINS[Math.floor(Math.random()*SKINS.length)];
        const strip = document.getElementById('strip');
        strip.innerHTML = ""; for(let i=0; i<120; i++) strip.innerHTML += `<div style="min-width:180px; display:flex; align-items:center; justify-content:center;"><img src="${SKINS[Math.floor(Math.random()*SKINS.length)].img}" width="100" style="opacity:0.2"></div>`;
        strip.children[100].innerHTML = `<img src="${win.img}" width="140" style="filter:drop-shadow(0 0 30px ${win.color})">`;
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        setTimeout(() => {
            strip.style.transition = 'transform 9.5s cubic-bezier(0.05, 0.7, 0.1, 1.0)';
            strip.style.transform = `translateX(-${(100*180)-450+90}px)`;
        }, 50);
        setTimeout(() => { db.ref('users/'+user.uid+'/inventory').push(win); btn.disabled = false; }, 9800);
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function openCaseModal() { if(!user) return login(); document.getElementById('case-modal').style.display='flex'; }
    function closeModals() { document.getElementById('case-modal').style.display='none'; }
    function openProductInfo() { document.getElementById('product-modal').style.display = 'flex'; }
    function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }
</script>
</body>
</html>
