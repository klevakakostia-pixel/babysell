<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - COLLECTOR EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #08080a; --accent: #ff2d55;
            --rarity-knife: #eb4b4b; --rarity-ak: #d32ee6; --rarity-glock: #4b69ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 70px; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111;
        }
        .user-block { display: flex; align-items: center; gap: 12px; }
        #u-pic { width: 35px; height: 35px; border-radius: 4px; border: 1px solid var(--main); }

        /* EVENT BANNER */
        .event-hero {
            position: relative; width: 100%; height: 500px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover no-repeat;
            display: flex; align-items: center; padding-left: 8%;
        }
        .event-hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.95) 5%, transparent 80%);
        }
        .event-content { position: relative; z-index: 5; width: 320px; }
        
        .leaderboard { 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }
        .leader-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #111; font-size: 11px; }

        /* CASE SECTION */
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .case-card {
            display: inline-block; background: #0c0c0f; border: 1px solid #1a1a1a;
            border-radius: 20px; padding: 40px; transition: 0.4s; cursor: pointer;
        }
        .case-card:hover { border-color: var(--main); transform: scale(1.02); box-shadow: 0 0 30px rgba(0,255,170,0.05); }
        .case-card img { width: 280px; }

        /* ROULETTE MODAL */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: #050507; border: 1px solid #222; padding: 40px; border-radius: 20px;
            width: 90%; max-width: 800px; text-align: center;
        }
        .roulette-win {
            position: relative; width: 100%; height: 160px; background: #000;
            margin: 30px 0; overflow: hidden; border-radius: 10px; border: 1px solid #111;
        }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 10; box-shadow: 0 0 15px var(--main); }
        .strip { display: flex; position: absolute; left: 0; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        
        .item { 
            min-width: 150px; height: 160px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-right: 1px solid #0a0a0a;
            position: relative;
        }
        .item img { width: 100px; z-index: 2; }
        .rarity-bg { position: absolute; bottom: 0; width: 100%; height: 4px; }

        .btn-spin { background: var(--main); color: #000; padding: 15px 40px; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        .btn-spin:disabled { background: #222; color: #555; }
    </style>
</head>
<body>

<header class="header">
    <h2 style="font-family:'Orbitron'; color:var(--main); letter-spacing: 2px;">BABYSELL</h2>
    <div class="user-block">
        <div style="text-align:right">
            <div id="u-name" style="font-family:'Orbitron'; font-size:10px; color:#aaa;">GUEST</div>
            <div id="u-bal" style="color:var(--main); font-weight:bold; font-size:16px;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <button id="l-btn" onclick="login()" style="background:var(--main); border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:9px; font-weight:bold;">LOGIN</button>
    </div>
</header>

<section class="event-hero">
    <div class="event-content">
        <h1 style="font-family:'Orbitron'; font-size: 32px; margin-bottom:15px;">EMERALD SKIES</h1>
        <div class="leaderboard">
            <div style="font-size: 9px; color: #555; margin-bottom: 8px; font-family:'Orbitron';">LIVE PARTICIPANTS</div>
            <div id="p-list"></div>
        </div>
        <button class="btn-spin" style="background:var(--accent); color:#fff; width:100%;" id="j-btn" onclick="joinEvent()">JOIN EVENT</button>
    </div>
</section>

<div class="container">
    <div class="case-card" onclick="openCase()">
        <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" alt="Box">
        <div style="font-family:'Orbitron'; margin-top:20px; font-size:22px; letter-spacing:1px;">ULTIMATE CASE</div>
        <div style="color:var(--main); font-weight:bold; font-size:24px; margin-top:5px;">2,000 B</div>
    </div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box">
        <h2 id="m-status" style="font-family:'Orbitron'; letter-spacing:2px;">ROLLING...</h2>
        <div class="roulette-win">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button class="btn-spin" id="spin-btn" onclick="startSpin()">SPIN FOR 2,000 B</button>
        <button onclick="closeModal()" style="display:block; margin: 20px auto 0; background:none; border:none; color:#444; cursor:pointer; font-family:'Orbitron'; font-size:12px;">CLOSE INTERFACE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", color: "#eb4b4b" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", color: "#d32ee6" },
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", color: "#4b69ff" },
        { name: "USP-S Cyber", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", color: "#00ffaa" }
    ];

    let user = null, balance = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('u-name').innerText = u.displayName.toUpperCase();
            document.getElementById('u-pic').src = u.photoURL;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('events/emerald/users/'+u.uid).on('value', s => {
                if(s.exists()){ document.getElementById('j-btn').innerText = "JOINED"; document.getElementById('j-btn').disabled = true; }
            });
        }
    });

    db.ref('events/emerald/users').limitToLast(5).on('value', s => {
        const list = document.getElementById('p-list'); list.innerHTML = "";
        if(s.exists()){
            Object.values(s.val()).reverse().forEach(v => {
                list.innerHTML += `<div class="leader-row"><span style="color:var(--main)">${v.name}</span><span>ONLINE</span></div>`;
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function joinEvent() { if(user) db.ref('events/emerald/users/'+user.uid).set({ name: user.displayName }); }

    function openCase() {
        if(!user) return alert("Login first!");
        if(balance < 2000) return alert("Insufficient balance (2,000 B required)");
        document.getElementById('case-modal').style.display = 'flex';
        prepareRoulette();
    }

    function prepareRoulette() {
        const strip = document.getElementById('strip');
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<70; i++) {
            const skin = SKINS[Math.floor(Math.random() * SKINS.length)];
            strip.innerHTML += `
                <div class="item">
                    <img src="${skin.img}">
                    <div class="rarity-bg" style="background:${skin.color}"></div>
                </div>`;
        }
    }

    function startSpin() {
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 2000);

        const strip = document.getElementById('strip');
        const winIndex = 60; 
        const winSkin = SKINS[Math.floor(Math.random() * SKINS.length)];
        
        // Замінюємо 60-й елемент на переможний
        const items = strip.getElementsByClassName('item');
        items[winIndex].innerHTML = `<img src="${winSkin.img}"><div class="rarity-bg" style="background:${winSkin.color}"></div>`;

        const move = (winIndex * 151) - (800/2) + 75;
        strip.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            document.getElementById('m-status').innerText = "WIN: " + winSkin.name.toUpperCase();
            document.getElementById('m-status').style.color = winSkin.color;
        }, 6200);
    }

    function closeModal() {
        document.getElementById('case-modal').style.display = 'none';
        document.getElementById('m-status').innerText = "ROLLING...";
        document.getElementById('m-status').style.color = "#fff";
        document.getElementById('spin-btn').disabled = false;
    }
</script>
</body>
</html>
