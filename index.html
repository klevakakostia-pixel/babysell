<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - LEGENDARY</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');
        :root { --main: #00ffaa; --bg: #050508; --card: rgba(255, 255, 255, 0.03); --error: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #1a3a2f 0%, var(--bg) 80%);
            min-height: 100vh;
        }
        
        /* NOTIFICATION SYSTEM */
        #notify-box {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .notify {
            background: rgba(0,0,0,0.9); border: 1px solid var(--main); padding: 15px 25px;
            border-radius: 5px; font-family: 'Orbitron'; font-size: 13px; color: var(--main);
            box-shadow: 0 0 20px rgba(0,255,170,0.2); animation: slideIn 0.3s ease forwards;
        }
        .notify.error { border-color: var(--error); color: var(--error); box-shadow: 0 0 20px rgba(255,68,68,0.2); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 50px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--main);
        }
        .logo { font-family: 'Orbitron'; font-size: 28px; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px var(--main); }
        .logo span { color: var(--main); }

        .bal-box { background: #111; border: 1px solid var(--main); padding: 10px 25px; border-radius: 5px; font-family: 'Orbitron'; color: var(--main); }
        
        .container { max-width: 1200px; margin: 40px auto; text-align: center; }

        .roulette-container {
            position: relative; width: 100%; max-width: 900px; height: 180px;
            margin: 30px auto; background: #0a0a0c; border: 2px solid #222;
            overflow: hidden; border-radius: 10px; display: none;
        }
        .roulette-container::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--main); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px var(--main); }
        .track { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        .track div { min-width: 150px; height: 100%; border-right: 1px solid #111; display: flex; align-items: center; justify-content: center; background: linear-gradient(0deg, rgba(255,255,255,0.02), transparent); }
        .track div img { width: 100px; }

        .case-card {
            display: inline-block; width: 280px; padding: 20px; background: var(--card);
            border: 1px solid #222; border-radius: 15px; cursor: pointer; transition: 0.3s;
            margin: 20px; position: relative;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-5px); }
        .case-card img { width: 100%; margin-bottom: 15px; }

        .inventory { margin-top: 50px; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border-top: 1px solid #222; }
        .inv-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; min-height: 100px; }
        .inv-item { width: 140px; background: #0d0d0f; border: 1px solid #222; padding: 10px; border-radius: 10px; font-size: 11px; text-align: center; }
        .inv-item img { width: 80px; }
        .sell-btn { background: var(--main); color: #000; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-top: 5px; font-weight: bold; }

        .btn {
            background: var(--main); color: #000; border: none; padding: 15px 40px;
            font-family: 'Orbitron'; font-size: 16px; border-radius: 5px; cursor: pointer;
            transition: 0.3s; margin-top: 20px;
        }
        .btn:disabled { background: #333; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="notify-box"></div>
<audio id="bg-music" loop src="https://files.catbox.moe/sv6xxw.mp3"></audio>
<audio id="promo-sound" src="https://files.catbox.moe/0yp9wp.mp3"></audio>

<header class="header">
    <div class="logo">BABY<span>SELL</span></div>
    <div style="display:flex; gap:10px; align-items:center;">
        <input type="text" id="promo-in" placeholder="ПРОМОКОД" style="background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:5px; width: 120px;">
        <button onclick="applyPromo()" class="sell-btn" style="padding:8px 15px;">OK</button>
        <div class="bal-box"><span id="balance">0</span> B</div>
        <button id="login" class="btn" style="margin:0; padding:10px 20px;" onclick="googleLogin()">LOGIN</button>
    </div>
</header>

<div class="container">
    <div id="case-selection">
        <div class="case-card" onclick="selectCase('УЛИЧНЫЕ КОШМАРЫ')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <h3>УЛИЧНЫЕ КОШМАРЫ</h3>
            <p style="color:var(--main)">500 B</p>
        </div>
        <div class="case-card" style="opacity:0.5;">
            <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png">
            <h3 id="timer">LOCKED</h3>
        </div>
    </div>

    <div id="roulette-screen" style="display:none;">
        <h2 id="case-title" style="font-family:'Orbitron'; margin-bottom:20px;"></h2>
        <div class="roulette-container" id="roulette" style="display:block;">
            <div class="track" id="track"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="spin()">ОТКРЫТЬ КЕЙС</button>
        <p onclick="location.reload()" style="margin: 20px; cursor:pointer; color:#555;">← НАЗАД</p>
    </div>

    <div class="inventory">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px; font-size:18px; color:var(--main);">ИНВЕНТАРЬ</h2>
        <div class="inv-grid" id="inv-grid"></div>
    </div>
</div>

<script>
    const LOOT = [
        { n: "ГЛОК", p: 100, img: "https://i.postimg.cc/Hk5Jznr2/Glock.png", w: 60 },
        { n: "USP-S", p: 666, img: "https://i.postimg.cc/HL5phv0W/aaaaa.png", w: 30 },
        { n: "AK-47", p: 9999, img: "https://i.postimg.cc/3NW96mG1/AK.png", w: 8 },
        { n: "BUTTERFLY", p: 50000, img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", w: 2 }
    ];

    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let balance = 0;

    function showNotify(text, isError = false) {
        const box = document.getElementById('notify-box');
        const n = document.createElement('div');
        n.className = 'notify' + (isError ? ' error' : '');
        n.innerText = text;
        box.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            db.ref('users/' + user.uid + '/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('balance').innerText = balance.toLocaleString();
            });
            updateInventoryUI();
            document.body.onclick = () => document.getElementById('bg-music').play();
        }
    });

    function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function applyPromo() {
        if(!auth.currentUser) return showNotify("СНАЧАЛА ВОЙДИ!", true);
        const code = document.getElementById('promo-in').value.trim().toUpperCase();
        const uId = auth.currentUser.uid;

        if(code === "START2026") {
            db.ref(`users/${uId}/promos/START2026`).once('value', s => {
                if(s.exists()) {
                    showNotify("ПРОМО УЖЕ ИСПОЛЬЗОВАНО!", true);
                } else {
                    db.ref(`users/${uId}/balance`).transaction(c => (c || 0) + 100);
                    db.ref(`users/${uId}/promos/START2026`).set(true);
                    document.getElementById('promo-sound').play();
                    showNotify("АКТИВИРОВАНО! +100 B");
                }
            });
        } else if(code === "ADMIN2027") {
            db.ref(`users/${uId}/balance`).transaction(c => (c || 0) + 50000);
            showNotify("ADMIN POWER! +50,000 B");
        } else {
            showNotify("НЕВЕРНЫЙ КОД", true);
        }
        document.getElementById('promo-in').value = '';
    }

    function selectCase(name) {
        document.getElementById('case-selection').style.display = 'none';
        document.getElementById('roulette-screen').style.display = 'block';
        document.getElementById('case-title').innerText = name;
    }

    function spin() {
        if (balance < 500) return showNotify("НЕДОСТАТОЧНО СРЕДСТВ", true);
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;

        db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c - 500);

        const track = document.getElementById('track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        track.innerHTML = '';

        const winItem = (() => {
            let r = Math.random() * 100, s = 0;
            for(let l of LOOT) { s += l.w; if(r <= s) return l; }
            return LOOT[0];
        })();

        for(let i=0; i<50; i++) {
            const item = (i === 40) ? winItem : LOOT[Math.floor(Math.random()*LOOT.length)];
            const d = document.createElement('div');
            d.innerHTML = `<img src="${item.img}">`;
            track.appendChild(d);
        }

        setTimeout(() => {
            track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
            const x = (40 * 150) - (document.getElementById('roulette').offsetWidth / 2) + 75;
            track.style.transform = `translateX(-${x}px)`;
        }, 50);

        setTimeout(() => {
            db.ref(`users/${auth.currentUser.uid}/inventory`).push(winItem);
            showNotify("ВЫПАЛО: " + winItem.n);
            btn.disabled = false;
            updateInventoryUI();
        }, 7200);
    }

    function updateInventoryUI() {
        if(!auth.currentUser) return;
        db.ref(`users/${auth.currentUser.uid}/inventory`).once('value', s => {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            s.forEach(child => {
                const item = child.val();
                const d = document.createElement('div');
                d.className = 'inv-item';
                d.innerHTML = `<img src="${item.img}"><br>${item.n}<br><button class="sell-btn" onclick="sellItem('${child.key}', ${item.p})">SELL ${item.p}</button>`;
                grid.appendChild(d);
            });
        });
    }

    function sellItem(key, price) {
        db.ref(`users/${auth.currentUser.uid}/inventory/${key}`).remove();
        db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c + price);
        updateInventoryUI();
        showNotify("ПРОДАНО ЗА " + price + " B");
    }

    // Timer (Lock)
    const end = Date.now() + (13*3600 + 19*60)*1000;
    setInterval(() => {
        let d = end - Date.now();
        let h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
        document.getElementById('timer').innerText = `LOCKED ${h}:${m}:${s}`;
    }, 1000);
</script>
</body>
</html>
