<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - SUPREME SOUND EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #010102; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* WELCOME */
        #welcome-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.2s; }
        .welcome-logo { font-family: 'Orbitron'; font-size: 50px; font-weight: 900; letter-spacing: 15px; color: #fff; text-shadow: 0 0 30px var(--main); margin-bottom: 30px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 50px var(--main); } }
        .enter-btn { background: none; border: 1px solid var(--main); color: var(--main); padding: 15px 50px; font-family: 'Orbitron'; cursor: pointer; letter-spacing: 3px; transition: 0.4s; }
        .enter-btn:hover { background: var(--main); color: #000; box-shadow: 0 0 40px var(--main); }

        /* UI */
        .app-content { opacity: 0; filter: blur(10px); transition: 1.5s; }
        .app-loaded .app-content { opacity: 1; filter: blur(0); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 80px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,170,0.15); position: sticky; top: 0; z-index: 1000; }
        .btn-nav { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 10px 20px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; cursor: pointer; transition: 0.4s; }
        .btn-nav:hover { border-color: var(--main); color: #fff; box-shadow: 0 0 15px rgba(0,255,170,0.2); }
        .case-card { background: rgba(15, 15, 20, 0.7); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.5s; }
        .case-card:hover { border-color: var(--main); transform: translateY(-10px); }
        .case-card img { width: 100%; max-width: 180px; animation: float 5s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* ROULETTE */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .view-window { position: relative; width: 100%; height: 160px; background: #000; margin: 25px 0; overflow: hidden; border: 1px solid #222; border-radius: 15px; }
        .strip { display: flex; position: absolute; left: 0; height: 100%; }
        .item { min-width: 160px; display: flex; align-items: center; justify-content: center; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 15px var(--main); }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-logo">BABYSELL</div>
    <button class="enter-btn" onclick="initApp()">INITIALIZE SYSTEM</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3" type="audio/mpeg"></audio>
<audio id="case-open-sound"><source src="https://files.catbox.moe/7f3jzq.mp3" type="audio/mpeg"></audio>

<div class="app-content">
    <header class="header">
        <div style="display:flex; gap:12px;">
            <button class="btn-nav" onclick="showPage('market')">MARKET</button>
            <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
        </div>
        <div style="font-family:'Orbitron'; font-weight:900; letter-spacing:5px;">BABYSELL</div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="u-bal" style="color:var(--main); font-family:'Orbitron'; font-size:18px;">0 B</div>
            <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000; border:none; font-weight:900;">LOGIN</button>
            <div id="l-prof" style="display:none; align-items:center; gap:10px;"><img id="l-ava" src="" style="width:35px; border-radius:50%; border:2px solid var(--main);"></div>
        </div>
    </header>

    <div id="page-market" style="padding:50px 20px;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:30px; max-width:1000px; margin:0 auto;">
            <div class="case-card" onclick="openCaseModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <h2 style="font-family:'Orbitron'; margin-top:20px; font-size:16px;">MYSTERIOUS NIGHTS</h2>
                <div style="color:var(--main); font-family:'Orbitron'; font-size:22px; margin-top:10px; font-weight:bold;">1,000 B</div>
            </div>
        </div>
    </div>

    <div id="page-inventory" style="display:none; padding:50px;">
        <h2 style="font-family:'Orbitron'; color:var(--main); margin-bottom:30px;">MY COLLECTION</h2>
        <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
    </div>
</div>

<div id="case-modal" class="modal">
    <div style="width:90%; max-width:800px; background:#08080a; padding:50px; border-radius:30px; border:1px solid #222; text-align:center;">
        <h2 id="win-status" style="font-family:'Orbitron'; color:var(--main); letter-spacing:4px;">LUCK IS NEAR...</h2>
        <div class="view-window">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:100%; height:50px; background:var(--main); color:#000; font-weight:bold;" onclick="startSpin()">OPEN CASE</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-family:Orbitron;">CLOSE</button>
    </div>
</div>

<script>
    function initApp() {
        document.getElementById('bg-music').volume = 0.2;
        document.getElementById('bg-music').play();
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.visibility = 'hidden';
            document.body.classList.add('app-loaded');
        }, 1200);
    }

    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const HARDCORE_SKINS = [
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff" },
        { name: "Desert Eagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, chance: 20, color: "#8847ff" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, chance: 8, color: "#d32ee6" },
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, chance: 2, color: "#ebca42" }
    ];

    let user = null, balance = 0, userInv = {};

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'flex';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                userInv = s.val() || {};
                renderInventory();
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function openCaseModal() {
        if(!user) return login();
        document.getElementById('case-modal').style.display = 'flex';
        document.getElementById('win-status').innerText = "LUCK IS NEAR...";
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<90; i++) {
            let s = HARDCORE_SKINS[Math.floor(Math.random()*HARDCORE_SKINS.length)];
            strip.innerHTML += `<div class="item"><img src="${s.img}" width="100"></div>`;
        }
    }

    function startSpin() {
        if(balance < 1000) return alert("NOT ENOUGH BALANCE");
        const spinBtn = document.getElementById('spin-btn');
        spinBtn.disabled = true;

        // NEW SOUND START
        const sound = document.getElementById('case-open-sound');
        sound.currentTime = 0;
        sound.play();

        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        const win = getWin();
        const strip = document.getElementById('strip');
        strip.children[80].innerHTML = `<img src="${win.img}" width="120" style="filter:drop-shadow(0 0 20px ${win.color})">`;
        
        const move = (80 * 160) - (document.querySelector('.view-window').offsetWidth / 2) + 80;
        
        // Синхронізуємо час анімації з довжиною звуку (~7-8 секунд)
        strip.style.transition = 'transform 7.5s cubic-bezier(0.1, 0, 0, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            document.getElementById('win-status').innerText = "YOU GOT: " + win.name;
            document.getElementById('win-status').style.color = win.color;
            spinBtn.disabled = false;
        }, 8000);
    }

    function getWin() {
        let r = Math.random() * 100, c = 0;
        for(let s of HARDCORE_SKINS) {
            c += s.chance;
            if(r <= c) return s;
        }
        return HARDCORE_SKINS[0];
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).reverse().forEach(id => {
            const i = userInv[id];
            g.innerHTML += `<div style="background:var(--glass); padding:20px; border-radius:15px; border-bottom:3px solid ${i.color}; text-align:center;">
                <img src="${i.img}" width="120"><br><b style="font-family:Orbitron; font-size:11px;">${i.name}</b><br>
                <button class="btn-nav" style="width:100%; margin-top:10px;" onclick="sell('${id}',${i.price})">SELL ${i.price} B</button>
            </div>`;
        });
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function showPage(p) {
        document.getElementById('page-market').style.display = (p==='market') ? 'block' : 'none';
        document.getElementById('page-inventory').style.display = (p==='inventory') ? 'block' : 'none';
    }
    function closeModals() { 
        document.getElementById('case-modal').style.display = 'none'; 
        document.getElementById('case-open-sound').pause(); // Stop sound if closed early
    }
</script>
</body>
</html>
