<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - ADMIN CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #08080a; --accent: #ff2d55; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 30px; height: 65px; background: rgba(0,0,0,0.95); border-bottom: 1px solid #111; position: sticky; top: 0; z-index: 1000; }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #888; padding: 6px 12px; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); }
        .balance-card { border: 1px solid var(--main); padding: 4px 12px; border-radius: 4px; color: var(--main); font-family: 'Orbitron'; font-weight: bold; }

        /* EVENT BLOCK */
        .event-mini-banner { max-width: 1000px; margin: 20px auto; border-radius: 12px; height: 180px; background: linear-gradient(90deg, #000 30%, transparent), url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border: 1px solid #1a1a1a; }
        .event-live-feed { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; width: 250px; height: 120px; overflow-y: auto; font-size: 11px; border-left: 2px solid var(--main); }
        .feed-item { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .feed-item b { color: var(--main); }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0a0a0c; border: 1px solid #222; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .admin-input { background: #050505; border: 1px solid #222; color: var(--main); padding: 12px; width: 100%; margin-bottom: 10px; text-align: center; font-family: 'Orbitron'; }

        /* MARKET & ITEMS */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .market-grid { display: flex; justify-content: center; padding: 20px; }
        .case-card { background: #0c0c0f; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; width: 220px; text-align: center; cursor: pointer; }

        /* ADMIN TRIGGER (PHOTO) */
        .admin-footer { text-align: center; padding: 40px; }
        .admin-trigger-img { width: 150px; cursor: pointer; filter: grayscale(1) opacity(0.3); transition: 0.3s; }
        .admin-trigger-img:hover { filter: grayscale(0) opacity(1); }

        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 11px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:10px;">
        <button class="btn-nav active" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="balance-card" id="u-bal">0 B</div>
        <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000;">LOGIN</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-mini-banner">
        <div>
            <h1 id="event-title" style="font-family:'Orbitron'; color:var(--main);">EMERALD SKIES</h1>
            <p id="event-desc" style="font-size:12px; color:#666;">EVENT ACTIVE: Win items to be the TOP player!</p>
        </div>
        <div class="event-live-feed" id="event-feed"></div>
    </div>
    <div class="market-grid">
        <div class="case-card" onclick="openCaseMock()">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width:120px;">
            <p style="font-family:'Orbitron'; margin-top:10px;">HARDCORE CASE</p>
            <b style="color:var(--main);">1,000 B</b>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <h2 style="text-align:center; color:var(--main);">YOUR INVENTORY</h2>
    <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:15px; margin-top:20px;"></div>
</div>

<div id="admin-auth-modal" class="modal">
    <div class="modal-box" style="border-color: var(--accent);">
        <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px;">TERMINAL</h2>
        <input type="text" id="adm-login" class="admin-input" placeholder="LOGIN">
        <input type="password" id="adm-pass" class="admin-input" placeholder="PASSWORD">
        <button class="btn-nav" style="width:100%; background:var(--accent); color:#fff;" onclick="checkAdminAuth()">ACCESS</button>
    </div>
</div>

<div id="admin-panel-modal" class="modal">
    <div class="modal-box" style="border-color: var(--main); max-width: 450px;">
        <h2 style="font-family:'Orbitron'; color:var(--main); margin-bottom:20px;">ADMIN PANEL</h2>
        
        <div style="background:#111; padding:15px; border-radius:10px; border:1px dashed var(--accent);">
            <h3 style="color:var(--accent); font-size:14px; margin-bottom:10px;">EVENT MANAGEMENT</h3>
            <p style="font-size:10px; color:#888; margin-bottom:10px;">Ends current event and pays 6666 B to the last winner in feed.</p>
            <button class="btn-nav" style="width:100%; background:var(--accent); color:#fff; font-weight:bold;" onclick="finishEvent()">END EVENT & PAY 6666 B</button>
        </div>

        <button class="btn-nav" style="width:100%; margin-top:15px;" onclick="closeAdmin()">CLOSE</button>
    </div>
</div>

<footer class="admin-footer">
    <img src="https://i.postimg.cc/pLrKrWW0/fyvfyv.png" class="admin-trigger-img" onclick="openAdminAuth()">
</footer>

<script>
    // Config
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let user = null, balance = 0, lastWinnerID = null;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            // Слухаємо глобальний фід івенту
            db.ref('event_feed').limitToLast(5).on('value', s => {
                const feed = document.getElementById('event-feed');
                feed.innerHTML = "";
                s.forEach(child => {
                    const data = child.val();
                    feed.innerHTML = `<div class="feed-item"><b>${data.name}</b> won ${data.item}</div>` + feed.innerHTML;
                    lastWinnerID = data.uid; // Запам'ятовуємо останнього
                });
            });
        }
    });

    // Імітація відкриття кейсу для тесту
    function openCaseMock() {
        if(!user) return toast("Login first!");
        if(balance < 1000) return toast("Need 1,000 B");
        
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);
        const item = "Glock-18 Fade";
        toast("You won " + item);
        
        // Записуємо в глобальний фід івенту
        db.ref('event_feed').push({
            uid: user.uid,
            name: user.displayName.split(' ')[0],
            item: item,
            time: Date.now()
        });
    }

    // --- ADMIN LOGIC ---
    function openAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'flex'; }
    function checkAdminAuth() {
        if(document.getElementById('adm-login').value === "BabyIceFace666" && document.getElementById('adm-pass').value === "kov6alex666") {
            document.getElementById('admin-auth-modal').style.display = 'none';
            document.getElementById('admin-panel-modal').style.display = 'flex';
        } else { toast("WRONG CREDENTIALS"); }
    }
    function closeAdmin() { document.getElementById('admin-panel-modal').style.display = 'none'; }

    // ТА САМА ФУНКЦІЯ ЗАВЕРШЕННЯ ІВЕНТУ
    function finishEvent() {
        if(!lastWinnerID) return toast("No winners found in feed!");
        
        // 1. Нараховуємо 6666 B останньому переможцю
        db.ref('users/' + lastWinnerID + '/balance').transaction(current => (current || 0) + 6666);
        
        // 2. Оновлюємо візуал івенту для всіх
        db.ref('event_status').set({ active: false, winner: lastWinnerID });
        
        // 3. Локальне сповіщення
        alert("EVENT FINISHED! 6666 B sent to the last winner.");
        
        document.getElementById('event-title').innerText = "EVENT CLOSED";
        document.getElementById('event-desc').innerText = "Admin has ended the event. Prize 6666 B distributed.";
        closeAdmin();
    }

    // Common UI
    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
    }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = "> " + m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
