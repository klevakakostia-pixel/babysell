<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - REAL ECONOMY UPDATE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #030305; --accent: #ff2d55; 
            --glass: rgba(255, 255, 255, 0.03);
            --rare-spec: #ebca42;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 170, 0.05) 0%, transparent 50%);
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 90px; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,170,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-weight: 900; font-size: 26px;
            letter-spacing: 6px; color: #fff; text-shadow: 0 0 15px var(--main);
            animation: pulseLogo 3s infinite;
        }
        @keyframes pulseLogo { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        .user-zone { display: flex; align-items: center; gap: 15px; }
        .u-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--main); box-shadow: 0 0 10px rgba(0,255,170,0.3); }
        .u-nick { font-family: 'Orbitron'; font-size: 11px; color: var(--main); }

        .btn-nav { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 10px 18px; border-radius: 8px; font-family: 'Orbitron'; 
            font-size: 11px; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); }

        .page { display: none; padding: 40px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .cases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .case-card {
            background: #0a0a0c; padding: 40px; border-radius: 30px; text-align: center;
            border: 1px solid #222; transition: 0.4s; position: relative; overflow: hidden;
            cursor: pointer;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-5px); }
        .case-card img { width: 100%; max-width: 200px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .price-tag { color: var(--main); font-family: 'Orbitron'; font-size: 24px; margin-top: 15px; font-weight: bold; }

        /* ROULETTE MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .roulette-box { width: 90%; max-width: 800px; background: #08080a; padding: 50px; border-radius: 30px; border: 1px solid #222; text-align: center; position: relative; }
        .view-window { position: relative; width: 100%; height: 160px; background: #000; margin: 25px 0; overflow: hidden; border: 1px solid #333; border-radius: 10px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 20px var(--main); }
        .strip { display: flex; position: absolute; left: 0; height: 100%; transition: transform 8s cubic-bezier(0.1, 0, 0, 1); }
        .item { min-width: 160px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.02); }

        #notif { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: #000; border: 1px solid var(--main); padding: 15px 30px; margin-top: 10px; font-family: 'Orbitron'; border-left: 5px solid var(--main); }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:10px;">
        <button class="btn-nav active" id="tab-market" onclick="showPage('market')">МАРКЕТ</button>
        <button class="btn-nav" id="tab-inventory" onclick="showPage('inventory')">ІНВЕНТАР</button>
    </div>

    <div class="logo-center">BABYSELL</div>

    <div class="user-zone">
        <div id="u-bal" style="color:var(--main); font-family:'Orbitron'; font-size:18px;">0 B</div>
        <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000;">LOGIN</button>
        <div id="l-prof" style="display:none; align-items:center; gap:10px;">
            <img id="l-ava" src="" class="u-avatar">
            <span id="l-nick" class="u-nick">...</span>
        </div>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="cases-grid">
        <div class="case-card" onclick="openCaseModal('hardcore')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <h2 style="font-family:'Orbitron'; margin-top:10px; font-size:16px;">MYSTERIOUS NIGHTS</h2>
            <div class="price-tag">1,000 B</div>
        </div>
        </div>
</div>

<div id="page-inventory" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-family:'Orbitron'; color:var(--main);">COLLECTION</h2>
        <button class="btn-nav" style="background:var(--accent); color:white; border:none;" onclick="confirmSellAll()">SELL ALL</button>
    </div>
    <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
</div>

<div id="case-modal" class="modal">
    <div class="roulette-box">
        <h2 style="font-family:'Orbitron'; color:var(--main);">OPENING...</h2>
        <div class="view-window">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:100%; height:50px; background:var(--main); color:#000; font-weight:bold;" onclick="startSpin()">OPEN FOR 1,000 B</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    // --- ТВОЯ НОВА ЕКОНОМІКА КЕЙСУ ---
    const HARDCORE_SKINS = [
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff", rarity: "Common" },
        { name: "Desert Eagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, chance: 20, color: "#8847ff", rarity: "Restricted" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, chance: 8, color: "#d32ee6", rarity: "Classified" },
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, chance: 2, color: "#ebca42", rarity: "Rare Special" }
    ];

    let user = null, balance = 0, userInv = {};

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'flex';
            document.getElementById('l-ava').src = u.photoURL;
            document.getElementById('l-nick').innerText = u.displayName.split(' ')[0];
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                userInv = s.val() || {};
                renderInventory();
            });
        }
    });

    // Алгоритм вибору скіна на основі шансів (Weighted Random)
    function getWeightedSkin() {
        let rand = Math.random() * 100; // Випадкове число від 0 до 100
        let cumulativeChance = 0;

        for (let skin of HARDCORE_SKINS) {
            cumulativeChance += skin.chance;
            if (rand <= cumulativeChance) {
                return skin;
            }
        }
        return HARDCORE_SKINS[0]; // На всяк випадок
    }

    function openCaseModal(caseType) {
        if(!user) return login();
        document.getElementById('case-modal').style.display = 'flex';
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        
        // Заповнюємо стрічку випадковими скінами для ефекту (не впливає на виграш)
        for(let i=0; i<100; i++) {
            let s = HARDCORE_SKINS[Math.floor(Math.random()*HARDCORE_SKINS.length)];
            strip.innerHTML += `<div class="item"><img src="${s.img}" width="100"></div>`;
        }
    }

    function startSpin() {
        if(balance < 1000) return toast("Insufficient balance");
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        const win = getWeightedSkin(); // ТУТ РАХУЄТЬСЯ РЕАЛЬНИЙ ВИГРАШ

        const strip = document.getElementById('strip');
        // Підставляємо реальний виграш у 80-й слот стрічки
        strip.children[80].innerHTML = `<img src="${win.img}" width="110" style="filter:drop-shadow(0 0 10px ${win.color})">`;
        
        // Розраховуємо зсув, щоб 80-й слот став по центру
        const move = (80 * 160) - (document.querySelector('.view-window').offsetWidth / 2) + 80;
        strip.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            toast("WON: " + win.name);
            document.getElementById('spin-btn').disabled = false;
        }, 8200);
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).forEach(id => {
            const i = userInv[id];
            g.innerHTML += `
                <div style="background:var(--glass); padding:20px; border-radius:15px; border-bottom:3px solid ${i.color}; text-align:center;">
                    <img src="${i.img}" width="120"><br>
                    <b style="font-family:Orbitron; font-size:12px;">${i.name}</b><br>
                    <button class="btn-nav" style="width:100%; margin-top:10px;" onclick="sell('${id}',${i.price})">SELL ${i.price} B</button>
                </div>`;
        });
    }

    function sell(id, p) {
        db.ref('users/'+user.uid+'/inventory/'+id).remove();
        db.ref('users/'+user.uid+'/balance').set(balance + p);
    }

    function confirmSellAll() {
        let total = 0; Object.values(userInv).forEach(i => total += i.price);
        if(total > 0 && confirm("Sell all for " + total + " B?")) {
            db.ref('users/'+user.uid+'/inventory').remove();
            db.ref('users/'+user.uid+'/balance').set(balance + total);
        }
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+p).classList.add('active');
    }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeModals() { document.getElementById('case-modal').style.display = 'none'; }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
