<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - FIXED EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); 
            --error: #ff3366; --rare: #4b69ff; --legendary: #eb4b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 30px; height: 70px; background: #000; border-bottom: 1px solid #111; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        #u-pic { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--main); }
        .balance-display { font-family: 'Orbitron'; color: var(--main); font-size: 16px; text-shadow: 0 0 10px rgba(0,255,170,0.3); }

        /* NAVIGATION - MOVED LOWER */
        .nav-bar { display: flex; justify-content: center; gap: 10px; padding: 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid #111; }
        .nav-btn { background: #111; border: 1px solid #222; color: #666; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; transition: 0.3s; }
        .nav-btn.active { border-color: var(--main); color: var(--main); box-shadow: 0 0 10px rgba(0,255,170,0.1); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }

        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CASE GRID */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; justify-items: center; }
        .case-card { background: var(--glass); border: 1px solid #222; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; width: 100%; transition: 0.2s; }
        .case-card:hover { border-color: var(--main); transform: scale(1.03); }
        .case-card img { width: 160px; margin-bottom: 10px; }

        /* CAT SECTION */
        .cat-box { text-align: center; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid #111; }
        .cat-img { width: 220px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 15px rgba(0,255,170,0.1)); border-radius: 20px; }
        .cat-img:active { transform: scale(0.95); }
        .energy-container { width: 250px; height: 12px; background: #000; border: 1px solid #333; border-radius: 10px; margin: 20px auto; overflow: hidden; }
        #energy-fill { height: 100%; background: var(--main); width: 100%; transition: 0.3s; }

        /* UPGRADES */
        .upgrade-card { background: #0a0a0c; border: 1px solid #222; padding: 15px; border-radius: 10px; margin-top: 20px; display: inline-block; }

        /* ROULETTE */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; }
        .roulette-win { position: relative; width: 600px; height: 140px; background: #080808; border: 2px solid #222; overflow: hidden; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--main); z-index: 10; }
        .strip { display: flex; position: absolute; left: 0; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 120px; height: 140px; border-right: 1px solid #111; display: flex; align-items: center; justify-content: center; }
        .item img { width: 70px; }

        .btn { background: var(--main); color: #000; border: none; padding: 12px 20px; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #222; color: #444; }

        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 12px; font-family: 'Orbitron'; animation: slide 0.3s forwards; }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div class="user-info">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <div style="line-height: 1.2;">
            <div id="u-name" style="font-family:'Orbitron'; font-size: 12px;">GUEST</div>
            <div id="auth-btn-area">
                <button onclick="login()" style="color:var(--main); background:none; border:none; cursor:pointer; font-size:10px;">[ LOGIN ]</button>
            </div>
        </div>
    </div>
    <div class="balance-display"><span id="balance">0</span> B</div>
</header>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="nav('cases', this)">CASES</button>
    <button class="nav-btn" onclick="nav('cat', this)">NEURAL CAT</button>
    <button class="nav-btn" onclick="nav('promo', this)">PROMO</button>
</nav>

<div class="container">
    <section id="p-cases" class="page active">
        <div class="case-grid">
            <div class="case-card" onclick="openModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <div style="font-family:'Orbitron'; font-size:14px;">STREET NIGHTMARE</div>
                <div style="color:var(--main); margin-top:5px;">500 B</div>
            </div>
        </div>
    </section>

    <section id="p-cat" class="page">
        <div class="cat-box">
            <h3 style="font-family:'Orbitron'; margin-bottom:20px;">SYSTEM MINER</h3>
            <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" class="cat-img" onclick="clickCat(event)">
            <div class="energy-container"><div id="energy-fill"></div></div>
            <div style="font-family:'Orbitron'; font-size:11px;">ENERGY: <span id="e-val">100</span>%</div>
            
            <div class="upgrade-card">
                <div style="font-size:10px; font-family:'Orbitron'; margin-bottom:8px;">REGEN X2</div>
                <button class="btn" id="buy-x2" onclick="buyX2()" style="font-size:10px; padding:6px 12px;">5,000 B</button>
            </div>
        </div>
    </section>

    <section id="p-promo" class="page" style="text-align:center;">
        <input type="text" id="promo-code" placeholder="ENTER CODE..." style="background:#000; border:1px solid #333; color:#fff; padding:12px; font-family:'Orbitron'; border-radius:5px; outline:none;">
        <button class="btn" onclick="useCode()">CLAIM</button>
    </section>
</div>

<div id="modal" class="modal">
    <div style="text-align:center;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">STREET NIGHTMARE</h2>
        <div class="roulette-win">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn" id="spin-btn" onclick="spin()">OPEN (500 B)</button>
            <button class="btn" style="background:#222; color:#fff;" onclick="closeModal()">EXIT</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let bal = 0, nrg = 100, x2 = false;

    // --- AUTH LOGIC (FIXED) ---
    auth.onAuthStateChanged(user => {
        const authArea = document.getElementById('auth-btn-area');
        if(user) {
            document.getElementById('u-name').innerText = user.displayName.split(' ')[0].toUpperCase();
            document.getElementById('u-pic').src = user.photoURL;
            authArea.innerHTML = `<button onclick="logout()" style="color:var(--error); background:none; border:none; cursor:pointer; font-size:10px;">[ LOGOUT ]</button>`;
            
            db.ref('users/'+user.uid).on('value', s => {
                const d = s.val() || {};
                bal = d.balance || 0;
                x2 = d.boosts?.energy_x2 || false;
                document.getElementById('balance').innerText = bal.toLocaleString();
                document.getElementById('buy-x2').innerText = x2 ? "OWNED" : "5,000 B";
                document.getElementById('buy-x2').disabled = x2;
            });
        } else {
            document.getElementById('u-name').innerText = "GUEST";
            document.getElementById('u-pic').src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            authArea.innerHTML = `<button onclick="login()" style="color:var(--main); background:none; border:none; cursor:pointer; font-size:10px;">[ LOGIN ]</button>`;
            document.getElementById('balance').innerText = "0";
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    // --- NAVIGATION ---
    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        el.classList.add('active');
    }

    // --- CAT ---
    function clickCat(e) {
        if(!auth.currentUser) return toast("LOGIN REQUIRED");
        if(nrg < 1) return toast("NO ENERGY", true);
        nrg--;
        updateNrgUI();
    }

    function updateNrgUI() {
        document.getElementById('energy-fill').style.width = nrg + "%";
        document.getElementById('e-val').innerText = Math.floor(nrg);
    }

    setInterval(() => {
        if(nrg < 100) {
            nrg = Math.min(100, nrg + (x2 ? 1.0 : 0.5));
            updateNrgUI();
        }
    }, 1000);

    function buyX2() {
        if(bal < 5000) return toast("NOT ENOUGH BALANCE", true);
        db.ref('users/'+auth.currentUser.uid).update({ balance: bal - 5000, "boosts/energy_x2": true });
    }

    // --- CASE ROULETTE ---
    function openModal() {
        document.getElementById('modal').style.display = 'flex';
        const strip = document.getElementById('strip');
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<60; i++) {
            strip.innerHTML += `<div class="item"><img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png"></div>`;
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function spin() {
        if(!auth.currentUser) return toast("LOGIN FIRST");
        if(bal < 500) return toast("NEED 500 B", true);

        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+auth.currentUser.uid+'/balance').set(bal - 500);

        const strip = document.getElementById('strip');
        const moveX = (50 * 121) - (600 / 2) + Math.random() * 80;
        strip.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${moveX}px)`;

        setTimeout(() => {
            toast("REWARD GRANTED!");
            document.getElementById('spin-btn').disabled = false;
        }, 6500);
    }

    function useCode() {
        const c = document.getElementById('promo-code').value.toUpperCase();
        if(c === "WELCOME") {
            db.ref('users/'+auth.currentUser.uid+'/balance').set(bal + 1000);
            toast("GIFT: +1,000 B");
        }
    }

    function toast(m, err=false) {
        const w = document.getElementById('notif');
        const n = document.createElement('div');
        n.className = 'toast';
        if(err) n.style.borderColor = 'var(--error)';
        n.innerText = m;
        w.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
</script>
</body>
</html>
