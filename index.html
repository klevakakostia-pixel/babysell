<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL 1.0 BETA</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --main: #ff9d00; --bg: #050212; --ease-hyper: cubic-bezier(0.15, 0.85, 0.25, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; min-height: 100vh; }
        #action-blocker { display: none; position: fixed; inset: 0; z-index: 99999; background: transparent; cursor: not-allowed; }
        .sunset-bg-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; background: linear-gradient(to bottom, #040110 0%, #110624 45%, #25092b 80%, #1f1105 100%); }
        .sunset-sun { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; background: radial-gradient(circle, #ffb700 15%, #ff4500 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(255, 69, 0, 0.5); animation: sunPulse 8s ease-in-out infinite alternate; }
        @keyframes sunPulse { from { transform: translate(-50%, -50%) scale(0.97); opacity: 0.85; } to { transform: translate(-50%, -50%) scale(1.03); opacity: 1; } }
        .app-content { opacity: 0; filter: blur(20px); transform: scale(1.05); transition: all 2.5s var(--ease-hyper); }
        .app-loaded .app-content { opacity: 1; filter: blur(0); transform: scale(1); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 60px; height: 100px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,157,0,0.15); }
        .btn-nav { position: relative; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); color: #ccc; padding: 12px 25px; border-radius: 30px; font-family: 'Orbitron'; cursor: pointer; transition: 0.5s; }
        .btn-nav:hover:not(:disabled) { background: var(--main); color: #000; border-color: var(--main); }
        .btn-nav:disabled { opacity: 0.3; }
        .upgrade-slot { width: 300px; height: 350px; background: rgba(5,3,12,0.6); border: 2px dashed rgba(255,157,0,0.3); border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .upgrade-slot.active { border-style: solid; border-color: var(--main); }
        .upgrader-roulette { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(0,0,0,0.85); border: 2px solid rgba(255,157,0,0.2); }
        .upgrader-track { position: absolute; inset: 0; border-radius: 50%; transition: background 0.8s ease; }
        .upgrader-arrow-container { position: absolute; inset: -15px; z-index: 5; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); transform: rotate(180deg); }
        .upgrader-arrow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #fff; }
        .water-wave { position: absolute; width: 400px; height: 400px; background: rgba(255, 157, 0, 0.35); border-radius: 38%; top: 100%; left: 50%; margin-left: -200px; animation: spinWave 6s linear infinite; transition: top 1s var(--ease-hyper); }
        @keyframes spinWave { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .chance-text { position: relative; z-index: 4; font-family: 'Orbitron'; font-size: 45px; color: #fff; font-weight: 900; }
        .case-strip-item { min-width: 220px; height: 220px; margin: 0 10px; background: rgba(18,12,28,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .view-window { width: 100%; height: 280px; background: #000; overflow: hidden; position: relative; }
        .strip { display: flex; position: absolute; left: 0; height: 100%; align-items: center; transition: transform 9s cubic-bezier(0.05, 0.7, 0.1, 1.0); }
    </style>
</head>
<body>

<div id="action-blocker"></div>
<div class="sunset-bg-container"><div class="sunset-sun"></div></div>

<div id="welcome-screen" style="position:fixed; inset:0; background:#000; z-index:9000; display:flex; align-items:center; justify-content:center;">
    <button class="btn-nav" style="padding:20px 60px;" onclick="initApp()">START</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3"></audio>

<div class="app-content">
    <header class="header">
        <button class="btn-nav" onclick="showPage('inventory')">INV</button>
        <button class="btn-nav" onclick="showPage('upgrade')">UPGRADE</button>
        <div id="u-bal" style="color:var(--main); font-family:Orbitron;">0 B</div>
    </header>

    <div id="page-inventory" style="padding:50px;">
        <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, 250px); gap:20px;"></div>
    </div>

    <div id="page-upgrade" style="display:none; padding:50px;">
        <div style="display:flex; justify-content:space-around; align-items:center;">
            <div id="slot-input" class="upgrade-slot">Select Skin</div>
            <div style="text-align:center; position:relative;">
                <div class="upgrader-roulette">
                    <div class="upgrader-track" id="upg-track"></div>
                    <div class="upgrader-arrow-container" id="upg-arrow">
                        <div class="upgrader-arrow"></div>
                    </div>
                    <div class="upgrader-inner" style="position:absolute; inset:15px; background:#050212; border-radius:50%; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                        <div class="water-wave" id="water-fill"></div>
                        <div id="chance-display" class="chance-text">0%</div>
                    </div>
                </div>
                <button id="upg-btn" class="btn-nav" style="margin-top:40px; width:200px;" onclick="attemptUpgrade()" disabled>UPGRADE</button>
            </div>
            <div id="slot-output" class="upgrade-slot">
                <select id="target-select" onchange="updateUpgradeChance()"><option value="">TARGET</option></select>
                <div id="target-img-preview"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const music = document.getElementById('bg-music');
    function initApp() { music.play(); document.getElementById('welcome-screen').style.display = 'none'; document.body.classList.add('app-loaded'); }
    
    const firebaseConfig = { apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", authDomain: "babysell-8b37b.firebaseapp.com", databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", projectId: "babysell-8b37b", appId: "1:955498378146:web:52f027f8e97398e75b78fb" };
    firebase.initializeApp(firebaseConfig); const auth = firebase.auth(), db = firebase.database();
    
    const SKINS = [
        { name: "Glock Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, color: "#4b69ff" },
        { name: "Deagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, color: "#8847ff" },
        { name: "AK Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, color: "#d32ee6" },
        { name: "Butterfly", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, color: "#ebca42" }
    ];
    
    let user = null, userInv = {}, selectedUpgradeId = null, currentSpinAngle = 180;

    auth.onAuthStateChanged(u => { if(u) { user = u; db.ref('users/'+u.uid+'/inventory').on('value', s => { userInv = s.val() || {}; renderInventory(); populateTargetSkins(); }); } });

    function renderInventory() { const g = document.getElementById('inv-grid'); g.innerHTML = ""; Object.keys(userInv).forEach(id => { const i = userInv[id]; g.innerHTML += `<div style="background:rgba(5,3,12,0.6); padding:20px; border-radius:20px; text-align:center;"><img src="${i.img}" width="100"><br><b>${i.name}</b><br><button onclick="selectForUpgrade('${id}')">UPGRADE</button></div>`; }); }
    function selectForUpgrade(id) { selectedUpgradeId = id; const skin = userInv[id]; document.getElementById('slot-input').innerHTML = `<img src="${skin.img}" width="100"><p>${skin.name}</p>`; document.getElementById('slot-input').classList.add('active'); showPage('upgrade'); updateUpgradeChance(); }
    function populateTargetSkins() { const sel = document.getElementById('target-select'); sel.innerHTML = '<option value="">TARGET</option>'; SKINS.forEach((s, i) => sel.innerHTML += `<option value="${i}">${s.name}</option>`); }
    function updateUpgradeChance() { const tIdx = document.getElementById('target-select').value; if(!tIdx) return; const chance = Math.min(95, Math.floor((userInv[selectedUpgradeId].price / SKINS[tIdx].price) * 100)); document.getElementById('chance-display').innerText = chance + "%"; document.getElementById('upg-btn').disabled = false; const deg = (chance/100)*180; document.getElementById('upg-track').style.background = `conic-gradient(transparent ${180-deg}deg, var(--main) ${180-deg}deg, var(--main) ${180+deg}deg, transparent ${180+deg}deg)`; document.getElementById('water-fill').style.top = (100-chance) + "%"; }
    function showPage(p) { ['page-inventory', 'page-upgrade'].forEach(id => document.getElementById(id).style.display = 'none'); document.getElementById('page-' + p).style.display = 'block'; }
    
    // ОНОВЛЕНА ЛОГІКА
    function attemptUpgrade() { 
        const tIdx = document.getElementById('target-select').value;
        const chance = parseInt(document.getElementById('chance-display').innerText);
        const arrow = document.getElementById('upg-arrow');
        document.getElementById('action-blocker').style.display = 'block';

        // 1. Генеруємо випадковий кут зупинки (0-360)
        const finalAngle = Math.floor(Math.random() * 360);

        // 2. Рахуємо межі виграшної зони (симетрично від 180 градусів)
        const winArc = (chance / 100) * 360;
        const winStart = 180 - (winArc / 2);
        const winEnd = 180 + (winArc / 2);

        // 3. Визначаємо, чи виграв користувач
        const isWin = (finalAngle >= winStart && finalAngle <= winEnd);

        // 4. Обертаємо стрілку
        currentSpinAngle += (5 * 360) + (finalAngle - (currentSpinAngle % 360));
        arrow.style.transform = `rotate(${currentSpinAngle}deg)`;

        // 5. Результат
        setTimeout(() => {
            document.getElementById('action-blocker').style.display = 'none';
            if(isWin) {
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove();
                db.ref('users/'+user.uid+'/inventory').push(SKINS[tIdx]);
                alert("SUCCESS! You got " + SKINS[tIdx].name);
            } else {
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove();
                alert("FAILED! Skin destroyed.");
            }
            location.reload();
        }, 4100);
    }
</script>
</body>
</html>
