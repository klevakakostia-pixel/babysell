<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - REALTIME EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #0b0b0f; --glass: rgba(255, 255, 255, 0.03); 
            --accent-pink: #ff2d55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* LIVE DROPS */
        .live-drops {
            display: flex; gap: 8px; background: #000; padding: 5px; 
            border-bottom: 1px solid #1a1a1a; overflow-x: auto; height: 65px;
            scrollbar-width: none;
        }
        .drop-card {
            min-width: 70px; height: 50px; background: rgba(255,255,255,0.03);
            border-bottom: 2px solid var(--main); display: flex; align-items: center; justify-content: center;
            border-radius: 4px; animation: slideIn 0.5s ease;
        }
        .drop-card img { height: 35px; border-radius: 4px; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 70px; background: rgba(11, 11, 15, 0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .user-block { display: flex; align-items: center; gap: 12px; }
        #u-pic { width: 38px; height: 38px; border-radius: 6px; border: 1px solid var(--main); }

        /* EVENT BANNER */
        .event-hero {
            position: relative; width: 100%; height: 580px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover no-repeat;
            display: flex; align-items: center; padding-left: 8%;
        }
        .event-hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 20%, transparent 60%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }
        .event-content { position: relative; z-index: 5; width: 380px; }
        .event-title { font-family: 'Orbitron'; font-size: 38px; color: #fff; margin-bottom: 15px; }

        /* REALTIME LEADERS */
        .leaderboard { 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px;
        }
        .leader-row { 
            display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Orbitron'; font-size: 11px;
        }
        .leader-row:last-child { border: none; }
        .leader-name { color: #eee; }
        .leader-tag { color: var(--main); font-size: 9px; margin-left: 5px; }

        .btn-join { 
            background: var(--accent-pink); color: #fff; padding: 14px 35px; border-radius: 6px;
            font-family: 'Orbitron'; border: none; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 45, 85, 0.2);
        }
        .btn-join:disabled { background: #333; cursor: default; box-shadow: none; color: #777; }

        /* MODAL STYLES (ЗАМІСТЬ ALERT) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 3000; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal-box {
            background: #0d0d12; border: 1px solid #222; width: 90%; max-width: 450px;
            padding: 30px; border-radius: 15px; text-align: center; position: relative;
        }
        .modal-box h3 { font-family: 'Orbitron'; margin-bottom: 15px; color: var(--main); }
        .modal-box p { color: #aaa; margin-bottom: 20px; font-size: 14px; }

        /* CASE GRID */
        .main-content { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .case-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.03); 
            border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-5px); }
        .case-card img { width: 150px; margin-bottom: 15px; }

        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 12px 25px; margin-top: 10px; font-family: 'Orbitron'; font-size: 12px; }
    </style>
</head>
<body>

<div id="notif"></div>

<div id="modal-ui" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title">SYSTEM STATUS</h3>
        <p id="modal-text">Processing request...</p>
        <button class="btn-join" style="width: auto; padding: 10px 30px;" onclick="closeModal()">OK</button>
    </div>
</div>

<div class="live-drops" id="drops-strip">
    </div>

<header class="header">
    <h2 style="font-family:'Orbitron'; font-size: 18px; color: var(--main);">BABYSELL</h2>
    <div class="user-block">
        <div style="text-align:right">
            <div id="u-name" style="font-family:'Orbitron'; font-size:11px;">GUEST</div>
            <div id="u-bal" style="color:var(--main); font-weight:bold; font-size:14px;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <button id="login-btn" onclick="login()" style="background:var(--main); border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:10px;">LOGIN</button>
    </div>
</header>

<div id="home">
    <section class="event-hero">
        <div class="event-content">
            <h1 class="event-title">EMERALD SKIES</h1>
            <div class="leaderboard">
                <div style="font-size: 10px; color: #555; margin-bottom: 10px;">RECENTLY JOINED USERS:</div>
                <div id="leader-list">
                    <div class="leader-row" style="color: #444;">No users joined yet...</div>
                </div>
            </div>
            <button class="btn-join" id="join-btn" onclick="joinEvent()">JOIN EVENT ★</button>
        </div>
    </section>

    <div class="main-content">
        <h2 style="font-family:'Orbitron'; font-size: 14px; margin-bottom: 25px; border-left: 2px solid var(--main); padding-left: 10px;">OPERATIONAL CASES</h2>
        <div class="case-grid">
            <div class="case-card" onclick="openCase('STREET NIGHTMARE')">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <div style="font-family:'Orbitron'; font-size:12px;">STREET NIGHTMARE</div>
                <div style="color:var(--main); margin-top:5px; font-weight:bold;">500 B</div>
            </div>
            <div class="case-card" onclick="openCase('CYBER NEKO')">
                <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" style="border-radius:10px;">
                <div style="font-family:'Orbitron'; font-size:12px;">CYBER NEKO</div>
                <div style="color:var(--main); margin-top:5px; font-weight:bold;">1200 B</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let userData = null;

    auth.onAuthStateChanged(user => {
        if(user) {
            userData = user;
            document.getElementById('u-name').innerText = user.displayName.split(' ')[0].toUpperCase();
            document.getElementById('u-pic').src = user.photoURL;
            document.getElementById('login-btn').style.display = 'none';
            
            // Listen to balance
            db.ref('users/'+user.uid+'/balance').on('value', s => {
                document.getElementById('u-bal').innerText = (s.val() || 0).toLocaleString() + " B";
            });

            // Check if joined event
            db.ref('events/emerald_skies/participants/'+user.uid).on('value', s => {
                if(s.exists()) {
                    const btn = document.getElementById('join-btn');
                    btn.innerText = "ALREADY JOINED";
                    btn.disabled = true;
                }
            });
        }
    });

    // REAL-TIME PARTICIPANTS LIST
    db.ref('events/emerald_skies/participants').limitToLast(5).on('value', s => {
        const list = document.getElementById('leader-list');
        list.innerHTML = "";
        const data = s.val();
        if(data) {
            Object.values(data).reverse().forEach(p => {
                list.innerHTML += `
                    <div class="leader-row">
                        <span class="leader-name">${p.name} <span class="leader-tag">PARTICIPANT</span></span>
                        <span style="color:#555">Online</span>
                    </div>
                `;
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function joinEvent() {
        if(!userData) return showModal("AUTH REQUIRED", "Please login to participate in the event.");
        
        db.ref('events/emerald_skies/participants/'+userData.uid).set({
            name: userData.displayName,
            joinedAt: Date.now()
        }).then(() => {
            showModal("SUCCESS", "You have successfully joined Emerald Skies event!");
        });
    }

    function openCase(name) {
        if(!userData) return showModal("AUTH REQUIRED", "Login to open cases.");
        showModal("CASE OPENING", `Initiating ${name} extraction... Please wait for synchronization.`);
        // Here you would trigger your roulette logic
    }

    // CUSTOM MODAL LOGIC
    function showModal(title, text) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-ui').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-ui').style.display = 'none';
    }

    function toast(m) {
        const w = document.getElementById('notif');
        const n = document.createElement('div');
        n.className = 'toast';
        n.innerText = m;
        w.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
</script>

</body>
</html>
