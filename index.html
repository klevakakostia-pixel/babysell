<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - CASE OPENING & UPGRADE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #050508; --border: rgba(0, 255, 170, 0.15); --rare: #eb4b4b; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        #particles-js { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .app { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Orbitron'; font-size: 24px; letter-spacing: 3px; cursor: pointer; color: #fff; text-decoration: none; }
        .logo span { color: var(--main); text-shadow: 0 0 15px var(--main); }

        .nav { display: flex; gap: 20px; margin-left: 30px; }
        .nav-link { color: #888; text-decoration: none; font-family: 'Orbitron'; font-size: 12px; transition: 0.3s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: var(--main); text-shadow: 0 0 10px var(--main); }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .bal-box { background: rgba(0,255,170,0.08); border: 1px solid var(--main); padding: 8px 20px; border-radius: 10px; color: var(--main); font-family: 'Orbitron'; min-width: 120px; text-align: center; }

        /* UPGRADE */
        #screen-upgrade { flex-direction: column; align-items: center; padding-top: 40px; }
        .upgrade-container { display: flex; gap: 50px; align-items: center; margin-top: 30px; }
        .up-box { width: 220px; height: 300px; background: rgba(255,255,255,0.02); border: 1px dashed var(--border); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .up-box img { max-width: 150px; margin-bottom: 15px; }
        .chance-circle { width: 200px; height: 200px; border-radius: 50%; border: 10px solid #222; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .chance-fill { position: absolute; inset: 0; background: conic-gradient(var(--main) 0%, transparent 0%); transition: 0.3s; }
        .chance-text { position: relative; z-index: 5; font-family: 'Orbitron'; font-size: 24px; }

        /* ROULETTE & CASES */
        .cases-grid { display: flex; gap: 50px; justify-content: center; padding-top: 50px; flex-wrap: wrap; }
        .case-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 30px; border-radius: 25px; width: 280px; text-align: center; cursor: pointer; transition: 0.5s; position: relative; }
        .case-card.locked { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }
        .lock-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); border-radius: 25px; }

        .btn { background: transparent; color: var(--main); border: 2px solid var(--main); padding: 14px 40px; border-radius: 12px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover:not(:disabled) { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }

        .roulette-wrapper { position: relative; width: 800px; height: 200px; background: rgba(0,0,0,0.9); border: 2px solid var(--main); overflow: hidden; border-radius: 20px; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--main); z-index: 20; transform: translateX(-50%); }
        .track { display: flex; align-items: center; position: absolute; height: 100%; left: 0; }
        .track div { min-width: 160px; height: 200px; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .track div img { max-width: 120px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-cnt { background: #08080a; padding: 50px; border: 1px solid var(--main); border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="https://files.catbox.moe/sv6xxw.mp3"></audio>
    <div id="particles-js"></div>

    <div class="app">
        <header class="header">
            <div style="display: flex; align-items: center;">
                <div class="logo" onclick="showScreen('screen-cases')">BABY<span>SELL</span></div>
                <div class="nav">
                    <span class="nav-link active" id="nav-cases" onclick="showScreen('screen-cases')">CASES</span>
                    <span class="nav-link" id="nav-upgrade" onclick="showScreen('screen-upgrade')">UPGRADE</span>
                </div>
            </div>
            <div class="header-right">
                <div class="bal-box"><span id="u-balance">0</span> B</div>
                <button id="login-btn" class="btn" style="padding: 8px 15px; font-size: 11px;" onclick="googleAuth()">LOGIN</button>
                <div id="user-info" style="display:none">
                    <img src="" id="u-pic" onclick="toggleSettings()" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--main); cursor: pointer;">
                </div>
            </div>
        </header>

        <main style="flex:1; display:flex; justify-content:center; align-items:center;">
            <section id="screen-cases" class="screen" style="display:flex;">
                <div class="cases-grid">
                    <div class="case-card" onclick="openPreview('УЛИЧНЫЕ КОШМАРЫ', 'https://i.postimg.cc/ZnHQ1pwz/AAA.png')">
                        <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" class="case-img" style="width:100%">
                        <h3 style="font-family:'Orbitron'; margin-top:20px; font-size:14px;">УЛИЧНЫЕ КОШМАРЫ</h3>
                    </div>
                    <div id="case-lucky" class="case-card locked">
                        <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png" class="case-img" style="width:100%">
                        <div class="lock-overlay"><div id="timer" style="font-family:'Orbitron'; color:var(--main);">00:00:00</div></div>
                    </div>
                </div>
            </section>

            <section id="screen-upgrade" class="screen" style="display:none;">
                <h1 style="font-family:'Orbitron'; color:var(--main);">SKIN UPGRADE</h1>
                <div class="upgrade-container">
                    <div class="up-box" id="up-current">
                        <span style="color:#444;">SELECT SKIN</span>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
                        <div class="chance-circle">
                            <div class="chance-fill" id="chance-fill"></div>
                            <div class="chance-text" id="chance-val">0%</div>
                        </div>
                        <button class="btn" onclick="startUpgrade()">UPGRADE</button>
                    </div>
                    <div class="up-box" id="up-target">
                        <img src="https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png">
                        <span style="font-family:'Orbitron'; color:var(--main);">BUTTERFLY EMERALD</span>
                    </div>
                </div>
            </section>

            <section id="screen-roulette" class="screen" style="display:none; flex-direction:column; align-items:center;">
                <div class="roulette-wrapper">
                    <div class="pointer"></div>
                    <div id="track" class="track"></div>
                </div>
            </section>

            <section id="screen-preview" class="screen" style="display:none; flex-direction:column; align-items:center;">
                <img id="preview-img" src="" width="250">
                <h2 id="preview-name" style="font-family:'Orbitron'; margin: 25px 0;"></h2>
                <button id="spin-btn" class="btn" onclick="startSpin()">ОТКРЫТЬ ЗА 500 B</button>
            </section>
        </main>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-cnt" id="win-cnt"></div>
    </div>

    <script>
        const LOOT = [
            { n: "ГЛОК КАРАМЕЛЬНОЕ ЯБЛОКО", p: 100, img: "https://i.postimg.cc/Hk5Jznr2/Glock.png", w: 60 },
            { n: "USP-S ИЗВИЛИНЫ", p: 666, img: "https://i.postimg.cc/HL5phv0W/aaaaa.png", w: 30 },
            { n: "АКР ТУННЕЛЬНЫЕ ТВАРИ", p: 9999, img: "https://i.postimg.cc/3NW96mG1/AK.png", w: 8 },
            { n: "BUTTERFLY | EMERALD", p: 50000, img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", w: 2 }
        ];

        let bal = 0;
        let selectedForUpgrade = null;

        // --- AUTH & DATABASE ---
        const firebaseConfig = { 
            apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
            authDomain: "babysell-8b37b.firebaseapp.com", 
            projectId: "babysell-8b37b", 
            databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
            appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid + '/balance').on('value', s => {
                    bal = s.val() || 0;
                    document.getElementById('u-balance').innerText = bal.toLocaleString();
                    updateUpgradeChance();
                });
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('u-pic').src = user.photoURL;
            }
        });

        window.googleAuth = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());

        // --- NAVIGATION ---
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).style.display = 'flex';
            if(id === 'screen-cases') document.getElementById('nav-cases').classList.add('active');
            if(id === 'screen-upgrade') document.getElementById('nav-upgrade').classList.add('active');
        };

        window.openPreview = (name, img) => {
            document.getElementById('preview-name').innerText = name;
            document.getElementById('preview-img').src = img;
            showScreen('screen-preview');
        };

        // --- ROULETTE ---
        window.startSpin = () => {
            if (bal < 500) return alert("Мало бабок!");
            db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c - 500);
            showScreen('screen-roulette');
            
            const track = document.getElementById('track');
            track.innerHTML = '';
            
            // Weighted Random
            const getWinItem = () => {
                let r = Math.random() * 100;
                let sum = 0;
                for(let item of LOOT) {
                    sum += item.w;
                    if(r <= sum) return item;
                }
                return LOOT[0];
            };

            const winItem = getWinItem();
            const winIndex = 35;

            for (let i = 0; i < 45; i++) {
                const item = (i === winIndex) ? winItem : LOOT[Math.floor(Math.random() * LOOT.length)];
                const div = document.createElement('div');
                div.innerHTML = `<img src="${item.img}">`;
                track.appendChild(div);
            }

            setTimeout(() => {
                track.style.transition = 'transform 7s cubic-bezier(0.15, 0, 0.05, 1)';
                track.style.transform = `translateX(-${(winIndex * 160) - 320}px)`;
            }, 50);

            setTimeout(() => {
                db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c + winItem.p);
                selectedForUpgrade = winItem; // Авто-выбор для апгрейда
                document.getElementById('up-current').innerHTML = `<img src="${winItem.img}"><span>${winItem.n}</span>`;
                
                document.getElementById('win-cnt').innerHTML = `
                    <img src="${winItem.img}" width="200">
                    <h2 style="color:var(--main)">${winItem.n}</h2>
                    <button class="btn" onclick="document.getElementById('win-modal').style.display='none'; showScreen('screen-cases')">ЗАБРАТЬ</button>
                `;
                document.getElementById('win-modal').style.display = 'flex';
            }, 7500);
        };

        // --- UPGRADE LOGIC ---
        function updateUpgradeChance() {
            if(!selectedForUpgrade) return;
            let targetP = 50000; // Butterfly
            let chance = Math.min(((selectedForUpgrade.p + (bal * 0.1)) / targetP) * 100, 80).toFixed(1);
            document.getElementById('chance-val').innerText = chance + "%";
            document.getElementById('chance-fill').style.background = `conic-gradient(var(--main) ${chance}%, transparent 0%)`;
        }

        window.startUpgrade = () => {
            if(!selectedForUpgrade) return alert("Сначала выбей скин!");
            let chance = parseFloat(document.getElementById('chance-val').innerText);
            let win = Math.random() * 100 <= chance;
            
            if(win) {
                db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c + 50000);
                alert("ИМБА! ТЫ ПОВЫСИЛ ДО БАБОЧКИ!");
            } else {
                alert("ЛУЗЕР! СКИН СГОРЕЛ!");
                selectedForUpgrade = null;
                document.getElementById('up-current').innerHTML = '<span style="color:#444;">SELECT SKIN</span>';
            }
            updateUpgradeChance();
        };

        // --- TIMER ---
        let unlockTime = localStorage.getItem('unlockTime') || Date.now() + (13*3600*1000 + 19*60*1000);
        localStorage.setItem('unlockTime', unlockTime);
        setInterval(() => {
            let dist = unlockTime - Date.now();
            if(dist < 0) {
                document.getElementById('case-lucky').classList.remove('locked');
                document.getElementById('timer').innerText = "OPEN!";
            } else {
                let h = Math.floor(dist/3600000), m = Math.floor((dist%3600000)/60000), s = Math.floor((dist%60000)/1000);
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }
        }, 1000);

        // Music Trigger
        document.body.onclick = () => { document.getElementById('bg-music').play().catch(()=>{}); };
        particlesJS("particles-js", { particles: { number: { value: 30 }, color: { value: "#00ffaa" }, opacity: { value: 0.1 }, move: { speed: 1 } } });
    </script>
</body>
</html>
