<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - EVENT UPDATE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); 
            --error: #ff3366; --rare: #4b69ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 30px; height: 70px; background: #000; border-bottom: 1px solid #111; position: sticky; top: 0; z-index: 1000; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        #u-pic { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--main); }
        .balance-display { font-family: 'Orbitron'; color: var(--main); font-size: 16px; }

        /* NAVIGATION */
        .nav-bar { display: flex; justify-content: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid #111; }
        .nav-btn { background: #111; border: 1px solid #222; color: #666; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s; }
        .nav-btn.active { border-color: var(--main); color: var(--main); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; padding-bottom: 50px; }

        .page { display: none; animation: fadeIn 0.3s forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* EVENT SECTION (NEW) */
        .event-card { position: relative; width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid #222; margin-bottom: 30px; }
        .event-img-container { position: relative; width: 100%; line-height: 0; }
        .event-img { width: 100%; height: auto; display: block; }
        /* VIGNETTE EFFECT */
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 100px 20px rgba(0,0,0,0.9); pointer-events: none; }
        
        .event-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); text-align: center; }

        /* BUTTONS */
        .btn { background: var(--main); color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { box-shadow: 0 0 15px var(--main); transform: scale(1.02); }
        .btn.joined { background: #222; color: #555; cursor: default; box-shadow: none; }

        /* CASE GRID */
        .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .case-card { background: var(--glass); border: 1px solid #222; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; }
        .case-card img { width: 160px; }

        /* CAT SECTION */
        .cat-box { text-align: center; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid #111; }
        .cat-img { width: 220px; cursor: pointer; transition: 0.1s; border-radius: 15px; }
        .cat-img:active { transform: scale(0.95); }

        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 10000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 11px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div class="user-info">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <div>
            <div id="u-name" style="font-family:'Orbitron'; font-size: 11px;">GUEST</div>
            <div id="auth-area"></div>
        </div>
    </div>
    <div class="balance-display"><span id="balance">0</span> B</div>
</header>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="nav('cases', this)">CASES</button>
    <button class="nav-btn" onclick="nav('event', this)">EVENT</button>
    <button class="nav-btn" onclick="nav('cat', this)">NEURAL CAT</button>
    <button class="nav-btn" onclick="nav('promo', this)">PROMO</button>
</nav>

<div class="container">
    
    <section id="p-cases" class="page active">
        <div class="case-grid">
            <div class="case-card">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <div style="font-family:'Orbitron'; font-size:14px; margin-top:10px;">STREET NIGHTMARE</div>
                <div style="color:var(--main); margin-top:5px;">500 B</div>
            </div>
        </div>
    </section>

    <section id="p-event" class="page">
        <div class="event-card">
            <div class="event-img-container">
                <img src="https://i.postimg.cc/L62Pz0hc/ddne.png" class="event-img">
                <div class="vignette"></div>
            </div>
            <div class="event-overlay">
                <h2 style="font-family:'Orbitron'; margin-bottom: 10px; letter-spacing: 2px;">NEON DISTURBANCE</h2>
                <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;">Limited time event. Complete tasks to earn exclusive rewards.</p>
                <button class="btn" id="event-btn" onclick="joinEvent()">JOIN EVENT</button>
            </div>
        </div>
    </section>

    <section id="p-cat" class="page">
        <div class="cat-box">
            <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" class="cat-img" onclick="toast('MEOW!')">
            <h3 style="font-family:'Orbitron'; margin-top:15px;">NEURAL MINER</h3>
        </div>
    </section>

    <section id="p-promo" class="page" style="text-align:center;">
        <input type="text" id="promo-code" placeholder="CODE..." style="background:#000; border:1px solid #333; color:#fff; padding:12px; font-family:'Orbitron'; outline:none;">
        <button class="btn" onclick="toast('PROMO SYSTEM ONLINE')">REDEEM</button>
    </section>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    auth.onAuthStateChanged(user => {
        const authArea = document.getElementById('auth-area');
        if(user) {
            document.getElementById('u-name').innerText = user.displayName.toUpperCase();
            document.getElementById('u-pic').src = user.photoURL;
            authArea.innerHTML = `<button onclick="auth.signOut()" style="color:var(--error); background:none; border:none; cursor:pointer; font-size:10px;">[ LOGOUT ]</button>`;
            
            db.ref('users/'+user.uid+'/balance').on('value', s => {
                document.getElementById('balance').innerText = (s.val() || 0).toLocaleString();
            });
        } else {
            document.getElementById('u-name').innerText = "GUEST";
            authArea.innerHTML = `<button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())" style="color:var(--main); background:none; border:none; cursor:pointer; font-size:10px;">[ LOGIN ]</button>`;
        }
    });

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        el.classList.add('active');
    }

    function joinEvent() {
        if(!auth.currentUser) return toast("PLEASE LOGIN TO JOIN");
        const btn = document.getElementById('event-btn');
        btn.innerText = "JOINED";
        btn.classList.add('joined');
        btn.onclick = null;
        toast("SUCCESSFULLY JOINED THE EVENT!");
    }

    function toast(m) {
        const w = document.getElementById('notif');
        const n = document.createElement('div');
        n.className = 'toast';
        n.innerText = `> ${m}`;
        w.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
</script>
</body>
</html>
