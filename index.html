<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - MOTION BLUR EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { --main: #00ffaa; --bg: #010102; --glass: rgba(255, 255, 255, 0.03); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* WELCOME */
        #welcome-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .welcome-logo { font-family: 'Orbitron'; font-size: 50px; font-weight: 900; letter-spacing: 15px; color: #fff; text-shadow: 0 0 30px var(--main); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.5; transform: scale(0.95); } }

        /* MOTION BLUR & STRIP */
        .strip { 
            display: flex; position: absolute; left: 0; height: 100%; 
            transition: transform 8s cubic-bezier(0.1, 0, 0, 1); 
            will-change: transform, filter;
        }
        .blur-effect { filter: blur(4px); } /* Той самий Motion Blur */

        .view-window { 
            position: relative; width: 100%; height: 160px; background: #000; 
            margin: 25px 0; overflow: hidden; border: 1px solid #222; border-radius: 15px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
        }
        .view-window::after {
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(90deg, #000 0%, transparent 20%, transparent 80%, #000 100%);
            pointer-events: none; z-index: 5;
        }

        /* CARD ANIMATIONS */
        .case-card { 
            background: rgba(15, 15, 20, 0.7); padding: 40px; border-radius: 30px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardAppear 0.8s ease backwards;
        }
        @keyframes cardAppear { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        .case-card:hover { border-color: var(--main); transform: translateY(-15px) rotate(1deg); box-shadow: 0 20px 40px rgba(0, 255, 170, 0.15); }

        /* BUTTONS */
        .btn-nav { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 12px 24px; border-radius: 8px; font-family: 'Orbitron'; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }

        .app-content { opacity: 0; transition: 1.5s ease; }
        .app-loaded .app-content { opacity: 1; }

        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 20px var(--main); transform: translateX(-50%); }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-logo">BABYSELL</div>
    <button class="btn-nav" onclick="initApp()" style="margin-top: 30px;">ENTER SYSTEM</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3" type="audio/mpeg"></audio>
<audio id="case-open-sound"><source src="https://files.catbox.moe/7f3jzq.mp3" type="audio/mpeg"></audio>
<audio id="snd-tick"><source src="https://www.soundjay.com/buttons/sounds/button-50.mp3" type="audio/mpeg"></audio>

<div class="app-content">
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #222;">
        <div style="display: flex; gap: 15px;">
            <button class="btn-nav" onclick="showPage('market')">MARKET</button>
            <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
        </div>
        <h1 style="font-family: Orbitron; letter-spacing: 10px; font-size: 20px;">BABYSELL</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="u-bal" style="color: var(--main); font-family: Orbitron; font-weight: bold;">0 B</div>
            <button id="l-btn" class="btn-nav" onclick="login()">LOGIN</button>
            <div id="l-prof" style="display:none;"><img id="l-ava" src="" style="width:40px; border-radius:50%; border:2px solid var(--main);"></div>
        </div>
    </header>

    <div id="page-market" style="padding: 60px 20px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto;">
            <div class="case-card" onclick="openCaseModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width: 100%; max-width: 200px;">
                <h3 style="font-family: Orbitron; margin-top: 20px;">MYSTERIOUS NIGHTS</h3>
                <div style="color: var(--main); font-size: 24px; font-weight: bold; margin-top: 10px;">1,000 B</div>
            </div>
        </div>
    </div>

    <div id="page-inventory" style="display:none; padding: 50px;">
        <h2 style="font-family: Orbitron; color: var(--main); margin-bottom: 40px;">YOUR COLLECTION</h2>
        <div id="inv-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px;"></div>
    </div>
</div>

<div id="case-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
    <div style="width:90%; max-width:850px; background:#08080a; padding:60px; border-radius:40px; border:1px solid #222; text-align:center;">
        <h2 id="win-status" style="font-family: Orbitron; color: var(--main); letter-spacing: 5px; margin-bottom: 20px;">WAITING FOR SPIN...</h2>
        <div class="view-window">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:100%; height:65px; font-size:18px; font-weight:bold;" onclick="startSpin()">OPEN CASE</button>
        <p onclick="closeModals()" style="color:#444; margin-top:20px; cursor:pointer; font-family:Orbitron; font-size:12px;">CLOSE SYSTEM</p>
    </div>
</div>

<script>
    const music = document.getElementById('bg-music');
    const caseSound = document.getElementById('case-open-sound');
    const tickSound = document.getElementById('snd-tick');
    tickSound.volume = 0.08; // Зробив "тік-тік" дуже тихим

    function initApp() {
        music.volume = 0.2; music.play();
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.body.classList.add('app-loaded');
        }, 1200);
    }

    // --- FIREBASE (залиш свій конфиг) ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const HARDCORE_SKINS = [
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, chance: 70, color: "#4b69ff" },
        { name: "Desert Eagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, chance: 20, color: "#8847ff" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, chance: 8, color: "#d32ee6" },
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, chance: 2, color: "#ebca42" }
    ];

    let user = null, balance = 0, userInv = {};

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'block';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                userInv = s.val() || {};
                renderInventory();
            });
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function openCaseModal() {
        if(!user) return login();
        document.getElementById('case-modal').style.display = 'flex';
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.classList.remove('blur-effect');
        strip.innerHTML = "";
        for(let i=0; i<100; i++) {
            let s = HARDCORE_SKINS[Math.floor(Math.random()*HARDCORE_SKINS.length)];
            strip.innerHTML += `<div class="item" style="min-width:160px; opacity:0.5;"><img src="${s.img}" width="90"></div>`;
        }
    }

    function startSpin() {
        if(balance < 1000) return alert("NO BALANCE");
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;

        // Sound Logic
        music.volume = 0.05;
        caseSound.currentTime = 0;
        caseSound.volume = 0.4;
        caseSound.play();

        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        const win = getWin();
        const strip = document.getElementById('strip');
        
        // Add Motion Blur
        strip.classList.add('blur-effect');
        
        strip.children[85].innerHTML = `<img src="${win.img}" width="120" style="filter:drop-shadow(0 0 20px ${win.color})">`;
        strip.children[85].style.opacity = "1";

        const move = (85 * 160) - (document.querySelector('.view-window').offsetWidth / 2) + 80;
        strip.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.05, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        // Very quiet tick sounds
        for(let i=0; i<55; i++) {
            setTimeout(() => {
                if(document.getElementById('case-modal').style.display === 'flex') {
                    tickSound.cloneNode().play();
                }
            }, i * i * 2.8);
        }

        // Remove blur at the end
        setTimeout(() => strip.classList.remove('blur-effect'), 6000);

        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            document.getElementById('win-status').innerText = win.name.toUpperCase();
            document.getElementById('win-status').style.color = win.color;
            btn.disabled = false;
            music.volume = 0.2;
        }, 8200);
    }

    function getWin() {
        let r = Math.random() * 100, c = 0;
        for(let s of HARDCORE_SKINS) {
            c += s.chance; if(r <= c) return s;
        }
        return HARDCORE_SKINS[0];
    }

    function renderInventory() {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(userInv).reverse().forEach(id => {
            const i = userInv[id];
            g.innerHTML += `<div style="background:var(--glass); padding:20px; border-radius:20px; border-bottom:3px solid ${i.color}; text-align:center; animation: cardAppear 0.5s ease;">
                <img src="${i.img}" width="110"><br><b style="font-family:Orbitron; font-size:11px;">${i.name}</b><br>
                <button class="btn-nav" style="width:100%; margin-top:15px; font-size:10px;" onclick="sell('${id}',${i.price})">SELL ${i.price} B</button>
            </div>`;
        });
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function showPage(p) {
        document.getElementById('page-market').style.display = (p==='market') ? 'block' : 'none';
        document.getElementById('page-inventory').style.display = (p==='inventory') ? 'block' : 'none';
    }
    function closeModals() { 
        document.getElementById('case-modal').style.display = 'none'; 
        caseSound.pause();
        music.volume = 0.2;
    }
</script>
</body>
</html>
