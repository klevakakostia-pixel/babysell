<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - CAT MINING</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #08080a; --accent: #ff2d55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; opacity: 0; animation: fadeInPage 0.8s forwards; }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes catPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 20px var(--main)); } }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; height: 65px; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .btn-nav { 
            background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #888; 
            padding: 6px 12px; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); background: rgba(0,255,170,0.05); }

        .balance-card { border: 1px solid var(--main); padding: 4px 10px; border-radius: 4px; background: #000; }

        /* PAGES */
        .page { display: none; padding: 20px; animation: fadeInUp 0.5s ease-out; }
        .page.active { display: block; }

        /* EVENT BANNER with VIGNETTE */
        .event-mini-banner {
            max-width: 1000px; margin: 0 auto 30px; border-radius: 12px; height: 180px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            border: 1px solid #1a1a1a; position: relative; overflow: hidden;
        }
        .event-mini-banner::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* MARKET & CASE */
        .market-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .case-card {
            background: #0c0c0f; border: 1px solid #1a1a1a; border-radius: 15px; 
            padding: 20px; width: 220px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .case-card:hover { border-color: var(--main); transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0,255,170,0.1); }
        .case-card img { width: 120px; margin-bottom: 10px; }

        /* CAT MINER PAGE */
        .cat-page-content { text-align: center; padding-top: 50px; }
        .cat-img { 
            width: 250px; cursor: pointer; transition: 0.1s; 
            animation: catPulse 4s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0,255,170,0.2));
        }
        .cat-img:active { transform: scale(0.95); }

        /* STATUS LIST */
        .status-list { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; width: 180px; border: 1px solid #222; position: relative; z-index: 5; }
        .status-row { display: flex; justify-content: space-between; font-size: 9px; padding: 3px 0; border-bottom: 1px solid #111; }
        .dot-online { color: var(--main); font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #0a0a0c; border: 1px solid #222; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; }

        /* TOAST */
        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 11px; font-family: 'Orbitron'; animation: fadeInUp 0.3s; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div class="nav-left">
        <h2 style="font-family:'Orbitron'; color:var(--main); font-size: 16px; margin-right: 10px;">BABYSELL</h2>
        <button class="btn-nav active" id="btn-market" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" id="btn-inventory" onclick="showPage('inventory')">INVENTORY (<span id="inv-count">0</span>)</button>
        <button class="btn-nav" id="btn-miner" onclick="showPage('miner')">CAT MINER</button>
    </div>
    <div class="user-block">
        <div class="balance-card">
            <div id="u-bal" style="color:var(--main); font-weight:bold; font-size: 14px;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic" style="width:30px; height:30px; border-radius:4px;">
        <button id="l-btn" onclick="login()" style="background:var(--main); border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:9px; font-weight:bold;">LOGIN</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-mini-banner">
        <div style="position:relative; z-index:5;">
            <h1 style="font-family:'Orbitron'; font-size: 20px;">EMERALD SKIES</h1>
            <button class="btn-nav" style="background:var(--accent); color:#fff; border:none; margin-top:10px;" onclick="joinEvent()">JOIN NOW</button>
        </div>
        <div class="status-list">
            <div id="p-list"></div>
        </div>
    </div>
    <div class="market-grid">
        <div class="case-card" onclick="openCase()">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <div style="font-family:'Orbitron'; font-size:12px;">HARDCORE CASE</div>
            <div style="color:var(--main); font-weight:bold; font-size:16px;">1,000 B</div>
        </div>
    </div>
</div>

<div id="page-miner" class="page">
    <div class="cat-page-content">
        <h1 style="font-family:'Orbitron'; color:var(--main); margin-bottom: 20px;">CAT MINER CORE</h1>
        <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" class="cat-img" onclick="mineCat()">
        <p style="margin-top: 20px; color: #666; font-size: 12px; font-family: 'Orbitron';">CLICK THE CAT TO GENERATE POWER</p>
    </div>
</div>

<div id="page-inventory" class="page">
    <h2 style="font-family:'Orbitron'; margin-bottom: 20px; color: var(--main);">MY ITEMS</h2>
    <div id="inv-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px;"></div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box" style="max-width: 600px;">
        <h2 id="m-status" style="font-family:'Orbitron';">ROLLING...</h2>
        <div style="width:100%; height:120px; background:#000; margin:20px 0; overflow:hidden; position:relative; border:1px solid #222;">
            <div style="position:absolute; left:50%; top:0; width:2px; height:100%; background:var(--main); z-index:10;"></div>
            <div id="strip" style="display:flex; position:absolute; left:0; transition: 6s cubic-bezier(0.1, 0, 0.1, 1);"></div>
        </div>
        <button class="btn-nav" id="spin-btn" style="background:var(--main); color:#000; font-weight:bold; padding:10px 40px;" onclick="startSpin()">SPIN</button>
        <button onclick="closeModal()" style="display:block; margin:10px auto; background:none; border:none; color:#444; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let user = null, balance = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('u-pic').src = u.photoURL;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                const inv = s.val() || {};
                document.getElementById('inv-count').innerText = Object.keys(inv).length;
                renderInventory(inv);
            });
        }
    });

    db.ref('events/emerald/users').limitToLast(5).on('value', s => {
        const list = document.getElementById('p-list'); list.innerHTML = "";
        if(s.exists()) Object.values(s.val()).reverse().forEach(v => {
            list.innerHTML += `<div class="status-row"><span>${v.name}</span><span class="dot-online">ONLINE</span></div>`;
        });
    });

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(btn => btn.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('btn-' + p).classList.add('active');
    }

    function mineCat() { 
        if(!user) return toast("Login to mine!");
        toast("Meow! Energy generated!"); 
    }

    function toast(m) {
        const n = document.getElementById('notif');
        const t = document.createElement('div');
        t.className = 'toast'; t.innerText = "> " + m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function joinEvent() { if(user) db.ref('events/emerald/users/'+user.uid).set({ name: user.displayName.split(' ')[0] }); }

    // (Функції для кейсів openCase, startSpin, renderInventory залишаються такими ж, як в попередньому коді)
</script>
</body>
</html>
