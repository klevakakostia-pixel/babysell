<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - REALTIME EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #08080a; --accent: #ff2d55; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 30px; height: 65px; background: rgba(0,0,0,0.95); border-bottom: 1px solid #111; position: sticky; top: 0; z-index: 1000; }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #888; padding: 6px 12px; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); }
        .balance-card { border: 1px solid var(--main); padding: 4px 12px; border-radius: 4px; color: var(--main); font-family: 'Orbitron'; font-weight: bold; }

        /* EVENT */
        .event-mini-banner { max-width: 1000px; margin: 20px auto; border-radius: 12px; height: 180px; background: linear-gradient(90deg, #000 40%, transparent), url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border: 1px solid #1a1a1a; }
        .event-live-feed { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; width: 280px; height: 130px; overflow-y: hidden; font-size: 11px; border-left: 2px solid var(--main); }
        .feed-item { margin-bottom: 6px; border-bottom: 1px solid #111; padding-bottom: 2px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
        .feed-item b { color: var(--main); }

        /* PAGES */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .market-grid { display: flex; justify-content: center; gap: 20px; }
        .case-card { background: #0c0c0f; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; width: 220px; text-align: center; cursor: pointer; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .inv-item { background: #0c0c0f; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; }

        /* ADMIN */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0a0a0c; border: 1px solid #222; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; }
        .admin-input { background: #050505; border: 1px solid #222; color: var(--main); padding: 10px; width: 100%; margin-bottom: 10px; text-align: center; font-family: 'Orbitron'; outline: none; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .admin-footer { text-align: center; padding: 40px; }
        .admin-trigger-img { width: 130px; cursor: pointer; filter: grayscale(1) opacity(0.3); transition: 0.3s; }
        .admin-trigger-img:hover { filter: grayscale(0) opacity(1); transform: scale(1.05); }

        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 11px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:10px; align-items:center;">
        <h2 style="font-family:'Orbitron'; color:var(--main); font-size:16px; margin-right:15px;">BABYSELL</h2>
        <button class="btn-nav active" id="btn-market" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" id="btn-inventory" onclick="showPage('inventory')">INVENTORY (<span id="inv-count">0</span>)</button>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
        <div class="balance-card" id="u-bal">0 B</div>
        <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000; font-weight:bold;">LOGIN</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-mini-banner">
        <div>
            <h1 id="ev-title" style="font-family:'Orbitron'; color:var(--main);">EMERALD SKIES</h1>
            <button class="btn-nav" id="join-ev-btn" style="background:var(--main); color:#000; margin-top:10px; font-weight:bold;" onclick="joinEventReal()">JOIN EVENT</button>
        </div>
        <div class="event-live-feed" id="real-feed">
            <div style="color:#444; font-style:italic;">Waiting for real actions...</div>
        </div>
    </div>

    <div class="market-grid">
        <div class="case-card" onclick="openCase()">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width:130px;">
            <p style="font-family:'Orbitron'; margin-top:10px;">HARDCORE CASE</p>
            <b style="color:var(--main); font-size:18px;">1,000 B</b>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <div id="inv-grid" class="inv-grid"></div>
</div>

<div id="admin-auth-modal" class="modal">
    <div class="modal-box" style="border-color: var(--accent);">
        <h3 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:15px;">SYSTEM LOGIN</h3>
        <input type="text" id="adm-login" class="admin-input" placeholder="LOGIN">
        <input type="password" id="adm-pass" class="admin-input" placeholder="PASSWORD">
        <button class="btn-nav" style="width:100%; background:var(--accent); color:#fff;" onclick="checkAdminAuth()">ACCESS TERMINAL</button>
    </div>
</div>

<div id="admin-panel-modal" class="modal">
    <div class="modal-box" style="max-width: 500px; border-color: var(--main);">
        <h2 style="font-family:'Orbitron'; color:var(--main);">CONTROL PANEL</h2>
        
        <div style="margin-top:15px; text-align:left;">
            <p style="font-size:10px; color:#666;">ECONOMY:</p>
            <div class="admin-grid">
                <button class="btn-nav" onclick="addMoney(100000)">+100,000 B</button>
                <button class="btn-nav" style="border-color:var(--accent);" onclick="resetBalance()">RESET BALANCE</button>
            </div>
        </div>

        <div style="margin-top:15px; text-align:left;">
            <p style="font-size:10px; color:#666;">ITEMS (GIVE TO SELF):</p>
            <div class="admin-grid" id="admin-items"></div>
        </div>

        <div style="margin-top:15px; border-top:1px solid #222; padding-top:15px;">
            <p style="font-size:10px; color:var(--accent); font-weight:bold;">EVENT MANAGEMENT:</p>
            <button class="btn-nav" style="width:100%; background:var(--accent); color:#fff; margin-top:5px;" onclick="finishEventReal()">END EVENT & PAY 6666 B</button>
        </div>

        <button class="btn-nav" style="width:100%; margin-top:20px;" onclick="closeAdmin()">EXIT</button>
    </div>
</div>

<footer class="admin-footer">
    <img src="https://i.postimg.cc/pLrKrWW0/fyvfyv.png" class="admin-trigger-img" onclick="openAdminAuth()">
</footer>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", price: 15000 },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", price: 1200 },
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150 }
    ];

    let user = null, balance = 0, lastWinnerID = null;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                renderInventory(s.val() || {});
                document.getElementById('inv-count').innerText = Object.keys(s.val() || {}).length;
            });
            // Слухаємо реальний фід івенту
            db.ref('real_event_feed').limitToLast(6).on('value', s => {
                const feed = document.getElementById('real-feed');
                feed.innerHTML = "";
                s.forEach(child => {
                    const d = child.val();
                    feed.innerHTML = `<div class="feed-item"><b>${d.name}</b> ${d.msg}</div>` + feed.innerHTML;
                    if(d.uid) lastWinnerID = d.uid;
                });
            });
        }
    });

    // --- РЕАЛЬНІ ДІЇ ---
    function joinEventReal() {
        if(!user) return toast("Login first!");
        db.ref('real_event_feed').push({
            name: user.displayName.split(' ')[0],
            msg: "joined the event!",
            uid: user.uid
        });
        toast("Joined!");
    }

    function openCase() {
        if(!user) return toast("Login first!");
        if(balance < 1000) return toast("Need 1,000 B");
        
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);
        const win = SKINS[Math.floor(Math.random()*SKINS.length)];
        db.ref('users/'+user.uid+'/inventory').push(win);
        
        // Відразу в реальний фід
        db.ref('real_event_feed').push({
            name: user.displayName.split(' ')[0],
            msg: `won ${win.name}!`,
            uid: user.uid
        });
        toast("Won: " + win.name);
    }

    // --- ПОВНА АДМІНКА ---
    function openAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'flex'; }
    function checkAdminAuth() {
        if(document.getElementById('adm-login').value === "BabyIceFace666" && document.getElementById('adm-pass').value === "kov6alex666") {
            document.getElementById('admin-auth-modal').style.display = 'none';
            document.getElementById('admin-panel-modal').style.display = 'flex';
            loadAdminItems();
        } else { toast("DENIED"); }
    }

    function addMoney(val) { if(user) db.ref('users/'+user.uid+'/balance').set(balance + val); }
    function resetBalance() { if(user) db.ref('users/'+user.uid+'/balance').set(0); }
    
    function loadAdminItems() {
        const container = document.getElementById('admin-items');
        container.innerHTML = "";
        SKINS.forEach((s, i) => {
            container.innerHTML += `<button class="btn-nav" onclick="giveItem(${i})">${s.name}</button>`;
        });
    }
    function giveItem(i) { if(user) db.ref('users/'+user.uid+'/inventory').push(SKINS[i]); toast("Given!"); }

    function finishEventReal() {
        if(!lastWinnerID) return toast("No active users in feed!");
        // Виплата 6666 B
        db.ref('users/'+lastWinnerID+'/balance').transaction(c => (c || 0) + 6666);
        db.ref('real_event_feed').push({ name: "SYSTEM", msg: "EVENT CLOSED. Prize 6666 B sent to winner!" });
        toast("Prize distributed!");
        closeAdmin();
    }

    // UI Helpers
    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('btn-'+p).classList.add('active');
    }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeAdmin() { document.getElementById('admin-panel-modal').style.display = 'none'; }
    function renderInventory(inv) {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(inv).forEach(k => {
            g.innerHTML += `<div class="inv-item"><img src="${inv[k].img}" style="width:70px"><p>${inv[k].name}</p></div>`;
        });
    }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = "> " + m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
