<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - LEGENDARY</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');
        
        :root { 
            --main: #00ffaa; 
            --bg: #050508; 
            --card: rgba(255, 255, 255, 0.03); 
            --error: #ff4444; 
            --panel: rgba(0, 0, 0, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            background-image: radial-gradient(circle at 50% -20%, #1a3a2f 0%, var(--bg) 80%);
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- НОВИЙ ІНТЕРФЕЙС ХЕДЕРА --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; background: var(--panel);
            border-bottom: 2px solid var(--main); box-shadow: 0 5px 20px rgba(0,255,170,0.2);
            position: sticky; top: 0; z-index: 1000; height: 80px;
        }

        .user-block { display: flex; align-items: center; gap: 20px; }
        
        .avatar-wrapper {
            position: relative; width: 55px; height: 55px;
            border: 2px solid var(--main); border-radius: 12px;
            padding: 3px; background: #000; box-shadow: 0 0 15px var(--main);
        }
        #u-pic { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }

        .user-info { display: flex; flex-direction: column; }
        #u-name { font-family: 'Orbitron'; font-size: 14px; color: #fff; letter-spacing: 1px; }
        .status { font-size: 10px; color: var(--main); text-transform: uppercase; }

        .promo-panel {
            display: flex; background: #111; border: 1px solid #333;
            border-radius: 8px; overflow: hidden; height: 40px; transition: 0.3s;
        }
        .promo-panel:focus-within { border-color: var(--main); box-shadow: 0 0 10px var(--main); }
        .promo-panel input {
            background: none; border: none; color: #fff; padding: 0 15px;
            font-family: 'Orbitron'; font-size: 12px; outline: none; width: 140px;
        }
        .promo-btn {
            background: var(--main); color: #000; border: none; padding: 0 20px;
            font-family: 'Orbitron'; font-size: 12px; font-weight: bold; cursor: pointer;
        }

        .balance-display {
            background: linear-gradient(90deg, #111, #000);
            border: 1px solid var(--main); padding: 5px 20px; border-radius: 8px;
            font-family: 'Orbitron'; text-align: right; min-width: 120px;
        }
        .bal-label { font-size: 9px; color: var(--main); display: block; }
        #balance { font-size: 18px; color: #fff; text-shadow: 0 0 10px var(--main); }

        /* --- КЕЙСИ ТА ЛАНЦЮГИ --- */
        .container { max-width: 1200px; margin: 40px auto; text-align: center; }
        
        .locked-wrapper { position: relative; width: 300px; display: inline-block; margin: 20px; }
        .case-card { 
            width: 300px; padding: 25px; background: var(--card); 
            border: 1px solid #222; border-radius: 20px; cursor: pointer; transition: 0.4s;
        }
        .case-card:hover:not(.locked) { border-color: var(--main); transform: translateY(-10px); }

        /* Анімація ланцюгів 2D */
        .chains-x {
            position: absolute; inset: 0; z-index: 10; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        .chain-line {
            position: absolute; width: 140%; height: 35px;
            background: repeating-linear-gradient(90deg, #333 0, #111 10px, #444 20px);
            border: 2px solid #000; box-shadow: 0 0 15px #000;
        }
        .line-1 { transform: rotate(45deg); }
        .line-2 { transform: rotate(-45deg); }
        
        .lock-core {
            position: absolute; width: 80px; height: 80px; background: #000;
            border: 3px solid var(--error); border-radius: 15px; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--error); animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 35px var(--error); } }

        /* ПОВІДОМЛЕННЯ */
        #notify-box { position: fixed; top: 90px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .notify { background: rgba(0,0,0,0.9); border: 1px solid var(--main); padding: 15px 25px; border-radius: 8px; font-family: 'Orbitron'; color: var(--main); animation: slideIn 0.3s ease forwards; }
        .notify.error { border-color: var(--error); color: var(--error); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .btn { background: var(--main); color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        
        .roulette-container { position: relative; width: 100%; max-width: 900px; height: 180px; margin: 30px auto; background: #0a0a0c; border: 2px solid #222; overflow: hidden; border-radius: 15px; display: none; }
        .track { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 7s cubic-bezier(0.1, 0, 0.05, 1); }
        .track div { min-width: 150px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #111; }
        .track div img { width: 110px; }
    </style>
</head>
<body>

<div id="notify-box"></div>
<audio id="bg-music" loop src="https://files.catbox.moe/sv6xxw.mp3"></audio>
<audio id="sound-success" src="https://files.catbox.moe/mr870z.mp3"></audio>
<audio id="sound-fail" src="https://files.catbox.moe/ztzyet.mp3"></audio>

<header class="header">
    <div class="user-block">
        <div class="avatar-wrapper">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        </div>
        <div class="user-info">
            <span id="u-name">GUEST_USER</span>
            <span class="status">● Online</span>
        </div>
    </div>

    <div style="display: flex; gap: 20px; align-items: center;">
        <div class="promo-panel">
            <input type="text" id="promo-in" placeholder="ENTER PROMO">
            <button class="promo-btn" onclick="applyPromo()">OK</button>
        </div>

        <div class="balance-display">
            <span class="bal-label">AVAILABLE BALANCE</span>
            <span id="balance">0</span> <span style="color:var(--main); font-size: 12px;">B</span>
        </div>
        
        <button id="login" class="btn" onclick="googleLogin()">LOGIN</button>
    </div>
</header>

<div class="container">
    <div id="case-selection">
        <div class="case-card" onclick="selectCase('УЛИЧНЫЕ КОШМАРЫ')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width: 100%;">
            <h3 style="font-family:'Orbitron'; margin-top:15px;">УЛИЧНЫЕ КОШМАРЫ</h3>
            <p style="color:var(--main); font-family:'Orbitron';">500 B</p>
        </div>

        <div class="locked-wrapper">
            <div class="chains-x">
                <div class="chain-line line-1"></div>
                <div class="chain-line line-2"></div>
                <div class="lock-core"><span style="font-size: 40px;">🔒</span></div>
            </div>
            <div class="case-card" style="filter: grayscale(1) opacity(0.3);">
                <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png" style="width: 100%;">
                <h3 style="font-family:'Orbitron'; margin-top:15px;">НАВЕРНОЕ ПОВЕЗЕТ</h3>
                <p id="timer" style="color:var(--error); font-family:'Orbitron';">LOCKED</p>
            </div>
        </div>
    </div>

    <div id="roulette-screen" style="display:none; flex-direction:column; align-items:center;">
        <h2 id="case-title" style="font-family:'Orbitron'; margin-bottom:20px;"></h2>
        <div class="roulette-container" id="roulette" style="display:block;">
            <div class="track" id="track"></div>
        </div>
        <button class="btn" id="spin-btn" onclick="spin()" style="padding: 20px 60px; font-size: 18px;">ОТКРЫТЬ КЕЙС</button>
    </div>

    <div class="inventory" style="margin-top: 50px;">
        <h2 style="font-family:'Orbitron'; margin-bottom:20px;">INVENTORY</h2>
        <div id="inv-grid" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;"></div>
    </div>
</div>

<script>
    // --- ДАНІ ТА КОНФІГ (Ті самі) ---
    const LOOT = [
        { n: "GLOCK-18", p: 100, img: "https://i.postimg.cc/Hk5Jznr2/Glock.png", w: 60 },
        { n: "USP-S", p: 666, img: "https://i.postimg.cc/HL5phv0W/aaaaa.png", w: 30 },
        { n: "AK-47", p: 9999, img: "https://i.postimg.cc/3NW96mG1/AK.png", w: 8 },
        { n: "BUTTERFLY", p: 50000, img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", w: 2 }
    ];

    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();
    let balance = 0;

    function showNotify(text, isError = false) {
        const box = document.getElementById('notify-box');
        const n = document.createElement('div');
        n.className = 'notify' + (isError ? ' error' : '');
        n.innerText = text;
        box.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('u-pic').src = user.photoURL;
            document.getElementById('u-name').innerText = user.displayName.toUpperCase();
            db.ref('users/' + user.uid + '/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('balance').innerText = balance.toLocaleString();
            });
            updateInventoryUI();
            document.body.onclick = () => { document.getElementById('bg-music').volume = 0.15; document.getElementById('bg-music').play().catch(()=>{}); };
        }
    });

    function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    function applyPromo() {
        if(!auth.currentUser) return showNotify("LOGIN FIRST!", true);
        const code = document.getElementById('promo-in').value.trim().toUpperCase();
        const sndS = document.getElementById('sound-success');
        const sndF = document.getElementById('sound-fail');
        sndS.volume = sndF.volume = 0.2;

        if(code === "START2026") {
            db.ref(`users/${auth.currentUser.uid}/promos/START2026`).once('value', s => {
                if(s.exists()) { sndF.play(); showNotify("ALREADY USED!", true); }
                else { 
                    db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => (c || 0) + 100);
                    db.ref(`users/${auth.currentUser.uid}/promos/START2026`).set(true);
                    sndS.play(); showNotify("SUCCESS! +100 B"); 
                }
            });
        } else {
            sndF.play(); showNotify("INVALID CODE", true);
        }
        document.getElementById('promo-in').value = '';
    }

    function selectCase(name) {
        document.getElementById('case-selection').style.display = 'none';
        document.getElementById('roulette-screen').style.display = 'flex';
        document.getElementById('case-title').innerText = name;
    }

    function spin() {
        if (balance < 500) return showNotify("NOT ENOUGH BALANCE", true);
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c - 500);

        const track = document.getElementById('track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        track.innerHTML = '';

        const winItem = LOOT[Math.random() > 0.9 ? 2 : (Math.random() > 0.98 ? 3 : Math.floor(Math.random()*2))];

        for(let i=0; i<60; i++) {
            const item = (i === 50) ? winItem : LOOT[Math.floor(Math.random()*LOOT.length)];
            const d = document.createElement('div');
            d.innerHTML = `<img src="${item.img}">`;
            track.appendChild(d);
        }

        setTimeout(() => {
            track.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.05, 1)';
            const x = (50 * 150) - (document.getElementById('roulette').offsetWidth / 2) + 75;
            track.style.transform = `translateX(-${x}px)`;
        }, 50);

        setTimeout(() => {
            db.ref(`users/${auth.currentUser.uid}/inventory`).push(winItem);
            showNotify("YOU GOT: " + winItem.n);
            btn.disabled = false;
            updateInventoryUI();
        }, 7200);
    }

    function updateInventoryUI() {
        if(!auth.currentUser) return;
        db.ref(`users/${auth.currentUser.uid}/inventory`).on('value', s => {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            s.forEach(child => {
                const item = child.val();
                grid.innerHTML += `<div style="background:#111; padding:10px; border-radius:10px; border:1px solid #222; text-align:center; width:140px;">
                    <img src="${item.img}" width="80"><br><small>${item.n}</small><br>
                    <button onclick="sellItem('${child.key}', ${item.p})" style="background:var(--main); border:none; padding:3px 10px; border-radius:3px; font-weight:bold; cursor:pointer; font-size:10px; margin-top:5px;">SELL ${item.p}</button>
                </div>`;
            });
        });
    }

    function sellItem(key, price) {
        db.ref(`users/${auth.currentUser.uid}/inventory/${key}`).remove();
        db.ref(`users/${auth.currentUser.uid}/balance`).transaction(c => c + price);
        showNotify("ITEM SOLD!");
    }

    // Timer
    const unlockDate = Date.now() + (13*3600 + 19*60)*1000;
    setInterval(() => {
        let diff = unlockDate - Date.now();
        if(diff < 0) { document.getElementById('timer').innerText = "AVAILABLE"; return; }
        let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('timer').innerText = `LOCKED ${h}:${m}:${s}`;
    }, 1000);
</script>
</body>
</html>
