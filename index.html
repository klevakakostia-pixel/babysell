<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - HYPER ELITE V5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; 
            --bg: #050507; 
            --accent: #ff2d55; 
            --glass: rgba(255, 255, 255, 0.03);
            --panel: rgba(15, 15, 20, 0.95);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #050507);
        }

        /* ANIMATIONS */
        @keyframes pageIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes itemScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes scanline { 0% { top: -100%; } 100% { top: 100%; } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px var(--main); } 50% { box-shadow: 0 0 20px var(--main); } 100% { box-shadow: 0 0 5px var(--main); } }

        /* UI */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 85px; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-nav { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 12px 24px; border-radius: 8px; 
            font-family: 'Orbitron'; font-size: 11px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); box-shadow: 0 0 15px rgba(0,255,170,0.2); }

        .page { display: none; padding: 40px; animation: pageIn 0.6s ease-out forwards; }
        .page.active { display: block; }

        /* EVENT */
        .event-banner {
            max-width: 1100px; margin: 0 auto 40px; height: 200px;
            background: linear-gradient(90deg, #000 40%, transparent), url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover;
            border-radius: 20px; border: 1px solid rgba(0,255,170,0.1);
            display: flex; align-items: center; padding: 0 60px; justify-content: space-between;
            position: relative; overflow: hidden;
        }
        .event-banner::after { content: ""; position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: linear-gradient(transparent, rgba(0,255,170,0.05)); pointer-events: none; }

        .feed-box { background: rgba(0,0,0,0.7); width: 280px; height: 130px; border-radius: 12px; padding: 15px; border-left: 3px solid var(--main); font-size: 12px; overflow: hidden; }

        /* MARKET & INV */
        .case-card {
            background: var(--panel); border: 1px solid #222; padding: 40px;
            border-radius: 30px; text-align: center; max-width: 300px; margin: 0 auto;
            transition: 0.4s; cursor: pointer;
        }
        .case-card:hover { transform: translateY(-10px); border-color: var(--main); }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 25px; }
        .inv-item { 
            background: var(--panel); border: 1px solid #1a1a1c; border-radius: 20px;
            padding: 20px; text-align: center; transition: 0.3s;
            animation: itemScale 0.5s backwards;
        }
        .inv-item:hover { border-color: var(--main); transform: scale(1.02); }
        .inv-item img { width: 100%; filter: drop-shadow(0 10px 15px #000); margin-bottom: 10px; }

        .btn-action { 
            width: 100%; padding: 10px; border-radius: 6px; border: none; font-family: 'Orbitron'; 
            font-size: 10px; cursor: pointer; transition: 0.2s; margin-top: 6px;
        }

        /* MODALS */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }
        .modal-box { 
            background: #0a0a0c; border: 1px solid #333; padding: 35px; border-radius: 25px;
            width: 90%; max-width: 550px; text-align: center; animation: pageIn 0.3s ease-out;
        }

        #notif { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: #000; border: 1px solid var(--main); padding: 15px 30px; margin-top: 10px; font-family: 'Orbitron'; animation: pageIn 0.3s forwards; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:15px;">
        <button class="btn-nav active" id="tab-market" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" id="tab-inventory" onclick="showPage('inventory')">INVENTORY</button>
    </div>
    <div style="display:flex; align-items:center; gap:25px;">
        <div id="u-bal" style="color:var(--main); font-family:'Orbitron'; font-size:20px; font-weight:bold;">0 B</div>
        <div id="u-prof" style="display:none; align-items:center; gap:12px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 30px; border: 1px solid #333;">
            <span id="u-name" style="font-family:'Orbitron'; font-size:11px; color:var(--main);">...</span>
            <img id="u-ava" src="" style="width:32px; height:32px; border-radius:50%; border:2px solid var(--main);">
        </div>
        <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000; font-weight:bold;">LOGIN</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-banner">
        <div>
            <h1 style="font-family:'Orbitron'; color:var(--main); font-size:35px; text-shadow: 0 0 15px rgba(0,255,170,0.4);">EMERALD SKIES</h1>
            <button id="join-ev-btn" class="btn-nav" style="margin-top:20px; background:var(--main); color:#000; font-weight:bold; padding:12px 35px;" onclick="joinEvent()">JOIN EVENT</button>
        </div>
        <div class="feed-box" id="ev-feed"></div>
    </div>

    <div class="case-card" onclick="openCaseModal()">
        <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png" style="width:180px; margin-bottom:20px;">
        <h2 style="font-family:'Orbitron';">HARDCORE CASE</h2>
        <div style="color:var(--main); font-size:26px; font-weight:bold; margin-top:10px;">1,000 B</div>
    </div>
</div>

<div id="page-inventory" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:35px;">
        <h2 style="font-family:'Orbitron'; color:var(--main); letter-spacing:2px;">COLLECTION</h2>
        <button class="btn-nav" style="background:var(--accent); color:#fff; border:none;" onclick="confirmSellAll()">SELL ALL SKINS</button>
    </div>
    <div id="inv-grid" class="inv-grid"></div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box">
        <h2 style="font-family:'Orbitron'; margin-bottom:25px; color:var(--main);">OPENING...</h2>
        <div style="position:relative; width:100%; height:140px; background:#000; overflow:hidden; border:1px solid #333; border-radius:15px;">
            <div style="position:absolute; left:50%; top:0; width:2px; height:100%; background:var(--main); z-index:10; box-shadow:0 0 15px var(--main);"></div>
            <div id="strip" style="display:flex; position:absolute; left:0; transition:6s cubic-bezier(0.1, 0, 0.1, 1);"></div>
        </div>
        <button id="spin-btn" class="btn-nav" style="width:100%; margin-top:25px; background:var(--main); color:#000; font-weight:bold; height:50px;" onclick="startSpin()">SPIN 1,000 B</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div id="confirm-modal" class="modal">
    <div class="modal-box" style="max-width:380px;">
        <h3 id="confirm-msg" style="font-family:'Orbitron'; margin-bottom:25px;">ARE YOU SURE?</h3>
        <div style="display:flex; gap:12px;">
            <button id="confirm-yes" class="btn-nav" style="flex:1; background:var(--main); color:#000;">CONFIRM</button>
            <button onclick="closeModals()" class="btn-nav" style="flex:1;">CANCEL</button>
        </div>
    </div>
</div>

<footer style="text-align:center; padding:100px 0; opacity:0.1;">
    <img src="https://i.postimg.cc/pLrKrWW0/fyvfyv.png" style="width:70px; cursor:pointer;" onclick="adminPanel()">
</footer>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", price: 15000, inspect: "steam://run/730//+csgo_econ_action_preview%20D9C97F7B2E4C63D8C15ADDF91CDDF1DFE9DAE10423772BDA9945DCB1D0A9DDF65DAA5A" },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", price: 1200, inspect: "https://steamcommunity.com/market/" },
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, inspect: "https://steamcommunity.com/market/" }
    ];

    let user = null, balance = 0, userInv = {}, myNick = "";

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('u-prof').style.display = 'flex';
            document.getElementById('u-ava').src = u.photoURL;
            
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });

            db.ref('users/'+u.uid+'/nick').on('value', s => {
                myNick = s.val() || u.displayName.split(' ')[0];
                document.getElementById('u-name').innerText = myNick.toUpperCase();
            });

            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                userInv = s.val() || {};
                renderInventory();
            });

            db.ref('event_participants/'+u.uid).on('value', s => {
                if(s.exists()) {
                    const btn = document.getElementById('join-ev-btn');
                    btn.innerText = "EVENT JOINED";
                    btn.disabled = true;
                    btn.style.opacity = "0.5";
                }
            });

            db.ref('global_feed').limitToLast(5).on('value', s => {
                const f = document.getElementById('ev-feed'); f.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    f.innerHTML = `<div style="margin-bottom:5px; border-bottom:1px solid #111; padding-bottom:3px;"><b>${d.nick}</b> ${d.msg}</div>` + f.innerHTML;
                });
            });
        }
    });

    // --- MARKET ---
    function openCaseModal() {
        if(!user) return login();
        document.getElementById('case-modal').style.display = 'flex';
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<80; i++) {
            const s = SKINS[Math.floor(Math.random()*SKINS.length)];
            strip.innerHTML += `<div style="min-width:140px; height:140px; display:flex; align-items:center; justify-content:center;"><img src="${s.img}" style="width:90px;"></div>`;
        }
    }

    function startSpin() {
        if(balance < 1000) return toast("INSUFFICIENT FUNDS");
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);

        const win = SKINS[Math.floor(Math.random()*SKINS.length)];
        const strip = document.getElementById('strip');
        strip.children[70].innerHTML = `<img src="${win.img}" style="width:90px;">`;
        
        const move = (70 * 140) - (document.getElementById('case-modal').offsetWidth / 2) + 70;
        strip.style.transition = '6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            db.ref('global_feed').push({ nick: myNick, msg: `won ${win.name}!` });
            toast("WON: " + win.name);
            document.getElementById('spin-btn').disabled = false;
        }, 6200);
    }

    // --- INVENTORY ---
    function renderInventory() {
        const grid = document.getElementById('inv-grid');
        grid.innerHTML = "";
        let delay = 0;
        Object.keys(userInv).forEach(id => {
            const item = userInv[id];
            grid.innerHTML += `
                <div class="inv-item" style="animation-delay: ${delay}s">
                    <img src="${item.img}">
                    <div style="font-family:'Orbitron'; font-size:11px; margin-bottom:10px;">${item.name}</div>
                    <button class="btn-action" style="background:#222; color:#fff;" onclick="window.location.href='${item.inspect}'">INSPECT</button>
                    <button class="btn-action" style="background:var(--accent); color:#fff;" onclick="confirmSell('${id}', ${item.price})">SELL ${item.price} B</button>
                </div>`;
            delay += 0.05;
        });
    }

    function confirmSell(id, pr) {
        document.getElementById('confirm-msg').innerText = `SELL THIS ITEM FOR ${pr} B?`;
        document.getElementById('confirm-modal').style.display = 'flex';
        document.getElementById('confirm-yes').onclick = () => {
            db.ref('users/'+user.uid+'/inventory/'+id).remove();
            db.ref('users/'+user.uid+'/balance').set(balance + pr);
            toast("ITEM SOLD"); closeModals();
        };
    }

    function confirmSellAll() {
        let total = 0;
        Object.values(userInv).forEach(i => total += i.price);
        if(total === 0) return toast("EMPTY INVENTORY");
        
        document.getElementById('confirm-msg').innerText = `SELL ALL FOR ${total} B?`;
        document.getElementById('confirm-modal').style.display = 'flex';
        document.getElementById('confirm-yes').onclick = () => {
            db.ref('users/'+user.uid+'/inventory').remove();
            db.ref('users/'+user.uid+'/balance').set(balance + total);
            toast("COLLECTION SOLD"); closeModals();
        };
    }

    // --- UTILS ---
    function joinEvent() {
        if(!user) return login();
        db.ref('event_participants/'+user.uid).set(true);
        db.ref('global_feed').push({ nick: myNick, msg: "joined the event!" });
        toast("SUCCESSFULLY JOINED");
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('tab-'+p).classList.add('active');
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    function adminPanel() {
        const p = prompt("ACCESS CODE:");
        if(p === "kov6alex666") {
            db.ref('users/'+user.uid+'/balance').set(balance + 100000);
            toast("ADMIN CASH ADDED");
        }
    }

    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = "> " + m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
