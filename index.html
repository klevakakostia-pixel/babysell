<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - PROMO UPDATE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #030305; --accent: #ff2d55; 
            --glass: rgba(255, 255, 255, 0.03);
            --rare-spec: #ebca42;
            --promo-gold: #ffd700;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; background-image: radial-gradient(circle at 50% 50%, rgba(0, 255, 170, 0.05) 0%, transparent 50%);
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; height: 90px; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,255,170,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron'; font-weight: 900; font-size: 26px;
            letter-spacing: 6px; color: #fff; text-shadow: 0 0 15px var(--main);
        }

        .user-zone { display: flex; align-items: center; gap: 15px; }
        .u-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--main); }
        .u-nick { font-family: 'Orbitron'; font-size: 11px; color: var(--main); }

        .btn-nav { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; padding: 10px 18px; border-radius: 8px; font-family: 'Orbitron'; 
            font-size: 11px; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); }

        .page { display: none; padding: 40px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .cases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        
        .case-card {
            background: #0a0a0c; padding: 40px; border-radius: 30px; text-align: center;
            border: 1px solid #222; transition: 0.4s; position: relative; overflow: hidden;
        }
        .case-card.active-case { cursor: pointer; }
        .case-card.active-case:hover { border-color: var(--main); transform: translateY(-5px); }
        .case-card img { width: 100%; max-width: 200px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* PROMO MODAL STYLES */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .promo-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--promo-gold); width: 350px; text-align: center; }
        .promo-input { background: #000; border: 1px solid #333; color: var(--promo-gold); padding: 15px; width: 100%; border-radius: 10px; margin: 20px 0; font-family: 'Orbitron'; text-align: center; font-size: 16px; }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .inv-card { background: var(--glass); border: 1px solid #222; border-radius: 15px; padding: 15px; text-align: center; }
        .inv-card img { width: 120px; margin-bottom: 8px; }

        #notif { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: #000; border: 1px solid var(--main); padding: 15px 30px; margin-top: 10px; font-family: 'Orbitron'; border-left: 5px solid var(--main); }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div style="display:flex; gap:10px;">
        <button class="btn-nav active" id="tab-market" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" id="tab-inventory" onclick="showPage('inventory')">INVENTORY</button>
    </div>

    <div class="logo-center">BABYSELL</div>

    <div class="user-zone">
        <button class="btn-nav" style="border-color:var(--promo-gold); color:var(--promo-gold);" onclick="openPromo()">PROMO</button>
        <div id="u-bal" style="color:var(--main); font-family:'Orbitron'; font-size:18px;">0 B</div>
        <button id="l-btn" onclick="login()" class="btn-nav" style="background:var(--main); color:#000;">LOGIN</button>
        <div id="l-prof" style="display:none; align-items:center; gap:10px;">
            <img id="l-ava" src="" class="u-avatar">
            <span id="l-nick" class="u-nick">...</span>
        </div>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="cases-grid">
        <div class="case-card active-case" onclick="openCaseModal('hardcore')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <h2 style="font-family:'Orbitron'; margin-top:10px; font-size:16px;">MYSTERIOUS NIGHTS</h2>
            <p style="color:var(--main); font-size:22px;">1,000 B</p>
        </div>
        <div class="case-card active-case" onclick="openCaseModal('ultra')">
            <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png">
            <h2 style="font-family:'Orbitron'; margin-top:10px; font-size:16px;">TARGETED NIGHTMARES</h2>
            <p style="color:var(--rare-spec); font-size:22px;">5,000 B</p>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <div id="inv-grid" class="inv-grid"></div>
</div>

<div id="promo-modal" class="modal">
    <div class="promo-content">
        <h2 style="font-family:'Orbitron'; color:var(--promo-gold);">REDEEM CODE</h2>
        <input type="text" id="promo-field" class="promo-input" placeholder="ENTER CODE HERE">
        <button class="btn-nav" style="width:100%; background:var(--promo-gold); color:#000;" onclick="redeemPromo()">ACTIVATE</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    let user = null, balance = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-prof').style.display = 'flex';
            document.getElementById('l-ava').src = u.photoURL;
            document.getElementById('l-nick').innerText = u.displayName.split(' ')[0];
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
        }
    });

    function openPromo() { if(!user) return login(); document.getElementById('promo-modal').style.display = 'flex'; }
    
    function redeemPromo() {
        const code = document.getElementById('promo-field').value.trim().toUpperCase();
        if(code === "START2026") {
            db.ref('users/'+user.uid+'/used_promos/'+code).once('value', s => {
                if(s.exists()) {
                    toast("ALREADY USED!");
                } else {
                    db.ref('users/'+user.uid+'/balance').set(balance + 100);
                    db.ref('users/'+user.uid+'/used_promos/'+code).set(true);
                    toast("SUCCESS! +100 B");
                    closeModals();
                }
            });
        } else {
            toast("INVALID CODE");
        }
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
    }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
