<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - ANIMATED & VIGNETTE EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #08080a; --accent: #ff2d55;
            --rarity-knife: #eb4b4b; --rarity-ak: #d32ee6; --rarity-usp: #00ffaa; --rarity-glock: #4b69ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; scroll-behavior: smooth; 
            opacity: 0; animation: fadeInPage 1s forwards;
        }

        /* --- GLOBAL ANIMATIONS --- */
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes catPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; height: 65px; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid #111; animation: fadeInDown 0.5s ease-out;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .btn-nav { 
            background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #888; 
            padding: 6px 12px; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); background: rgba(0,255,170,0.05); }

        .user-block { display: flex; align-items: center; gap: 10px; }
        .balance-card { background: #000; border: 1px solid var(--main); padding: 4px 10px; border-radius: 4px; }
        #u-pic { width:30px; height:30px; border-radius:4px; border: 1px solid #333; transition: 0.3s; }
        #u-pic:hover { transform: rotate(15deg) scale(1.1); border-color: var(--main); }

        /* PAGES */
        .page { display: none; padding: 20px; animation: fadeInUp 0.5s ease-out forwards; }
        .page.active { display: block; }

        /* EVENT BANNER with VIGNETTE */
        .event-mini-banner {
            max-width: 1000px; margin: 0 auto 30px; border-radius: 12px; height: 200px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover no-repeat;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            border: 1px solid #1a1a1a; position: relative; overflow: hidden;
        }
        /* Vignette Effect */
        .event-mini-banner::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 10%, transparent, rgba(0,0,0,0.9));
            box-shadow: inset 0 0 100px 30px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        
        /* MARKET GRID & CASE */
        .container { max-width: 1200px; margin: 0 auto; animation: fadeInUp 0.5s ease-out forwards; }
        .market-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; }
        .case-card {
            background: #0c0c0f; border: 1px solid #1a1a1a; border-radius: 15px; 
            padding: 20px; width: 220px; text-align: center; cursor: pointer; 
            transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); position: relative;
        }
        .case-card:hover { 
            border-color: var(--main); transform: translateY(-10px); 
            box-shadow: 0 10px 30px rgba(0,255,170,0.1); 
        }
        .case-card img { width: 120px; margin-bottom: 10px; transition: 0.4s; }
        .case-card:hover img { transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(0,255,170,0.2)); }

        /* CAT MINER */
        .cat-container { display: flex; flex-direction: column; align-items: center; margin-top: 40px; }
        .cat-img { 
            width: 180px; border-radius: 15px; cursor: pointer; transition: 0.1s; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            animation: catPulse 3s infinite;
        }
        .cat-img:active { transform: scale(0.9) rotate(5deg); }

        /* ONLINE STATUS */
        .status-list { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; width: 190px; border: 1px solid #222; position: relative; z-index: 2; }
        .status-row { display: flex; justify-content: space-between; font-size: 9px; padding: 3px 0; border-bottom: 1px solid #111; }
        .dot-online { color: var(--main); font-weight: bold; text-transform: uppercase; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* INVENTORY */
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .inv-item { background: #0c0c0f; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; position: relative; transition: 0.3s; }
        .inv-item:hover { border-color: var(--main); transform: translateY(-5px); }
        .inv-item img { width: 80px; transition: 0.3s; }
        .inv-item:hover img { transform: scale(1.1); }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #0a0a0c; border: 1px solid #222; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; animation: modalPop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28); }

        /* SELL CONFIRM */
        .confirm-title { font-family: 'Orbitron'; font-size: 14px; margin-bottom: 20px; letter-spacing: 1px; }
        .confirm-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-yes { background: var(--main); color: #000; border: none; padding: 8px 25px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; font-size: 11px; transition: 0.3s; }
        .btn-no { background: transparent; border: 1px solid #333; color: #888; padding: 8px 25px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; transition: 0.3s; }
        .btn-yes:hover { box-shadow: 0 0 15px var(--main); transform: translateY(-2px); }
        .btn-no:hover { border-color: #fff; color: #fff; }

        /* ROULETTE */
        .roulette-win { position: relative; width: 100%; height: 140px; background: #000; margin: 20px 0; overflow: hidden; border: 1px solid #111; }
        .strip { display: flex; position: absolute; left: 0; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #0a0a0a; }

        /* TOAST */
        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 11px; font-family: 'Orbitron'; animation: fadeInDown 0.3s reverse; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div class="nav-left">
        <h2 style="font-family:'Orbitron'; color:var(--main); font-size: 16px; margin-right: 10px;">BABYSELL</h2>
        <button class="btn-nav active" id="btn-market" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" id="btn-inventory" onclick="showPage('inventory')">INVENTORY (<span id="inv-count">0</span>)</button>
    </div>
    <div class="user-block">
        <div class="balance-card">
            <div id="u-bal" style="color:var(--main); font-weight:bold; font-size: 14px;">0 B</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic">
        <button id="l-btn" onclick="login()" style="background:var(--main); border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:9px; font-weight:bold;">LOGIN</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-mini-banner">
        <div style="position:relative; z-index:5;">
            <h1 style="font-family:'Orbitron'; font-size: 20px; color: #fff;">EMERALD SKIES EVENT</h1>
            <p style="font-size: 11px; color: #aaa; margin-bottom: 15px;">Register now to participate in the giveaway!</p>
            <button class="btn-nav" style="background:var(--accent); color:#fff; border:none; padding:8px 20px;" onclick="joinEvent()">JOIN EVENT</button>
        </div>
        <div class="status-list">
            <div style="font-size: 8px; color: #555; margin-bottom: 5px; font-family: 'Orbitron';">PARTICIPANTS</div>
            <div id="p-list"></div>
        </div>
    </div>

    <div class="container">
        <div class="market-grid">
            <div class="case-card" onclick="openCase()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <div style="font-family:'Orbitron'; font-size:12px;">HARDCORE CASE</div>
                <div style="color:var(--main); font-weight:bold; font-size:16px;">1,000 B</div>
            </div>
        </div>

        <div class="cat-container">
            <h3 style="font-family:'Orbitron'; color:var(--main); font-size: 14px; margin-bottom: 10px;">CAT MINER CORE</h3>
            <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" class="cat-img" onclick="mineCat()">
            <p style="font-size: 11px; color: #444; margin-top: 5px;">0.0001% chance for bonus</p>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <h2 style="font-family:'Orbitron'; margin-bottom: 20px; font-size: 18px; color: var(--main); text-shadow: 0 0 10px rgba(0,255,170,0.3);">MY COLLECTION</h2>
    <div class="inv-grid" id="inv-grid"></div>
</div>

<div id="sell-modal" class="modal">
    <div class="modal-box">
        <div id="sell-item-preview"></div>
        <div class="confirm-title">SELL ITEM FOR <span id="sell-price-text" style="color:var(--main)">0</span> B?</div>
        <div class="confirm-btns">
            <button class="btn-yes" id="confirm-sell-btn">YES, SELL</button>
            <button class="btn-no" onclick="closeSellModal()">CANCEL</button>
        </div>
    </div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box" style="max-width: 700px;">
        <h2 id="m-status" style="font-family:'Orbitron'; font-size: 16px;">ROLLING...</h2>
        <div class="roulette-win">
            <div style="position:absolute; left:50%; top:0; width:2px; height:100%; background:var(--main); z-index:10; box-shadow: 0 0 10px var(--main);"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button class="btn-nav" style="background:var(--main); color:#000; font-weight:bold; padding: 10px 30px;" id="spin-btn" onclick="startSpin()">SPIN</button>
        <button onclick="closeModal()" style="display:block; margin:15px auto 0; background:none; border:none; color:#444; cursor:pointer; font-size:10px;">CLOSE</button>
    </div>
</div>

<script>
    // Firebase Config (Keep existing)
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { id: 'knife', name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", color: "#eb4b4b", price: 15000 },
        { id: 'ak', name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", color: "#d32ee6", price: 1200 },
        { id: 'usp', name: "USP-S Cyber", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", color: "#00ffaa", price: 400 },
        { id: 'glock', name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", color: "#4b69ff", price: 150 }
    ];

    let user = null, balance = 0, pendingSell = null;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('u-pic').src = u.photoURL;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                const inv = s.val() || {};
                document.getElementById('inv-count').innerText = Object.keys(inv).length;
                renderInventory(inv);
            });
        }
    });

    // ONLINE STATUS (Keep existing)
    db.ref('events/emerald/users').limitToLast(5).on('value', s => {
        const list = document.getElementById('p-list'); list.innerHTML = "";
        if(s.exists()) Object.values(s.val()).reverse().forEach(v => {
            list.innerHTML += `<div class="status-row"><span>${v.name}</span><span class="dot-online">ONLINE</span></div>`;
        });
    });

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(btn => btn.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('btn-' + p).classList.add('active');
    }

    function renderInventory(inv) {
        const grid = document.getElementById('inv-grid'); grid.innerHTML = "";
        Object.keys(inv).forEach(key => {
            const item = inv[key];
            grid.innerHTML += `
                <div class="inv-item">
                    <img src="${item.img}">
                    <div style="font-size:10px; margin:5px 0;">${item.name}</div>
                    <button style="background:var(--accent); border:none; color:#fff; font-size:9px; padding:3px 8px; border-radius:3px; cursor:pointer;" onclick="openSellModal('${key}', ${item.price}, '${item.img}')">SELL ${item.price}B</button>
                    <div style="position:absolute; bottom:0; left:0; width:100%; height:3px; background:${item.color}; border-radius: 0 0 10px 10px;"></div>
                </div>`;
        });
    }

    // --- SELL LOGIC ---
    function openSellModal(key, price, img) {
        pendingSell = { key, price };
        document.getElementById('sell-price-text').innerText = price;
        document.getElementById('sell-item-preview').innerHTML = `<img src="${img}" style="width:100px; margin-bottom:15px; filter: drop-shadow(0 0 10px rgba(255,45,85,0.2))">`;
        document.getElementById('sell-modal').style.display = 'flex';
        
        document.getElementById('confirm-sell-btn').onclick = function() {
            if(pendingSell && user) {
                db.ref('users/'+user.uid+'/inventory/'+pendingSell.key).remove();
                db.ref('users/'+user.uid+'/balance').set(balance + pendingSell.price);
                closeSellModal();
                toast("Item sold successfully!");
            }
        };
    }

    function closeSellModal() { document.getElementById('sell-modal').style.display = 'none'; pendingSell = null; }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function joinEvent() { if(user) db.ref('events/emerald/users/'+user.uid).set({ name: user.displayName.split(' ')[0] }); }
    function mineCat() { if(user) toast("Meow! Core mining in progress..."); }

    function openCase() {
        if(!user) return alert("Login first!");
        if(balance < 1000) return alert("Need 1,000 B");
        document.getElementById('case-modal').style.display = 'flex';
        prepareRoulette();
    }

    function prepareRoulette() {
        const strip = document.getElementById('strip'); strip.style.transition = 'none'; strip.style.transform = 'translateX(0)'; strip.innerHTML = "";
        for(let i=0; i<80; i++) {
            const skin = SKINS[Math.floor(Math.random() * SKINS.length)];
            strip.innerHTML += `<div class="item"><img src="${skin.img}" style="width:90px"></div>`;
        }
    }

    function startSpin() {
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);
        let rand = Math.random() * 100;
        let winSkin = rand <= 0.01 ? SKINS[0] : (rand <= 1.01 ? SKINS[1] : (rand <= 31.01 ? SKINS[2] : SKINS[3]));
        const strip = document.getElementById('strip');
        const winIndex = 70;
        strip.getElementsByClassName('item')[winIndex].innerHTML = `<img src="${winSkin.img}" style="width:90px">`;
        const targetPos = (winIndex * 140) - (document.querySelector('.roulette-win').offsetWidth / 2) + 70;
        strip.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${targetPos}px)`;
        setTimeout(() => {
            const status = document.getElementById('m-status');
            status.innerText = "WIN: " + winSkin.name;
            status.style.color = winSkin.color;
            db.ref('users/'+user.uid+'/inventory').push(winSkin);
        }, 6200);
    }

    function closeModal() {
        document.getElementById('case-modal').style.display = 'none';
        document.getElementById('spin-btn').disabled = false;
        const status = document.getElementById('m-status');
        status.innerText = "ROLLING...";
        status.style.color = "#fff";
    }

    function toast(m) {
        const w = document.getElementById('notif');
        const n = document.createElement('div');
        n.className = 'toast';
        n.innerText = `> ${m}`;
        w.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
</script>
</body>
</html>
