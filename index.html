<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - PREMIUM EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { 
            --main: #00ffaa; --bg: #08080a; --accent: #ff2d55;
            --promo-ok: #00ffaa; --promo-err: #ff2d55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; opacity: 0; animation: fadeInPage 0.8s forwards; overflow-x: hidden; }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes clickShake { 0% { transform: scale(1); } 50% { transform: scale(0.92) rotate(2deg); } 100% { transform: scale(1); } }
        @keyframes balanceGlow { 0%, 100% { box-shadow: 0 0 5px rgba(0,255,170,0.2); } 50% { box-shadow: 0 0 15px rgba(0,255,170,0.5); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* HEADER */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; height: 65px; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #111;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .btn-nav { 
            background: rgba(255,255,255,0.03); border: 1px solid #1a1a1a; color: #888; 
            padding: 6px 12px; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover, .btn-nav.active { border-color: var(--main); color: var(--main); background: rgba(0,255,170,0.05); }

        .balance-card { border: 1px solid var(--main); padding: 4px 12px; border-radius: 4px; background: #000; font-family: 'Orbitron'; min-width: 90px; text-align: center; color: var(--main); font-weight: bold; animation: balanceGlow 3s infinite; }

        /* PAGES */
        .page { display: none; padding: 20px; animation: fadeInUp 0.5s ease-out; }
        .page.active { display: block; }

        /* EVENT BANNER */
        .event-mini-banner {
            max-width: 1000px; margin: 0 auto 30px; border-radius: 12px; height: 180px;
            background: url('https://i.postimg.cc/L62Pz0hc/ddne.png') center/cover;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            border: 1px solid #1a1a1a; position: relative; overflow: hidden;
        }
        .event-mini-banner::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        /* CAT MINER */
        .cat-img { width: 250px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 20px rgba(0,255,170,0.1)); }
        .cat-img:active { animation: clickShake 0.1s; }

        /* MARKET & INVENTORY */
        .market-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .case-card {
            background: #0c0c0f; border: 1px solid #1a1a1a; border-radius: 15px; 
            padding: 20px; width: 220px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .case-card:hover { transform: translateY(-5px); border-color: var(--main); }
        .case-card img { width: 120px; margin-bottom: 10px; }

        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .inv-item { background: #0c0c0f; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; position: relative; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #0a0a0c; border: 1px solid #222; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; animation: modalPop 0.3s forwards; }

        /* ROULETTE */
        .roulette-win { position: relative; width: 100%; height: 130px; background: #000; margin: 20px 0; overflow: hidden; border: 1px solid #222; }
        .strip { display: flex; position: absolute; left: 0; height: 100%; }
        .strip-item { min-width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #111; }
        .strip-item img { width: 80px; }

        /* PROMO */
        .promo-input { background: #000; border: 1px solid #333; color: var(--main); padding: 12px; width: 100%; border-radius: 5px; text-align: center; font-family: 'Orbitron'; margin-bottom: 15px; outline: none; }
        .promo-input.error { animation: shake 0.3s; border-color: var(--promo-err); }

        /* ADMIN SECTION */
        .admin-footer { margin-top: 100px; padding: 40px; text-align: center; border-top: 1px solid #111; }
        .btn-admin-open { background: none; border: 1px dashed #222; color: #222; padding: 8px 20px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; letter-spacing: 2px; }
        .admin-input { background: #050505; border: 1px solid #1a1a1a; color: var(--main); padding: 12px; margin-bottom: 12px; width: 100%; font-family: 'Orbitron'; outline: none; text-align: center; }

        /* TOAST */
        #notif { position: fixed; bottom: 20px; right: 20px; z-index: 5000; }
        .toast { background: #000; border: 1px solid var(--main); padding: 10px 20px; margin-top: 5px; font-size: 11px; font-family: 'Orbitron'; animation: fadeInUp 0.3s; }
    </style>
</head>
<body>

<div id="notif"></div>

<header class="header">
    <div class="nav-left">
        <h2 style="font-family:'Orbitron'; color:var(--main); font-size: 16px; margin-right: 10px;">BABYSELL</h2>
        <button class="btn-nav active" id="btn-market" onclick="showPage('market')">MARKET</button>
        <button class="btn-nav" id="btn-inventory" onclick="showPage('inventory')">INVENTORY (<span id="inv-count">0</span>)</button>
        <button class="btn-nav" id="btn-miner" onclick="showPage('miner')">CAT MINER</button>
        <button class="btn-nav" onclick="openPromoModal()" style="border-color: #ff9d00; color: #ff9d00;">PROMO</button>
    </div>
    <div class="user-block" style="display:flex; align-items:center; gap:10px;">
        <div class="balance-card" id="u-bal">0 B</div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="u-pic" style="width:30px; height:30px; border-radius:4px;">
        <button id="l-btn" onclick="login()" style="background:var(--main); border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:9px; font-weight:bold; color:#000;">LOGIN</button>
    </div>
</header>

<div id="page-market" class="page active">
    <div class="event-mini-banner">
        <div style="z-index:5;">
            <h1 style="font-family:'Orbitron'; font-size: 22px;">EMERALD SKIES</h1>
            <button class="btn-nav" style="background:var(--accent); color:#fff; border:none; margin-top:10px;" onclick="joinEvent()">JOIN EVENT</button>
        </div>
        <div id="p-list" style="background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; width: 160px; z-index: 5; font-size: 10px;"></div>
    </div>
    <div class="market-grid">
        <div class="case-card" onclick="openCase()">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <div style="font-family:'Orbitron'; font-size:12px;">HARDCORE CASE</div>
            <div style="color:var(--main); font-weight:bold; font-size:16px;">1,000 B</div>
        </div>
    </div>
</div>

<div id="page-miner" class="page">
    <div style="text-align:center; padding-top:50px;">
        <h1 style="font-family:'Orbitron'; color:var(--main); margin-bottom: 20px;">CAT MINER CORE</h1>
        <img src="https://i.postimg.cc/Fs5xJ0r7/FVIFV.png" class="cat-img" onclick="mineCat()">
        <p style="margin-top:20px; color:#444; font-family:'Orbitron'; font-size:11px;">CLICK TO MINE ENERGY</p>
    </div>
</div>

<div id="page-inventory" class="page">
    <h2 style="font-family:'Orbitron'; margin-bottom: 20px; color: var(--main);">MY ITEMS</h2>
    <div id="inv-grid" class="inv-grid"></div>
</div>

<div id="case-modal" class="modal">
    <div class="modal-box" style="max-width: 600px;">
        <h2 id="m-status" style="font-family:'Orbitron';">ROLLING...</h2>
        <div class="roulette-win">
            <div style="position:absolute; left:50%; top:0; width:2px; height:100%; background:var(--main); z-index:10; box-shadow: 0 0 10px var(--main);"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button class="btn-nav" id="spin-btn" style="background:var(--main); color:#000; font-weight:bold; padding:12px 50px;" onclick="startSpin()">SPIN</button>
        <button onclick="closeModal()" style="display:block; margin:15px auto 0; background:none; border:none; color:#444; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div id="promo-modal" class="modal">
    <div class="modal-box" style="max-width: 400px;">
        <h2 style="font-family:'Orbitron'; color: #ff9d00;">PROMOCODE</h2>
        <input type="text" id="promo-input" class="promo-input" placeholder="ENTER CODE">
        <button class="btn-nav" style="background:#ff9d00; color:#000; width: 100%; padding: 12px;" onclick="activatePromo()">ACTIVATE</button>
        <button onclick="closePromoModal()" style="display:block; margin:15px auto 0; background:none; border:none; color:#444; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div id="admin-auth-modal" class="modal">
    <div class="modal-box" style="max-width: 320px; border-color: var(--accent);">
        <h3 style="font-family:'Orbitron'; color:var(--accent); margin-bottom: 20px;">RESTRICTED ACCESS</h3>
        <input type="text" id="adm-login" class="admin-input" placeholder="USERNAME">
        <input type="password" id="adm-pass" class="admin-input" placeholder="PASSWORD">
        <button class="btn-nav" style="width:100%; background:var(--accent); color:#fff;" onclick="checkAdminAuth()">LOGIN</button>
        <button onclick="closeAdminAuth()" style="margin-top:10px; background:none; border:none; color:#444; cursor:pointer;">EXIT</button>
    </div>
</div>

<div id="admin-panel-modal" class="modal">
    <div class="modal-box" style="max-width: 400px; border-color: var(--main);">
        <h2 style="font-family:'Orbitron'; color:var(--main); margin-bottom: 20px;">ADMIN CORE</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-nav" onclick="addMoney(50000)">+50k B</button>
            <button class="btn-nav" onclick="addMoney(1000000)">+1M B</button>
            <button class="btn-nav" style="background:var(--accent); color:#fff;" onclick="resetBalance()">RESET BAL</button>
            <button class="btn-nav" onclick="closeAdminPanel()">CLOSE</button>
        </div>
    </div>
</div>

<footer class="admin-footer">
    <button class="btn-admin-open" onclick="openAdminAuth()">ADMIN TERMINAL</button>
</footer>

<script>
    // FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        projectId: "babysell-8b37b", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const SKINS = [
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", color: "#eb4b4b", price: 15000 },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", color: "#d32ee6", price: 1200 },
        { name: "USP-S Cyber", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", color: "#00ffaa", price: 400 },
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", color: "#4b69ff", price: 150 }
    ];

    const PROMOS = { "START2026": 100, "START": 5000, "FREE": 2000 };
    let user = null, balance = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('u-pic').src = u.photoURL;
            document.getElementById('l-btn').style.display = 'none';
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => {
                const inv = s.val() || {};
                document.getElementById('inv-count').innerText = Object.keys(inv).length;
                renderInventory(inv);
            });
        }
    });

    function showPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(btn => btn.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('btn-' + p).classList.add('active');
    }

    // CASE & ROULETTE
    function openCase() {
        if(!user) return toast("Login first!");
        if(balance < 1000) return toast("Need 1,000 B");
        document.getElementById('case-modal').style.display = 'flex';
        prepareRoulette();
    }

    function prepareRoulette() {
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)'; strip.innerHTML = "";
        for(let i=0; i<80; i++) {
            const s = SKINS[Math.floor(Math.random() * SKINS.length)];
            strip.innerHTML += `<div class="strip-item"><img src="${s.img}"></div>`;
        }
    }

    function startSpin() {
        if(balance < 1000) return;
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - 1000);
        let r = Math.random()*100, win;
        if(r <= 0.2) win = SKINS[0]; else if(r <= 3) win = SKINS[1]; else if(r <= 35) win = SKINS[2]; else win = SKINS[3];
        const strip = document.getElementById('strip');
        strip.children[70].innerHTML = `<img src="${win.img}">`;
        const pos = (70 * 130) - (document.querySelector('.roulette-win').offsetWidth / 2) + 65;
        strip.style.transition = '6s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(-${pos}px)`;
        setTimeout(() => {
            document.getElementById('m-status').innerText = "WON: " + win.name;
            db.ref('users/'+user.uid+'/inventory').push(win);
            toast("Won " + win.name);
        }, 6200);
    }

    // PROMO
    function openPromoModal() { document.getElementById('promo-modal').style.display = 'flex'; }
    function closePromoModal() { document.getElementById('promo-modal').style.display = 'none'; }
    function activatePromo() {
        if(!user) return toast("Login first!");
        const input = document.getElementById('promo-input'), code = input.value.toUpperCase();
        const errSnd = new Audio('https://files.catbox.moe/czo3o9.mp3'), okSnd = new Audio('https://files.catbox.moe/5nmsv9.mp3');
        if(PROMOS[code]) {
            db.ref('users/'+user.uid+'/used_promos/'+code).get().then(snap => {
                if(snap.exists()) { errSnd.play(); input.classList.add('error'); setTimeout(() => input.classList.remove('error'), 400); toast("Used!"); }
                else { okSnd.play(); db.ref('users/'+user.uid+'/balance').set(balance + PROMOS[code]); db.ref('users/'+user.uid+'/used_promos/'+code).set(true); toast("Success!"); closePromoModal(); }
            });
        } else { errSnd.play(); input.classList.add('error'); setTimeout(() => input.classList.remove('error'), 400); toast("Invalid!"); }
    }

    // ADMIN LOGIC
    function openAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'flex'; }
    function closeAdminAuth() { document.getElementById('admin-auth-modal').style.display = 'none'; }
    function checkAdminAuth() {
        if(document.getElementById('adm-login').value === "BabyIceFace666" && document.getElementById('adm-pass').value === "kov6alex666") {
            closeAdminAuth(); document.getElementById('admin-panel-modal').style.display = 'flex'; toast("ADMIN ACCESS GRANTED");
        } else { new Audio('https://files.catbox.moe/czo3o9.mp3').play(); toast("DENIED"); }
    }
    function closeAdminPanel() { document.getElementById('admin-panel-modal').style.display = 'none'; }
    function addMoney(a) { if(user) db.ref('users/'+user.uid+'/balance').set(balance + a); toast("+ " + a + " B"); }
    function resetBalance() { if(user) db.ref('users/'+user.uid+'/balance').set(0); toast("Reset Done"); }

    // INVENTORY
    function renderInventory(inv) {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        Object.keys(inv).forEach(k => {
            const i = inv[k];
            g.innerHTML += `<div class="inv-item">
                <img src="${i.img}" style="width:80px">
                <div style="font-size:10px; margin:5px 0;">${i.name}</div>
                <button class="btn-nav" style="background:var(--accent); color:#fff; border:none; width:100%;" onclick="sellItem('${k}', ${i.price})">SELL ${i.price}B</button>
            </div>`;
        });
    }
    function sellItem(k, p) { if(confirm("Sell for " + p + " B?")) { db.ref('users/'+user.uid+'/inventory/'+k).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); toast("Sold!"); } }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function mineCat() { toast("Meow! Energy +1"); }
    function closeModal() { document.getElementById('case-modal').style.display = 'none'; document.getElementById('spin-btn').disabled = false; document.getElementById('m-status').innerText = "ROLLING..."; }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = "> " + m;
        n.appendChild(t); setTimeout(() => t.remove(), 3000);
    }
</script>
</body>
</html>
