<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL 1.0 BETA</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root { --main: #ff9d00; --bg: #050212; --ease-hyper: cubic-bezier(0.15, 0.85, 0.25, 1); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; position: relative; min-height: 100vh; }
        #action-blocker { display: none; position: fixed; inset: 0; z-index: 99999; background: transparent; cursor: not-allowed; }
        .sunset-bg-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; background: linear-gradient(to bottom, #040110 0%, #110624 45%, #25092b 80%, #1f1105 100%); }
        .sunset-sun { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 240px; background: radial-gradient(circle, #ffb700 15%, #ff4500 100%); border-radius: 50%; box-shadow: 0 0 60px rgba(255, 69, 0, 0.5), 0 0 150px rgba(255, 183, 0, 0.2); animation: sunPulse 8s ease-in-out infinite alternate; }
        @keyframes sunPulse { from { transform: translate(-50%, -50%) scale(0.97); opacity: 0.85; } to { transform: translate(-50%, -50%) scale(1.03); opacity: 1; } }
        .waves { position: absolute; bottom: 0; left: 0; width: 100%; height: 15vh; min-height: 100px; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }
        #welcome-screen { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 2.5s var(--ease-hyper), visibility 2.5s; }
        .welcome-logo { font-family: 'Orbitron'; font-size: 60px; font-weight: 900; letter-spacing: 20px; text-shadow: 0 0 50px var(--main); animation: softGlow 4s infinite alternate; }
        @keyframes softGlow { from { opacity: 0.3; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .app-content { opacity: 0; filter: blur(20px); transform: scale(1.05); transition: all 2.5s var(--ease-hyper); z-index: 10; position: relative; }
        .app-loaded .app-content { opacity: 1; filter: blur(0); transform: scale(1); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 60px; height: 100px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,157,0,0.15); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); }
        
        /* Кнопки з хвилею тільки при наведенні */
        .btn-nav { position: relative; z-index: 1; overflow: hidden; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); color: #ccc; padding: 12px 25px; border-radius: 30px; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px; cursor: pointer; transition: 0.5s var(--ease-hyper); }
        .btn-nav::before { content: ""; position: absolute; top: 100%; left: 50%; width: 400px; height: 400px; margin-left: -200px; background: var(--main); border-radius: 40%; z-index: -1; transition: top 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-nav:hover:not(:disabled)::before { top: -100px; animation: btnWaveAnim 5s linear infinite; }
        .btn-nav:hover:not(:disabled) { color: #000; border-color: var(--main); box-shadow: 0 0 20px rgba(255,157,0,0.4); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
        @keyframes btnWaveAnim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .case-card { background: rgba(4,3,10,0.85); padding: 60px; border-radius: 40px; text-align: center; border: 1px solid rgba(255,157,0,0.1); transition: 1s var(--ease-hyper); cursor: pointer; }
        .case-card:hover { transform: translateY(-15px); border-color: var(--main); }
        .case-card img { width: 100%; max-width: 240px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }
        .view-window { position: relative; width: 100%; height: 280px; background: rgba(0,0,0,0.7); margin: 40px 0; overflow: hidden; border-radius: 30px; border: 1px solid rgba(255,157,0,0.15); }
        .strip { display: flex; position: absolute; left: 0; height: 100%; align-items: center; transition: transform 9s cubic-bezier(0.05, 0.7, 0.1, 1.0); }
        .pointer { position: absolute; left: 50%; top: -10px; bottom: -10px; width: 4px; background: linear-gradient(180deg, transparent, var(--main), transparent); z-index: 100; transform: translateX(-50%); border-radius: 5px; }
        .pointer::before { content: ''; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 20px solid var(--main); }
        .pointer::after { content: ''; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 20px solid var(--main); }
        .case-strip-item { min-width: 220px; height: 220px; margin: 0 10px; background: linear-gradient(180deg, rgba(18,12,28,0.7), rgba(4,2,8,0.9)); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upgrade-container { display: flex; justify-content: space-around; align-items: center; gap: 40px; padding: 40px; }
        .upgrade-slot { width: 300px; height: 350px; background: rgba(5,3,12,0.6); border: 2px dashed rgba(255,157,0,0.3); border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); }
        .upgrade-slot.active { border-style: solid; border-color: var(--main); }
        .upgrader-roulette { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(0,0,0,0.85); border: 2px solid rgba(255,157,0,0.2); }
        .upgrader-track { position: absolute; inset: 0; border-radius: 50%; transition: background 0.8s ease; }
        .upgrader-inner { position: absolute; inset: 15px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 2; }
        .upgrader-arrow-container { position: absolute; inset: -15px; z-index: 5; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .upgrader-arrow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #fff; }
        .water-wave { position: absolute; width: 400px; height: 400px; background: rgba(255, 157, 0, 0.35); border-radius: 38%; top: 100%; left: 50%; margin-left: -200px; animation: spinWave 6s linear infinite; transition: top 1s var(--ease-hyper); }
        @keyframes spinWave { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .chance-text { position: relative; z-index: 4; font-family: 'Orbitron'; font-size: 45px; color: #fff; font-weight: 900; }
        #product-modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        #product-modal-content { background: #0d0914; border: 1px solid var(--main); padding: 60px; border-radius: 40px; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

<div id="action-blocker"></div>

<div class="sunset-bg-container">
    <div class="sunset-sun"></div>
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
        <g class="parallax">
            <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255, 69, 0, 0.6)" />
            <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(211, 46, 230, 0.4)" />
            <use xlink:href="#gentle-wave" x="48" y="7" fill="#050212" />
        </g>
    </svg>
</div>

<div id="welcome-screen">
    <div class="welcome-logo">BABYSELL</div>
    <button class="btn-nav" style="margin-top:50px; padding:20px 60px;" onclick="initApp()">go to site</button>
</div>

<audio id="bg-music" loop><source src="https://files.catbox.moe/5ru7vf.mp3"></audio>

<div class="app-content">
    <header class="header">
        <div style="display:flex; gap:20px;">
            <button class="btn-nav" onclick="showPage('market')">MARKET</button>
            <button class="btn-nav" onclick="showPage('inventory')">INVENTORY</button>
            <button class="btn-nav" onclick="showPage('upgrade')">UPGRADE</button>
            <button class="btn-nav" style="border-color:var(--main);" onclick="showPage('products')">BEYSELL PRODUCTS</button>
        </div>
        <div style="font-family:Orbitron; letter-spacing:10px; font-weight:900; cursor:pointer;" onclick="showPage('market')">BABYSELL</div>
        <div style="display:flex; align-items:center; gap:30px;">
            <div id="u-bal" style="color:var(--main); font-family:Orbitron; font-size:22px; font-weight:900;">0 B</div>
            <button id="l-btn" class="btn-nav" onclick="login()">LOGIN</button>
            <div id="l-prof" style="display:none;"><img id="l-ava" src="" style="width:45px; border-radius:50%; border:2px solid var(--main);"></div>
        </div>
    </header>

    <div id="page-market" style="padding:100px 40px;">
        <center>
            <div class="case-card" style="max-width:400px;" onclick="openCaseModal()">
                <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
                <h2 style="font-family:Orbitron; margin-top:30px; letter-spacing:5px;">SUPREME CASE</h2>
                <div style="color:var(--main); font-size:30px; font-weight:900; margin-top:15px;">1,000 B</div>
            </div>
        </center>
    </div>

    <div id="page-inventory" style="display:none; padding:80px;">
        <h1 style="font-family:Orbitron; margin-bottom:50px; color:var(--main);">COLLECTION</h1>
        <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:30px;"></div>
    </div>

    <div id="page-upgrade" style="display:none; padding:80px;">
        <h1 style="font-family:Orbitron; margin-bottom:40px; text-align:center; color:var(--main);">UPGRADER</h1>
        <div class="upgrade-container">
            <div id="slot-input" class="upgrade-slot" onclick="showPage('inventory')">
                <p style="color:#555; font-family:Orbitron; font-size:12px; letter-spacing:2px;">SELECT SKIN</p>
            </div>
            <div style="text-align:center; position:relative;">
                <div class="upgrader-roulette" id="upg-roulette">
                    <div class="upgrader-track" id="upg-track"></div>
                    <div class="upgrader-arrow-container" id="upg-arrow">
                        <div class="upgrader-arrow"></div>
                    </div>
                    <div class="upgrader-inner">
                        <div class="water-wave" id="water-fill"></div>
                        <div id="chance-display" class="chance-text">0%</div>
                    </div>
                </div>
                <button id="upg-btn" class="btn-nav" style="margin-top:50px; width:220px; padding: 15px;" onclick="attemptUpgrade()" disabled>INITIATE UPGRADE</button>
            </div>
            <div id="slot-output" class="upgrade-slot">
                <select id="target-select" onchange="updateUpgradeChance()" style="background: rgba(0,0,0,0.85); color:#fff; border:1px solid rgba(255,157,0,0.3); padding:12px; font-family:Orbitron; outline: none; cursor: pointer; border-radius: 10px;">
                    <option value="">TARGET SKIN</option>
                </select>
                <div id="target-img-preview" style="margin-top: 30px;"></div>
            </div>
        </div>
    </div>

    <div id="page-products" style="display:none; padding:100px 80px;">
        <h1 style="font-family:Orbitron; margin-bottom:50px; text-align:center; color:var(--main);">BEYSELL</h1>
        <div style="display:flex; justify-content:center;">
            <div class="product-item" onclick="openProductInfo()" style="cursor:pointer; background: rgba(5,3,12,0.6); padding: 50px; border-radius: 40px; border: 1px solid rgba(255,157,0,0.1);">
                <h2 style="font-family:Orbitron; color:var(--main);">BEYSELL-LAUNCHER</h2>
                <p style="color:#777;">Gaming Platform v1.0</p>
            </div>
        </div>
    </div>
</div>

<div id="product-modal" onclick="closeProductModal()">
    <div id="product-modal-content" onclick="event.stopPropagation()">
        <h1 style="font-family:Orbitron; color:var(--main);">BEYSELL-LAUNCHER</h1>
        <a href="https://www.dropbox.com/scl/fi/33u95qm2g9tj0ltaohz5m/BEYSELL_Setup.exe?rlkey=ygvjgyx6vtroxxt5adlc81c1o&st=77dypihf&dl=1" style="display:inline-block; background:var(--main); color:#000; padding:20px 60px; border-radius:30px; font-family:Orbitron; text-decoration:none; margin-top:40px;">INSTALL</a>
    </div>
</div>

<div id="case-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(25px);">
    <div style="width:95%; max-width:1200px; text-align:center;">
        <h1 id="win-status">FATE DECIDING...</h1>
        <div class="view-window"><div class="pointer"></div><div id="strip" class="strip"></div></div>
        <button id="spin-btn" class="btn-nav" onclick="startSpin()">OPEN FOR 1,000 B</button>
        <div onclick="closeModals()" style="color:#555; cursor:pointer; margin-top:20px;">[ EXIT MODULE ]</div>
    </div>
</div>

<script>
    const music = document.getElementById('bg-music');
    function initApp() { music.volume = 0.2; music.play(); document.getElementById('welcome-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('welcome-screen').style.visibility = 'hidden'; document.body.classList.add('app-loaded'); }, 1500); }
    const firebaseConfig = { apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", authDomain: "babysell-8b37b.firebaseapp.com", databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", projectId: "babysell-8b37b", appId: "1:955498378146:web:52f027f8e97398e75b78fb" };
    firebase.initializeApp(firebaseConfig); const auth = firebase.auth(), db = firebase.database();
    const SKINS = [
        { name: "Glock Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", price: 150, color: "#4b69ff" },
        { name: "Deagle", img: "https://i.postimg.cc/HL5phv0W/ааааа.png", price: 400, color: "#8847ff" },
        { name: "AK Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini_Generated_Image_rii36prii36prii3.png", price: 1200, color: "#d32ee6" },
        { name: "Butterfly", img: "https://i.postimg.cc/ZRsrkWDd/Gemini_Generated_Image_i0cyvji0cyvji0cy.png", price: 15000, color: "#ebca42" }
    ];
    let user = null, balance = 0, userInv = {}, selectedUpgradeId = null, currentSpinAngle = 180; 
    auth.onAuthStateChanged(u => { if(u) { user = u; document.getElementById('l-btn').style.display = 'none'; document.getElementById('l-prof').style.display = 'block'; document.getElementById('l-ava').src = u.photoURL; db.ref('users/'+u.uid+'/balance').on('value', s => { balance = s.val() || 0; document.getElementById('u-bal').innerText = balance.toLocaleString() + " B"; }); db.ref('users/'+u.uid+'/inventory').on('value', s => { userInv = s.val() || {}; renderInventory(); populateTargetSkins(); }); } });
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function showPage(p) { ['page-market', 'page-inventory', 'page-products', 'page-upgrade'].forEach(id => document.getElementById(id).style.display = 'none'); document.getElementById('page-' + p).style.display = 'block'; }
    function renderInventory() { const g = document.getElementById('inv-grid'); g.innerHTML = ""; Object.keys(userInv).reverse().forEach(id => { const i = userInv[id]; g.innerHTML += `<div class="inv-item" style="padding:30px; background:rgba(5,3,12,0.6); border-radius:35px; border-bottom:4px solid ${i.color}; text-align:center;"><img src="${i.img}" width="130"><br><b style="font-family:Orbitron">${i.name}</b><br><button class="btn-nav" style="width:100%; margin-top:10px;" onclick="selectForUpgrade('${id}')">UPGRADE</button><button class="btn-nav" style="width:100%; margin-top:5px;" onclick="sell('${id}',${i.price})">SELL ${i.price}B</button></div>`; }); }
    function selectForUpgrade(id) { selectedUpgradeId = id; const skin = userInv[id]; const slot = document.getElementById('slot-input'); slot.innerHTML = `<img src="${skin.img}" width="150"><p style="margin-top:15px; font-family:Orbitron; font-weight:bold;">${skin.name}</p><p style="color:var(--main);">${skin.price} B</p>`; slot.classList.add('active'); showPage('upgrade'); updateUpgradeChance(); }
    function populateTargetSkins() { const sel = document.getElementById('target-select'); const currentVal = sel.value; sel.innerHTML = '<option value="">TARGET SKIN</option>'; SKINS.forEach((s, i) => sel.innerHTML += `<option value="${i}">${s.name} (${s.price}B)</option>`); if(currentVal) sel.value = currentVal; }
    
    function updateUpgradeChance() { 
        if(!selectedUpgradeId) return; 
        const targetIdx = document.getElementById('target-select').value; 
        const btn = document.getElementById('upg-btn'); 
        const track = document.getElementById('upg-track'); 
        const water = document.getElementById('water-fill'); 
        const chanceDisplay = document.getElementById('chance-display'); 
        const preview = document.getElementById('target-img-preview'); 
        if(targetIdx === "") { chanceDisplay.innerText = "0%"; btn.disabled = true; track.style.background = `transparent`; water.style.top = `100%`; preview.innerHTML = ""; return; } 
        const chance = Math.min(95, Math.floor((userInv[selectedUpgradeId].price / SKINS[targetIdx].price) * 100)); 
        chanceDisplay.innerText = chance + "%"; btn.disabled = false; preview.innerHTML = `<img src="${SKINS[targetIdx].img}" width="150">`; 
        
        const angleSize = (chance / 100) * 360; const half = angleSize / 2;
        track.style.background = `conic-gradient(from 0deg, transparent 0deg, transparent ${180-half}deg, var(--main) ${180-half}deg, var(--main) ${180+half}deg, transparent ${180+half}deg, transparent 360deg)`;
        water.style.top = `${100 - chance}%`; 
    }

    function attemptUpgrade() { 
        const targetIdx = document.getElementById('target-select').value; 
        const chance = parseInt(document.getElementById('chance-display').innerText); 
        const btn = document.getElementById('upg-btn'); 
        const arrowCont = document.getElementById('upg-arrow'); 
        document.getElementById('action-blocker').style.display = 'block'; 
        btn.disabled = true; 
        
        const isWin = Math.random() * 100 < chance; 
        const angleSize = (chance / 100) * 360;
        const startWin = 180 - (angleSize / 2);
        const endWin = 180 + (angleSize / 2);
        
        let resultAngle;
        const winPadding = Math.min(5, angleSize / 3); 
        const losePadding = Math.min(5, (360 - angleSize) / 3);

        if (isWin) {
            resultAngle = (startWin + winPadding) + (Math.random() * (angleSize - (winPadding * 2)));
        } else {
            const safeRange = (360 - angleSize) - (losePadding * 2);
            resultAngle = (endWin + losePadding) + (Math.random() * safeRange);
            if (resultAngle >= 360) resultAngle -= 360;
        }

        const spins = 5 * 360; 
        currentSpinAngle += spins + (resultAngle - (currentSpinAngle % 360)); 
        arrowCont.style.transform = `rotate(${currentSpinAngle}deg)`; 
        
        setTimeout(() => { 
            if(isWin) { 
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove(); 
                db.ref('users/'+user.uid+'/inventory').push(SKINS[targetIdx]); 
                alert("SUCCESS! +1 " + SKINS[targetIdx].name); 
            } else { 
                db.ref('users/'+user.uid+'/inventory/'+selectedUpgradeId).remove(); 
                alert("FAILED! SKIN DESTROYED"); 
            } 
            selectedUpgradeId = null; 
            document.getElementById('slot-input').innerHTML = "<p style='color:#555; font-family:Orbitron; font-size:12px; letter-spacing:2px;'>SELECT SKIN</p>"; 
            document.getElementById('slot-input').classList.remove('active'); 
            document.getElementById('action-blocker').style.display = 'none'; 
            updateUpgradeChance(); 
            showPage('inventory'); 
        }, 4100); 
    }

    function getSkinByChance() { let rand = Math.random() * 100; let sum = 0; for (let i = 0; i < SKINS.length; i++) { sum += (100/SKINS.length); if (rand <= sum) return SKINS[i]; } return SKINS[0]; }
    
    function startSpin() { 
        if(balance < 1000) return alert("LOW BALANCE"); 
        const btn = document.getElementById('spin-btn'); 
        btn.disabled = true; 
        document.getElementById('action-blocker').style.display = 'block'; 
        db.ref('users/'+user.uid+'/balance').set(balance - 1000); 
        const strip = document.getElementById('strip'); 
        strip.innerHTML = ""; 
        
        const win = getSkinByChance(); 
        for(let i=0; i<100; i++) { 
            let s = (i === 50) ? win : getSkinByChance(); 
            strip.innerHTML += `<div class="case-strip-item"><img src="${s.img}" width="100"><div style="color:${s.color}">${s.name}</div></div>`; 
        } 
        
        strip.style.transition = 'none'; 
        strip.style.transform = 'translateX(0)'; 
        
        const windowWidth = document.querySelector('.view-window').clientWidth;
        const finalShift = (50 * 240) + 120 - (windowWidth / 2);
        const randomOffset = Math.floor(Math.random() * 180) - 90;
        
        setTimeout(() => { 
            strip.style.transition = 'transform 9s cubic-bezier(0.05, 0.7, 0.1, 1.0)'; 
            strip.style.transform = `translateX(-${finalShift + randomOffset}px)`; 
        }, 50); 
        
        setTimeout(() => { 
            db.ref('users/'+user.uid+'/inventory').push(win); 
            btn.disabled = false; 
            document.getElementById('action-blocker').style.display = 'none'; 
            alert("YOU GOT: " + win.name); 
        }, 9000); 
    }
    
    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function openCaseModal() { if(!user) return login(); document.getElementById('case-modal').style.display='flex'; }
    function closeModals() { document.getElementById('case-modal').style.display='none'; }
    function openProductInfo() { document.getElementById('product-modal').style.display = 'flex'; }
    function closeProductModal() { document.getElementById('product-modal').style.display = 'none'; }
</script>
</body>
</html>
