<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYSELL - PREMIUM CASE SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');
        :root { --main: #00ffaa; --bg: #030305; --rare: #ebca42; --covert: #eb4b4b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* LIVE FEED WITH NAMES */
        .live-drops { height: 80px; background: rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; padding: 0 20px; overflow: hidden; border-bottom: 2px solid rgba(0,255,170,0.3); }
        .drop-card { min-width: 140px; background: #0a0a0c; border-radius: 10px; border-bottom: 3px solid var(--main); padding: 8px; text-align: center; font-size: 11px; animation: slideIn 0.5s ease; position: relative; }
        .drop-name { position: absolute; top: -5px; left: 5px; background: var(--main); color: #000; font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: bold; }
        @keyframes slideIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; height: 90px; background: #000; border-bottom: 1px solid #111; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 32px; letter-spacing: 12px; color: #fff; text-shadow: 0 0 25px var(--main); position: absolute; left: 50%; transform: translateX(-50%); }

        /* BUTTONS */
        .btn { background: #111; border: 1px solid #222; color: #fff; padding: 12px 28px; border-radius: 14px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn:hover { border-color: var(--main); box-shadow: 0 0 20px rgba(0,255,170,0.2); }
        .btn-main { background: var(--main); color: #000; font-weight: 900; border: none; box-shadow: 0 0 20px var(--main); animation: glowBtn 2s infinite; }
        @keyframes glowBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 40px var(--main); } }

        /* CASES */
        .cases-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 40px; max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .case { background: linear-gradient(180deg, #0a0a0d 0%, #050507 100%); padding: 60px 30px; border-radius: 45px; border: 1px solid #1a1a1f; text-align: center; cursor: pointer; transition: 0.5s; }
        .case:hover { transform: translateY(-15px); border-color: var(--main); box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        .case img { width: 100%; max-width: 240px; filter: drop-shadow(0 0 30px #000); }
        .case h3 { font-family: 'Orbitron'; margin-top: 25px; letter-spacing: 3px; font-size: 18px; }
        .price { font-family: 'Orbitron'; font-size: 28px; color: var(--main); margin-top: 12px; }

        /* ROULETTE ULTIMATE */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        .roulette-box { width: 95%; max-width: 950px; background: #08080a; padding: 70px 40px; border-radius: 50px; border: 1px solid #222; position: relative; overflow: hidden; }
        .window { position: relative; width: 100%; height: 200px; background: #000; margin: 40px 0; overflow: hidden; border: 3px solid #151515; border-radius: 25px; }
        .line { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: var(--main); z-index: 100; box-shadow: 0 0 40px var(--main); transform: translateX(-50%); }
        .strip { display: flex; position: absolute; left: 0; height: 100%; align-items: center; transition: transform 8s cubic-bezier(0.15, 0, 0.05, 1); }
        .item { min-width: 200px; text-align: center; }

        /* JACKPOT FX */
        .jackpot-win { animation: goldFlash 1s infinite; border-color: var(--rare) !important; }
        @keyframes goldFlash { 0%, 100% { box-shadow: inset 0 0 20px transparent; } 50% { box-shadow: inset 0 0 100px rgba(235, 202, 66, 0.3); } }

        #notif { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: #000; border: 2px solid var(--main); padding: 22px 45px; margin-top: 12px; font-family: 'Orbitron'; border-left: 8px solid var(--main); box-shadow: 0 15px 60px #000; font-weight: 900; }
    </style>
</head>
<body>

<div class="live-drops" id="live-drops"></div>

<header class="header">
    <div style="display:flex; gap:15px;">
        <button class="btn" onclick="showPage('market')">MARKET</button>
        <button class="btn" onclick="showPage('inventory')">INVENTORY</button>
    </div>
    <div class="logo">BABYSELL</div>
    <div style="display:flex; gap:20px; align-items:center;">
        <div id="u-bal" style="font-family:'Orbitron'; font-size:24px; color:var(--main); font-weight:900;">0 B</div>
        <button id="l-btn" onclick="login()" class="btn btn-main">LOG IN</button>
        <img id="l-ava" src="" style="display:none; width:45px; border-radius:50%; border:2px solid var(--main); cursor:pointer;">
    </div>
</header>

<div id="page-market" class="page">
    <div class="cases-grid">
        <div class="case" onclick="openCaseModal('hardcore')">
            <img src="https://i.postimg.cc/ZnHQ1pwz/AAA.png">
            <h3>MYSTERIOUS NIGHTS</h3>
            <div class="price">1,000 B</div>
        </div>
        <div class="case" onclick="openCaseModal('ultra')">
            <img src="https://i.postimg.cc/FRCNdtNc/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.png">
            <h3>TARGETED NIGHTMARES</h3>
            <div class="price">5,000 B</div>
        </div>
    </div>
</div>

<div id="page-inventory" class="page" style="display:none; padding:50px;">
    <h1 style="font-family:'Orbitron'; text-align:center; margin-bottom:50px; color:var(--main);">COLLECTION</h1>
    <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:30px;"></div>
</div>

<div id="case-modal" class="modal">
    <div class="roulette-box" id="roulette-box">
        <h2 id="win-text" style="font-family:'Orbitron'; letter-spacing:12px; font-size:24px;">GOOD LUCK!</h2>
        <div class="window">
            <div class="line"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="spin-btn" class="btn btn-main" style="width:100%; height:80px; font-size:22px;" onclick="startSpin()">OPEN CASE</button>
        <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:30px; cursor:pointer; font-family:'Orbitron'; letter-spacing:2px;">CANCEL</button>
    </div>
</div>

<audio id="snd-tick" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>
<audio id="snd-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB-vHc4nWntJQwf-Ezd6QH5ChXldCkiYBM", 
        authDomain: "babysell-8b37b.firebaseapp.com", 
        databaseURL: "https://babysell-8b37b-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "babysell-8b37b", 
        appId: "1:955498378146:web:52f027f8e97398e75b78fb" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    const CASE_HARDCORE = [
        { name: "Glock-18 Fade", img: "https://i.postimg.cc/Hk5Jznr2/Gemini-Generated-Image-m3j83tm3j83tm3j8.png", color: "#4b69ff", price: 150 },
        { name: "AK-47 Neon", img: "https://i.postimg.cc/3NW96mG1/Gemini-Generated-Image-rii36prii36prii3.png", color: "#d32ee6", price: 1200 },
        { name: "Desert Eagle", img: "https://i.postimg.cc/1X8y8H2X/330x192-(6).png", color: "#eb4b4b", price: 2500 }
    ];

    const CASE_ULTRA = [
        { name: "AWP | Gold", img: "https://i.postimg.cc/RFVSB9T1/330x192-(5).png", color: "#eb4b4b", price: 9000 },
        { name: "Butterfly Knife", img: "https://i.postimg.cc/ZRsrkWDd/Gemini-Generated-Image-i0cyvji0cyvji0cy.png", color: "#ebca42", price: 15000 },
        { name: "Karambit Fade", img: "https://i.postimg.cc/yN0gdV9f/330x192-(7).png", color: "#ebca42", price: 120000 }
    ];

    let user = null, balance = 0, currentSkins = [], currentPrice = 0;

    auth.onAuthStateChanged(u => {
        if(u) {
            user = u;
            document.getElementById('l-btn').style.display = 'none';
            document.getElementById('l-ava').style.display = 'block';
            document.getElementById('l-ava').src = u.photoURL;
            db.ref('users/'+u.uid+'/balance').on('value', s => {
                balance = s.val() || 0;
                document.getElementById('u-bal').innerText = balance.toLocaleString() + " B";
            });
            db.ref('users/'+u.uid+'/inventory').on('value', s => renderInv(s.val()));
        }
    });

    function openCaseModal(type) {
        if(!user) return login();
        currentSkins = (type === 'hardcore') ? CASE_HARDCORE : CASE_ULTRA;
        currentPrice = (type === 'hardcore') ? 1000 : 5000;
        document.getElementById('case-modal').style.display = 'flex';
        document.getElementById('win-text').innerText = "OPENING...";
        const strip = document.getElementById('strip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0)';
        strip.innerHTML = "";
        for(let i=0; i<70; i++) {
            let s = currentSkins[Math.floor(Math.random()*currentSkins.length)];
            strip.innerHTML += `<div class="item"><img src="${s.img}" width="140"></div>`;
        }
    }

    function startSpin() {
        if(balance < currentPrice) return toast("INSUFFICIENT FUNDS");
        document.getElementById('spin-btn').disabled = true;
        db.ref('users/'+user.uid+'/balance').set(balance - currentPrice);

        const win = currentSkins[Math.floor(Math.random()*currentSkins.length)];
        const strip = document.getElementById('strip');
        // Заміна скіна на 65-й позиції (фінальна точка)
        strip.children[65].innerHTML = `<img src="${win.img}" width="155" style="filter:drop-shadow(0 0 25px ${win.color})">`;
        
        const move = (65 * 200) - (document.querySelector('.window').offsetWidth / 2) + 100;
        strip.style.transition = 'transform 8s cubic-bezier(0.15, 0, 0.05, 1)';
        strip.style.transform = `translateX(-${move}px)`;

        // SOUND TICKS
        for(let i=0; i<50; i++) {
            setTimeout(() => { 
                if(document.getElementById('case-modal').style.display === 'flex') {
                    const s = document.getElementById('snd-tick').cloneNode();
                    s.volume = 0.3; s.play();
                }
            }, i*i*3.2);
        }

        setTimeout(() => {
            db.ref('users/'+user.uid+'/inventory').push(win);
            document.getElementById('snd-win').play();
            document.getElementById('win-text').innerText = "CONGRATS! " + win.name.toUpperCase();
            if(win.price >= 10000) document.getElementById('roulette-box').classList.add('jackpot-win');
            toast("UNBOXED: " + win.name);
            document.getElementById('spin-btn').disabled = false;
        }, 8200);
    }

    function renderInv(data) {
        const g = document.getElementById('inv-grid'); g.innerHTML = "";
        if(!data) return;
        Object.keys(data).forEach(id => {
            const i = data[id];
            g.innerHTML += `<div style="background:#0a0a0c; padding:30px; border-radius:25px; border-bottom:4px solid ${i.color}; text-align:center;">
                <img src="${i.img}" width="150"><br>
                <b style="font-family:Orbitron; font-size:14px; letter-spacing:1px;">${i.name}</b><br>
                <button class="btn" style="width:100%; margin-top:20px; font-weight:bold;" onclick="sell('${id}',${i.price})">SELL ${i.price} B</button>
            </div>`;
        });
    }

    function sell(id, p) { db.ref('users/'+user.uid+'/inventory/'+id).remove(); db.ref('users/'+user.uid+'/balance').set(balance + p); }
    function showPage(p) {
        document.getElementById('page-market').style.display = (p==='market') ? 'block' : 'none';
        document.getElementById('page-inventory').style.display = (p==='inventory') ? 'block' : 'none';
    }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function closeModals() { 
        document.getElementById('case-modal').style.display = 'none'; 
        document.getElementById('roulette-box').classList.remove('jackpot-win');
    }
    function toast(m) {
        const n = document.getElementById('notif'), t = document.createElement('div');
        t.className = 'toast'; t.innerText = m;
        n.appendChild(t); setTimeout(() => t.remove(), 4000);
    }

    // LIVE FEED GENERATOR
    const NAMES = ["Dima", "Sanya", "Artem", "Max", "Egor", "Kirill", "Nikita"];
    setInterval(() => {
        const feed = document.getElementById('live-drops');
        const s = [...CASE_HARDCORE, ...CASE_ULTRA][Math.floor(Math.random()*6)];
        const n = NAMES[Math.floor(Math.random()*NAMES.length)];
        const div = document.createElement('div'); div.className = 'drop-card';
        div.style.borderColor = s.color;
        div.innerHTML = `<div class="drop-name">${n}</div><img src="${s.img}" width="45"><br>${s.name}`;
        feed.prepend(div); if(feed.children.length > 15) feed.lastChild.remove();
    }, 3500);
</script>
</body>
</html>
